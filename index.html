      // ==================== CRYPTO ENGINE ====================
      const CryptoEngine = {
        async generateKeyPair() {
          const kp = await crypto.subtle.generateKey({ name: "ECDH", namedCurve: "P-256" }, true, ["deriveKey"]);
          const raw = await crypto.subtle.exportKey("raw", kp.publicKey);
          const hex = Array.from(new Uint8Array(raw)).map(b => b.toString(16).padStart(2, "0")).join("");
          return { keyPair: kp, publicKeyHex: hex };
        },
        async sha256(d) {
          const h = await crypto.subtle.digest("SHA-256", new TextEncoder().encode(d));
          return Array.from(new Uint8Array(h)).map(b => b.toString(16).padStart(2, "0")).join("");
        },
        async encrypt(text, key) {
          const iv = crypto.getRandomValues(new Uint8Array(12));
          const ck = await crypto.subtle.importKey("raw", new TextEncoder().encode(key.padEnd(32, "0").slice(0, 32)), "AES-GCM", false, ["encrypt"]);
          const ct = await crypto.subtle.encrypt({ name: "AES-GCM", iv }, ck, new TextEncoder().encode(text));
          return {
            iv: Array.from(iv).map(b => b.toString(16).padStart(2, "0")).join(""),
            ciphertext: Array.from(new Uint8Array(ct)).map(b => b.toString(16).padStart(2, "0")).join(""),
          };
        },
        genInvite() {
          const b = crypto.getRandomValues(new Uint8Array(16));
          const c = Array.from(b).map(b => b.toString(16).padStart(2, "0")).join("");
          return `GL-${c.slice(0, 8)}-${c.slice(8, 16)}-${c.slice(16, 24)}-${c.slice(24, 32)}`.toUpperCase();
        },
        async deriveKeyFromSeed(words) {
          const enc = new TextEncoder();
          const km = await crypto.subtle.importKey("raw", enc.encode(words.join(" ")), "PBKDF2", false, ["deriveKey"]);
          return crypto.subtle.deriveKey(
            { name: "PBKDF2", salt: enc.encode("ghostlink-v2-salt"), iterations: 100000, hash: "SHA-256" },
            km, { name: "AES-GCM", length: 256 }, false, ["wrapKey", "unwrapKey"]
          );
        },
        async wrapPrivKey(privKey, wrapKey) {
          const iv = crypto.getRandomValues(new Uint8Array(12));
          const wrapped = await crypto.subtle.wrapKey("pkcs8", privKey, wrapKey, { name: "AES-GCM", iv });
          return {
            iv: [...iv].map(b => b.toString(16).padStart(2,"0")).join(""),
            data: [...new Uint8Array(wrapped)].map(b => b.toString(16).padStart(2,"0")).join("")
          };
        },
        async unwrapPrivKey(w, wrapKey) {
          const iv = new Uint8Array(w.iv.match(/.{2}/g).map(b => parseInt(b,16)));
          const data = new Uint8Array(w.data.match(/.{2}/g).map(b => parseInt(b,16)));
          return crypto.subtle.unwrapKey("pkcs8", data, wrapKey, { name: "AES-GCM", iv }, { name: "ECDH", namedCurve: "P-256" }, true, ["deriveKey"]);
        },
      };

      const ShamirSSS = (() => {
        const PRIME = 0x11b;
        const LOG = new Uint8Array(256), EXP = new Uint8Array(512);
        let x = 1;
        for (let i = 0; i < 255; i++) {
          EXP[i] = EXP[i+255] = x; LOG[x] = i;
          x = (x << 1) ^ (x & 128 ? PRIME : 0);
        }
        const mul = (a,b) => (!a||!b) ? 0 : EXP[LOG[a]+LOG[b]];
        const div = (a,b) => !a ? 0 : EXP[(LOG[a]-LOG[b]+255)%255];
        const eval_ = (c,x) => { let r=0; for (let i=c.length-1;i>=0;i--) r=mul(r,x)^c[i]; return r; };
        return {
          split(secret, n, k) {
            const shares = Array.from({length:n},(_,i)=>({x:i+1, y:new Uint8Array(secret.length)}));
            for (let i=0;i<secret.length;i++) {
              const c = new Uint8Array(k); c[0]=secret[i];
              for (let j=1;j<k;j++) c[j]=crypto.getRandomValues(new Uint8Array(1))[0];
              shares.forEach(s=>{ s.y[i]=eval_(Array.from(c),s.x); });
            }
            return shares;
          },
          combine(shares) {
            const len=shares[0].y.length, out=new Uint8Array(len);
            for (let i=0;i<len;i++) {
              let s=0;
              for (let j=0;j<shares.length;j++) {
                let n=shares[j].y[i], d=1;
                for (let m=0;m<shares.length;m++) {
                  if (m!==j) { n=mul(n,shares[m].x); d=mul(d,shares[j].x^shares[m].x); }
                }
                s^=div(n,d);
              }
              out[i]=s;
            }
            return out;
          }
        };
      })();

        async add(sender, content, type = "text", meta = {}) {
          const prev = this.blocks.length ? this.blocks[this.blocks.length - 1].hash : "0".repeat(64);
          const ts = Date.now();
          const data = JSON.stringify({ sender, content, type, ts, meta });
          const hash = await CryptoEngine.sha256(prev + data + ts);
          const block = { index: this.blocks.length, ts, sender, content, type, meta, prevHash: prev, hash, nonce: Math.floor(Math.random() * 999999) };
          this.blocks.push(block);
          return block;
        }
        async verify() {
          for (let i = 1; i < this.blocks.length; i++) {
            if (this.blocks[i].prevHash !== this.blocks[i - 1].hash) return false;
          }
          return true;
        }
        export() { return JSON.stringify(this.blocks, null, 2); }

      // ==================== RECOVERY HELPERS ====================

      // Build the full data blob that gets Shamir-split
      async function buildBackupBlob(identity, masterKey, appState) {
        const wrappedPrivKey = await CryptoEngine.wrapPrivKey(identity.keyPair.privateKey, masterKey);
        const blob = {
          version: 1,
          timestamp: Date.now(),
          name: identity.name,
          pubKeyHex: identity.publicKeyHex,
          fingerprint: identity.fingerprint,
          wrappedPrivKey,
          messages: appState.messages || {},
          contacts: appState.contacts || [],
          settings: appState.settings || {},
          chain: appState.chain || [],
          files: appState.files || [],
        };
        return JSON.stringify(blob);
      }

      // Split a blob string into 7 Shamir fragments (threshold: 3)
      // Fragment encoding: first byte = x-coordinate, rest = y-values (self-describing)
      function generateBackupFragments(blobStr) {
        const dataBytes = new TextEncoder().encode(blobStr);
        const shares = ShamirSSS.split(dataBytes, 7, 3);
        const fragments = shares.map((share) => {
          const encoded = [share.x, ...share.y].map(b => b.toString(16).padStart(2,'0')).join('');
          return {
            id: share.x,
            label: `Fragment ${share.x} of 7`,
            data: encoded,
            check: encoded.slice(0, 8),
            distributed: false,
            peerName: '',
          };
        });
        localStorage.setItem('gl_fragment_meta', JSON.stringify(
          fragments.map(f => ({ id: f.id, check: f.check, distributed: f.distributed, peerName: f.peerName }))
        ));
        return fragments;
      }

      // Mark a fragment as distributed to a named peer
      function markFragmentDistributed(fragmentId, peerName) {
        const meta = JSON.parse(localStorage.getItem('gl_fragment_meta') || '[]');
        const frag = meta.find(f => f.id === fragmentId);
        if (frag) { frag.distributed = true; frag.peerName = peerName; }
        localStorage.setItem('gl_fragment_meta', JSON.stringify(meta));
        return meta;
      }

      // Get current distribution status
      function getFragmentStatus() {
        const meta = JSON.parse(localStorage.getItem('gl_fragment_meta') || '[]');
        const distributed = meta.filter(f => f.distributed).length;
        return { total: 7, threshold: 3, distributed, safe: distributed >= 3, fragments: meta };
      }

      // Combine ≥3 fragment hex strings and unwrap identity using master key
      async function combineAndRestore(masterKey, fragmentHexArray) {
        if (fragmentHexArray.length < 3) return { success: false, error: `Need at least 3 fragments, got ${fragmentHexArray.length}` };
        let shares;
        try {
          shares = fragmentHexArray.map(hex => {
            const bytes = hex.trim().match(/.{2}/g).map(b => parseInt(b, 16));
            return { x: bytes[0], y: new Uint8Array(bytes.slice(1)) };
          });
        } catch (e) { return { success: false, error: 'Invalid fragment format' }; }

        let blob;
        try {
          const reconstructed = ShamirSSS.combine(shares);
          blob = JSON.parse(new TextDecoder().decode(reconstructed));
        } catch (e) { return { success: false, error: 'Fragment reconstruction failed — wrong or corrupted fragments' }; }

        let privKey;
        try {
          privKey = await CryptoEngine.unwrapPrivKey(blob.wrappedPrivKey, masterKey);
        } catch (e) { return { success: false, error: 'Key unwrap failed — wrong seed phrase' }; }

        const pubKeyBytes = new Uint8Array(blob.pubKeyHex.match(/.{2}/g).map(b => parseInt(b,16)));
        const pubKey = await crypto.subtle.importKey('raw', pubKeyBytes, { name: 'ECDH', namedCurve: 'P-256' }, true, []);

        const identity = {
          keyPair: { privateKey: privKey, publicKey: pubKey },
          publicKeyHex: blob.pubKeyHex,
          fingerprint: blob.fingerprint,
          name: blob.name,
        };

        // Restore app state to localStorage
        if (blob.messages) localStorage.setItem('gl_messages', JSON.stringify(blob.messages));
        if (blob.settings) localStorage.setItem('gl_settings', JSON.stringify(blob.settings));
        if (blob.chain) localStorage.setItem('gl_chain', JSON.stringify(blob.chain));
        localStorage.setItem('gl_identity', JSON.stringify({
          name: blob.name, pubKeyHex: blob.pubKeyHex, fingerprint: blob.fingerprint, wrappedPrivKey: blob.wrappedPrivKey
        }));

        return { success: true, identity, restored: { messages: !!blob.messages, settings: !!blob.settings, chain: !!blob.chain } };
      }

                            rows={3} style={{ width: "100%", background: "rgba(255,255,255,0.04)", border: `1px solid ${restoreStatus === "error" || restoreStatus === "wrongseed" ? "#ff4444" : restoreStatus === "ok" ? th.accent : "rgba(255,255,255,0.08)"}`, borderRadius: 10, padding: "12px 14px", color: "#e0e0e8", fontSize: 13, fontFamily: "'JetBrains Mono', monospace", resize: "none", marginBottom: 10 }} />
                          {restoreStatus === "loading" && <div style={{ padding: "9px 12px", borderRadius: 8, background: `${th.accent2}10`, border: `1px solid ${th.accent2}25`, fontSize: 10, color: th.accent2, marginBottom: 10 }}>Deriving key via PBKDF2 · 100,000 iterations…</div>}
                          {restoreStatus === "ok" && <div style={{ padding: "9px 12px", borderRadius: 8, background: `${th.accent}10`, border: `1px solid ${th.accent}25`, fontSize: 10, color: th.accent, marginBottom: 10 }}>Identity restored. Redirecting…</div>}
                          {restoreStatus === "error" && <div style={{ padding: "9px 12px", borderRadius: 8, background: "rgba(255,68,68,0.08)", border: "1px solid rgba(255,68,68,0.2)", fontSize: 10, color: "#ff4444", marginBottom: 10 }}>Enter exactly 12 words.</div>}
                          {restoreStatus === "wrongseed" && <div style={{ padding: "9px 12px", borderRadius: 8, background: "rgba(255,68,68,0.08)", border: "1px solid rgba(255,68,68,0.2)", fontSize: 10, color: "#ff4444", marginBottom: 10 }}>Wrong seed phrase — decryption failed.</div>}
                          <Btn accent style={{ width: "100%" }} onClick={validateAndDeriveKey} disabled={restoreStatus === "loading" || restoreStatus === "ok"}>
                            <I t="key" s={15} c="#000" /> DERIVE KEY & CHECK DEVICE
                          </Btn>
                        </>
                      ) : (
                        <>
                          <div style={{ fontSize: 11, color: "#5a5a6a", marginBottom: 14, lineHeight: 1.7 }}>
                            <strong style={{ color: "#8a8a9a" }}>Step 2 of 2</strong> — No saved identity found. Paste at least 3 Shamir fragments from your trusted peers.
                          </div>
                          {[0,1,2].map(i => (
                            <div key={i} style={{ marginBottom: 8 }}>
                              <label style={{ fontSize: 9, color: "#4a5568", letterSpacing: 1, textTransform: "uppercase", marginBottom: 4, display: "block" }}>Fragment {i+1}</label>
                              <textarea value={fragmentInputs[i]} onChange={e => setFragmentInputs(fi => fi.map((v,j) => j===i ? e.target.value : v))} placeholder="Paste hex fragment data..."
                                rows={2} style={{ width: "100%", background: "rgba(255,255,255,0.04)", border: "1px solid rgba(255,255,255,0.08)", borderRadius: 8, padding: "8px 10px", color: "#e0e0e8", fontSize: 10, fontFamily: "'JetBrains Mono', monospace", resize: "none" }} />
                            </div>
                          ))}
                          {combineStatus === "need3" && <div style={{ padding: "9px 12px", borderRadius: 8, background: "rgba(255,68,68,0.08)", border: "1px solid rgba(255,68,68,0.2)", fontSize: 10, color: "#ff4444", marginBottom: 8 }}>Need at least 3 non-empty fragments.</div>}
                          {combineStatus === "loading" && <div style={{ padding: "9px 12px", borderRadius: 8, background: `${th.accent2}10`, border: `1px solid ${th.accent2}25`, fontSize: 10, color: th.accent2, marginBottom: 8 }}>Combining fragments via Shamir GF-256…</div>}
                          {combineStatus === "ok" && <div style={{ padding: "9px 12px", borderRadius: 8, background: `${th.accent}10`, border: `1px solid ${th.accent}25`, fontSize: 10, color: th.accent, marginBottom: 8 }}>Reconstructed. Restoring identity…</div>}
                          {combineStatus && combineStatus !== "need3" && combineStatus !== "loading" && combineStatus !== "ok" && <div style={{ padding: "9px 12px", borderRadius: 8, background: "rgba(255,68,68,0.08)", border: "1px solid rgba(255,68,68,0.2)", fontSize: 10, color: "#ff4444", marginBottom: 8 }}>{combineStatus}</div>}
                          <Btn accent style={{ width: "100%", marginBottom: 8 }} onClick={combineAndRestoreIdentity} disabled={combineStatus === "loading" || combineStatus === "ok"}>
                            <I t="recover" s={15} c="#000" /> COMBINE & RESTORE
                          </Btn>
                          <button onClick={() => { setRestoreStep("seed"); setCombineStatus(null); setFragmentInputs(["","",""]); }} style={{ width: "100%", background: "transparent", border: "none", color: "#4a5568", cursor: "pointer", fontFamily: "inherit", fontSize: 11 }}>← Back to seed entry</button>
                        </>
                      )}
                    </>
                  )}

                </div>
              </div>
            )}
          </div>
        );
      }

      const root = ReactDOM.createRoot(document.getElementById("root"));
      root.render(<GhostLink />);
    </script>
  </body>
</html>
