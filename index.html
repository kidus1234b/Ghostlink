      // ==================== CRYPTO ENGINE ====================
      const CryptoEngine = {
        async generateKeyPair() {
          const kp = await crypto.subtle.generateKey({ name: "ECDH", namedCurve: "P-256" }, true, ["deriveKey"]);
          const raw = await crypto.subtle.exportKey("raw", kp.publicKey);
          const hex = Array.from(new Uint8Array(raw)).map(b => b.toString(16).padStart(2, "0")).join("");
          return { keyPair: kp, publicKeyHex: hex };
        },
        async sha256(d) {
          const h = await crypto.subtle.digest("SHA-256", new TextEncoder().encode(d));
          return Array.from(new Uint8Array(h)).map(b => b.toString(16).padStart(2, "0")).join("");
        },
        async encrypt(text, key) {
          const iv = crypto.getRandomValues(new Uint8Array(12));
          const ck = await crypto.subtle.importKey("raw", new TextEncoder().encode(key.padEnd(32, "0").slice(0, 32)), "AES-GCM", false, ["encrypt"]);
          const ct = await crypto.subtle.encrypt({ name: "AES-GCM", iv }, ck, new TextEncoder().encode(text));
          return {
            iv: Array.from(iv).map(b => b.toString(16).padStart(2, "0")).join(""),
            ciphertext: Array.from(new Uint8Array(ct)).map(b => b.toString(16).padStart(2, "0")).join(""),
          };
        },
        genInvite() {
          const b = crypto.getRandomValues(new Uint8Array(16));
          const c = Array.from(b).map(b => b.toString(16).padStart(2, "0")).join("");
          return `GL-${c.slice(0, 8)}-${c.slice(8, 16)}-${c.slice(16, 24)}-${c.slice(24, 32)}`.toUpperCase();
        },
        async deriveKeyFromSeed(words) {
          const enc = new TextEncoder();
          const km = await crypto.subtle.importKey("raw", enc.encode(words.join(" ")), "PBKDF2", false, ["deriveKey"]);
          return crypto.subtle.deriveKey(
            { name: "PBKDF2", salt: enc.encode("ghostlink-v2-salt"), iterations: 100000, hash: "SHA-256" },
            km, { name: "AES-GCM", length: 256 }, false, ["wrapKey", "unwrapKey"]
          );
        },
        async wrapPrivKey(privKey, wrapKey) {
          const iv = crypto.getRandomValues(new Uint8Array(12));
          const wrapped = await crypto.subtle.wrapKey("pkcs8", privKey, wrapKey, { name: "AES-GCM", iv });
          return {
            iv: [...iv].map(b => b.toString(16).padStart(2,"0")).join(""),
            data: [...new Uint8Array(wrapped)].map(b => b.toString(16).padStart(2,"0")).join("")
          };
        },
        async unwrapPrivKey(w, wrapKey) {
          const iv = new Uint8Array(w.iv.match(/.{2}/g).map(b => parseInt(b,16)));
          const data = new Uint8Array(w.data.match(/.{2}/g).map(b => parseInt(b,16)));
          return crypto.subtle.unwrapKey("pkcs8", data, wrapKey, { name: "AES-GCM", iv }, { name: "ECDH", namedCurve: "P-256" }, true, ["deriveKey"]);
        },
      };

      // ==================== MANUAL SIGNALING (serverless WebRTC) ====================
      const ManualSignaling = {
        async createOffer(identity) {
          const pc = new RTCPeerConnection({
            iceServers: [
              { urls: 'stun:stun.l.google.com:19302' },
              { urls: 'stun:stun1.l.google.com:19302' },
              { urls: 'stun:stun2.l.google.com:19302' },
            ]
          });
          const dc = pc.createDataChannel('ghostlink', { ordered: true });
          const candidates = [];
          const gatherDone = new Promise(resolve => {
            pc.onicecandidate = e => { if (e.candidate) candidates.push(e.candidate.toJSON()); else resolve(); };
            setTimeout(resolve, 6000);
          });
          const offer = await pc.createOffer();
          await pc.setLocalDescription(offer);
          await gatherDone;
          const bundle = {
            v: 2, s: pc.localDescription.sdp, t: pc.localDescription.type,
            i: candidates, p: identity.publicKeyHex, n: identity.name, f: identity.fingerprint, ts: Date.now()
          };
          return { encoded: btoa(unescape(encodeURIComponent(JSON.stringify(bundle)))), pc, dc, bundle };
        },
        async processOffer(encodedOffer, identity) {
          const bundle = JSON.parse(decodeURIComponent(escape(atob(encodedOffer))));
          const pc = new RTCPeerConnection({
            iceServers: [
              { urls: 'stun:stun.l.google.com:19302' },
              { urls: 'stun:stun1.l.google.com:19302' },
              { urls: 'stun:stun2.l.google.com:19302' },
            ]
          });
          const candidates = [];
          const gatherDone = new Promise(resolve => {
            pc.onicecandidate = e => { if (e.candidate) candidates.push(e.candidate.toJSON()); else resolve(); };
            setTimeout(resolve, 6000);
          });
          await pc.setRemoteDescription({ type: bundle.t, sdp: bundle.s });
          for (const c of bundle.i) { try { await pc.addIceCandidate(c); } catch(e) {} }
          const answer = await pc.createAnswer();
          await pc.setLocalDescription(answer);
          await gatherDone;
          const answerBundle = {
            v: 2, s: pc.localDescription.sdp, t: pc.localDescription.type,
            i: candidates, p: identity.publicKeyHex, n: identity.name, f: identity.fingerprint, ts: Date.now()
          };
          return { encoded: btoa(unescape(encodeURIComponent(JSON.stringify(answerBundle)))), peerInfo: bundle, pc };
        },
        async processAnswer(encodedAnswer, pc) {
          const bundle = JSON.parse(decodeURIComponent(escape(atob(encodedAnswer))));
          await pc.setRemoteDescription({ type: bundle.t, sdp: bundle.s });
          for (const c of bundle.i) { try { await pc.addIceCandidate(c); } catch(e) {} }
          return bundle;
        },
        isManualSignal(str) {
          if (!str || str.startsWith('GL-')) return false;
          try { const d = JSON.parse(decodeURIComponent(escape(atob(str)))); return d.v === 2 && d.s && d.t; } catch { return false; }
        },
        decode(str) { try { return JSON.parse(decodeURIComponent(escape(atob(str)))); } catch { return null; } },
      };

      // ==================== SHAMIR SECRET SHARING (GF-256) ====================
      const ShamirSSS = (() => {
        const PRIME = 0x11b;
        const LOG = new Uint8Array(256), EXP = new Uint8Array(512);
        let x = 1;
        for (let i = 0; i < 255; i++) {
          EXP[i] = EXP[i+255] = x; LOG[x] = i;
          x = (x << 1) ^ (x & 128 ? PRIME : 0);
        }
        const mul = (a,b) => (!a||!b) ? 0 : EXP[LOG[a]+LOG[b]];
        const div = (a,b) => !a ? 0 : EXP[(LOG[a]-LOG[b]+255)%255];
        const eval_ = (c,x) => { let r=0; for (let i=c.length-1;i>=0;i--) r=mul(r,x)^c[i]; return r; };
        return {
          split(secret, n, k) {
            const shares = Array.from({length:n},(_,i)=>({x:i+1, y:new Uint8Array(secret.length)}));
            for (let i=0;i<secret.length;i++) {
              const c = new Uint8Array(k); c[0]=secret[i];
              for (let j=1;j<k;j++) c[j]=crypto.getRandomValues(new Uint8Array(1))[0];
              shares.forEach(s=>{ s.y[i]=eval_(Array.from(c),s.x); });
            }
            return shares;
          },
          combine(shares) {
            const len=shares[0].y.length, out=new Uint8Array(len);
            for (let i=0;i<len;i++) {
              let s=0;
              for (let j=0;j<shares.length;j++) {
                let n=shares[j].y[i], d=1;
                for (let m=0;m<shares.length;m++) {
                  if (m!==j) { n=mul(n,shares[m].x); d=mul(d,shares[j].x^shares[m].x); }
                }
                s^=div(n,d);
              }
              out[i]=s;
            }
            return out;
          }
        };
      })();

      // ==================== BLOCKCHAIN ====================
      class Chain {
        constructor() { this.blocks = []; }
        async add(sender, content, type = "text", meta = {}) {
          const prev = this.blocks.length ? this.blocks[this.blocks.length - 1].hash : "0".repeat(64);
          const ts = Date.now();
          const data = JSON.stringify({ sender, content, type, ts, meta });
          const hash = await CryptoEngine.sha256(prev + data + ts);
          const block = { index: this.blocks.length, ts, sender, content, type, meta, prevHash: prev, hash, nonce: Math.floor(Math.random() * 999999) };
          this.blocks.push(block);
          return block;
        }
        async verify() {
          for (let i = 1; i < this.blocks.length; i++) {
            if (this.blocks[i].prevHash !== this.blocks[i - 1].hash) return false;
          }
          return true;
        }
        export() { return JSON.stringify(this.blocks, null, 2); }
      }

      // Build the full data blob that gets Shamir-split
      async function buildBackupBlob(identity, masterKey, appState) {
        const wrappedPrivKey = await CryptoEngine.wrapPrivKey(identity.keyPair.privateKey, masterKey);
        const blob = {
          version: 1,
          timestamp: Date.now(),
          name: identity.name,
          pubKeyHex: identity.publicKeyHex,
          fingerprint: identity.fingerprint,
          wrappedPrivKey,
          messages: appState.messages || {},
          contacts: appState.contacts || [],
          settings: appState.settings || {},
          chain: appState.chain || [],
          files: appState.files || [],
        };
        return JSON.stringify(blob);
      }

      // Split a blob string into 7 Shamir fragments (threshold: 3)
      // Fragment encoding: first byte = x-coordinate, rest = y-values (self-describing)
      function generateBackupFragments(blobStr) {
        const dataBytes = new TextEncoder().encode(blobStr);
        const shares = ShamirSSS.split(dataBytes, 7, 3);
        const fragments = shares.map((share) => {
          const encoded = [share.x, ...share.y].map(b => b.toString(16).padStart(2,'0')).join('');
          return {
            id: share.x,
            label: `Fragment ${share.x} of 7`,
            data: encoded,
            check: encoded.slice(0, 8),
            distributed: false,
            peerName: '',
          };
        });
        localStorage.setItem('gl_fragment_meta', JSON.stringify(
          fragments.map(f => ({ id: f.id, check: f.check, distributed: f.distributed, peerName: f.peerName }))
        ));
        return fragments;
      }

      // Mark a fragment as distributed to a named peer
      function markFragmentDistributed(fragmentId, peerName) {
        const meta = JSON.parse(localStorage.getItem('gl_fragment_meta') || '[]');
        const frag = meta.find(f => f.id === fragmentId);
        if (frag) { frag.distributed = true; frag.peerName = peerName; }
        localStorage.setItem('gl_fragment_meta', JSON.stringify(meta));
        return meta;
      }

      // Get current distribution status
      function getFragmentStatus() {
        const meta = JSON.parse(localStorage.getItem('gl_fragment_meta') || '[]');
        const distributed = meta.filter(f => f.distributed).length;
        return { total: 7, threshold: 3, distributed, safe: distributed >= 3, fragments: meta };
      }

      // Combine ≥3 fragment hex strings and unwrap identity using master key
      async function combineAndRestore(masterKey, fragmentHexArray) {
        if (fragmentHexArray.length < 3) return { success: false, error: `Need at least 3 fragments, got ${fragmentHexArray.length}` };
        let shares;
        try {
          shares = fragmentHexArray.map(hex => {
            const bytes = hex.trim().match(/.{2}/g).map(b => parseInt(b, 16));
            return { x: bytes[0], y: new Uint8Array(bytes.slice(1)) };
          });
        } catch (e) { return { success: false, error: 'Invalid fragment format' }; }

        let blob;
        try {
          const reconstructed = ShamirSSS.combine(shares);
          blob = JSON.parse(new TextDecoder().decode(reconstructed));
        } catch (e) { return { success: false, error: 'Fragment reconstruction failed — wrong or corrupted fragments' }; }

        let privKey;
        try {
          privKey = await CryptoEngine.unwrapPrivKey(blob.wrappedPrivKey, masterKey);
        } catch (e) { return { success: false, error: 'Key unwrap failed — wrong seed phrase' }; }

        const pubKeyBytes = new Uint8Array(blob.pubKeyHex.match(/.{2}/g).map(b => parseInt(b,16)));
        const pubKey = await crypto.subtle.importKey('raw', pubKeyBytes, { name: 'ECDH', namedCurve: 'P-256' }, true, []);

        const identity = {
          keyPair: { privateKey: privKey, publicKey: pubKey },
          publicKeyHex: blob.pubKeyHex,
          fingerprint: blob.fingerprint,
          name: blob.name,
        };

        // Restore app state to localStorage
        if (blob.messages) localStorage.setItem('gl_messages', JSON.stringify(blob.messages));
        if (blob.settings) localStorage.setItem('gl_settings', JSON.stringify(blob.settings));
        if (blob.chain) localStorage.setItem('gl_chain', JSON.stringify(blob.chain));
        localStorage.setItem('gl_identity', JSON.stringify({
          name: blob.name, pubKeyHex: blob.pubKeyHex, fingerprint: blob.fingerprint, wrappedPrivKey: blob.wrappedPrivKey
        }));

        return { success: true, identity, restored: { messages: !!blob.messages, settings: !!blob.settings, chain: !!blob.chain } };
      }

              setPeerManager(pm);

              pm.on('signaling-connected', () => { setSignalingConnected(true); setSignalingAvailable(true); setConnectionMode('Via Relay'); addToast('Connected to signaling server', 'success'); });
              pm.on('signaling-disconnected', () => { setSignalingConnected(false); addToast('Disconnected from server', 'error'); });
              // Generate a deterministic color from a peer ID
              const peerColor = (id) => {
                const colors = ['#1a3a2a', '#2a1a3a', '#1a2a3a', '#3a2a1a', '#2a3a1a', '#1a3a3a', '#3a1a2a', '#2a2a3a'];
                let hash = 0;
                for (let i = 0; i < (id || '').length; i++) hash = ((hash << 5) - hash) + id.charCodeAt(i);
                return colors[Math.abs(hash) % colors.length];
              };

              pm.on('peer-connected', (peerId, peerInfo) => {
                setConnectionStates(prev => ({ ...prev, [peerId]: 'connected' }));
                setPeers(prev => {
                  const existing = prev.find(p => p.fingerprint === peerId || p.id === peerId);
                  if (existing) {
                    // Update existing peer to online
                    return prev.map(p =>
                      (p.fingerprint === peerId || p.id === peerId)
                        ? { ...p, status: 'online', lastSeen: 'now', name: peerInfo?.name || p.name }
                        : p
                    );
                  }
                  const name = peerInfo?.name || `Peer-${peerId.slice(0, 6)}`;
                  return [...prev, {
                    id: peerId,
                    name,
                    status: 'online',
                    pubKey: peerInfo?.publicKey || '',
                    lastSeen: 'now',
                    avatar: name.split(' ').map(w => w[0]).join('').slice(0, 2).toUpperCase() || 'P',
                    color: peerColor(peerId),
                    unread: 0,
                    fingerprint: peerId,
                    isReal: true
                  }];
                });
                // Cache peer info for auto-reconnect
                PeerCache.addPeer(peerId, {
                  fingerprint: peerId,
                  name: peerInfo?.name || `Peer-${peerId.slice(0, 6)}`,
                  publicKeyHex: peerInfo?.publicKey || '',
                });
                if (!connectionMode || connectionMode === 'Via Relay') setConnectionMode('P2P Direct');
                setAutoReconnectStatus('connected');
                addToast(`${peerInfo?.name || 'Peer'} connected`, 'success');
              });
              pm.on('peer-disconnected', (peerId) => {
                setConnectionStates(prev => ({ ...prev, [peerId]: 'disconnected' }));
                setPeers(prev => prev.map(p =>
                  (p.fingerprint === peerId || p.id === peerId)
                    ? { ...p, status: 'offline', lastSeen: new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' }) }
                    : p
                ));
              });
              pm.on('message', async (peerId, data) => {
                try {
                  let msg;
                  const parsed = typeof data === 'string' ? JSON.parse(data) : data;

                  // Check if this is a Signal Protocol encrypted message
                  if (parsed.signalProtocol && parsed.envelope && sessionManager) {
                    try {
                      const decrypted = await sessionManager.decryptMessage(peerId, parsed.envelope);
                      msg = JSON.parse(decrypted);
                    } catch (signalErr) {
                      console.warn('[GhostLink] Signal decrypt failed:', signalErr);
                      msg = parsed; // fall through to regular handling
                    }
                  } else {
                    msg = parsed;
                  }

                  if (msg.type === 'chat') {
                    const block = await chain.add(msg.sender, msg.content, msg.msgType || 'text', msg.meta || {});
                    block.encrypted = msg.iv ? { iv: msg.iv, ciphertext: msg.ciphertext } : await CryptoEngine.encrypt(msg.content, identity.fingerprint);
                    // Find the conversation key — use the peer's id from our peers list
                    const peerEntry = peers.find(p => p.fingerprint === peerId || p.id === peerId);
                    const convoKey = peerEntry ? peerEntry.id : peerId;
                    setMessages(prev => ({
                      ...prev,
                      [convoKey]: [...(prev[convoKey] || []), block]
                    }));
                    // Increment unread count if not the active conversation
                    setPeers(prev => prev.map(p =>
                      (p.fingerprint === peerId || p.id === peerId) && convoKey !== activeConvo
                        ? { ...p, unread: (p.unread || 0) + 1 }
                        : p
                    ));
                  } else if (msg.type === 'typing') {
                    setTyping(true);
                    setTimeout(() => setTyping(false), 3000);
                  }
                } catch (e) { console.error('Message parse error:', e); }
              });
              pm.on('connection-state-change', (peerId, state) => {
                setConnectionStates(prev => ({ ...prev, [peerId]: state }));
              });

              // Initialize file transfer
              if (typeof FileTransfer !== 'undefined') {
                const ft = new FileTransfer(pm, CryptoEngine);
                ft.on('progress', ({ transferId, peerId, progress }) => {
                  setActiveTransfers(prev => ({ ...prev, [transferId]: { peerId, progress } }));
                });
                ft.on('complete', ({ transferId, peerId, file }) => {
                  setActiveTransfers(prev => { const n = { ...prev }; delete n[transferId]; return n; });
                  if (file) {
                    // Create object URL for download
                    const blob = new Blob([file.data], { type: file.type || 'application/octet-stream' });
                    const url = URL.createObjectURL(blob);
                    setTransferredFiles(prev => [...prev, {
                      id: transferId,
                      name: file.name || 'unknown',
                      size: file.size || 0,
                      from: peerId,
                      ts: Date.now(),
                      url: url,
                      type: file.type || 'application/octet-stream',
                      chunks: Math.ceil((file.size || 0) / 65536),
                      encrypted: false
                    }]);
                  }
                });
                setFileTransferManager(ft);
              }

              // Initialize media handler
              if (typeof MediaHandler !== 'undefined') {
                const mh = new MediaHandler(pm);
                mh.on('incoming-call', ({ peerId, callType: ct }) => {
                  setIncomingCall({ peerId, callType: ct });
                });
                mh.on('remote-stream', ({ peerId, stream }) => {
                  setRemoteStreams(prev => ({ ...prev, [peerId]: stream }));
                });
                mh.on('local-stream', ({ stream }) => {
                  setLocalStream(stream);
                });
                mh.on('call-ended', () => {
                  setCallActive(false);
                  setCallType(null);
                  setLocalStream(null);
                  setRemoteStreams({});
                  setIncomingCall(null);
                });
                setMediaHandler(mh);
              }

              // peerManager already set right after constructor
              try {
                await pm.connect();
                // Auto-reconnect: rejoin rooms for cached peers
                const cachedPeers = PeerCache.getAllPeers();
                const cachedIds = Object.keys(cachedPeers);
                if (cachedIds.length > 0) {
                  setAutoReconnectStatus('trying-relay');
                  for (const pid of cachedIds) {
                    const cached = cachedPeers[pid];
                    // Add cached peers to the peer list as offline until they reconnect
                    setPeers(prev => {
                      if (prev.find(p => p.fingerprint === pid || p.id === pid)) return prev;
                      return [...prev, {
                        id: pid, name: cached.name || `Peer-${pid.slice(0,6)}`, status: 'offline',
                        pubKey: cached.publicKeyHex || '', lastSeen: cached.lastSeen ? fmtTime(cached.lastSeen) : 'cached',
                        avatar: (cached.name || 'P').split(' ').map(w => w[0]).join('').slice(0,2).toUpperCase(),
                        color: '#1a3a2a', unread: 0, fingerprint: pid, isReal: true, isCached: true
                      }];
                    });
                  }
                }
              } catch (connectErr) {
                console.warn('[GhostLink] Signaling connect failed (will auto-reconnect):', connectErr.message);
                setSignalingAvailable(false);
                // Auto-reconnect: try direct from cache
                const cachedPeers = PeerCache.getAllPeers();
                const cachedIds = Object.keys(cachedPeers);
                if (cachedIds.length > 0) {
                  setAutoReconnectStatus('trying-cache');
                  // Add cached peers as offline
                  for (const pid of cachedIds) {
                    const cached = cachedPeers[pid];
                    setPeers(prev => {
                      if (prev.find(p => p.fingerprint === pid || p.id === pid)) return prev;
                      return [...prev, {
                        id: pid, name: cached.name || `Peer-${pid.slice(0,6)}`, status: 'offline',
                        pubKey: cached.publicKeyHex || '', lastSeen: 'cached',
                        avatar: (cached.name || 'P').split(' ').map(w => w[0]).join('').slice(0,2).toUpperCase(),
                        color: '#1a3a2a', unread: 0, fingerprint: pid, isReal: true, isCached: true
                      }];
                    });
                  }
                  // After 5s timeout with no connection, show waiting status
                  setTimeout(() => {
                    setAutoReconnectStatus(prev => prev === 'connected' ? prev : 'waiting');
                  }, 5000);
                }
                addToast('Signaling server unreachable — use manual signal or wait', 'error');
              }
            } else {
              // RTCPeerManager script not loaded yet — retry after a delay
              console.warn('[GhostLink] RTCPeerManager not available yet, retrying in 500ms...');
              setTimeout(initP2P, 500);
            }
          };

          // Initialize offline queue
          const initOfflineQueue = async () => {
            if (typeof OfflineQueue !== 'undefined') {
              const SIGNALING_URL = await discoverSignaling();
              const oq = new OfflineQueue(SIGNALING_URL.replace('ws', 'http'));
              oq.on('message-delivered', ({ peerId, messageId }) => {
                setPendingMessages(prev => {
                  const n = { ...prev };
                  if (n[peerId]) n[peerId] = n[peerId].filter(m => m.id !== messageId);
                  return n;
                });
              });
              setOfflineQueue(oq);
            }
          };

          // Initialize QR invite
          const initQR = async () => {
            if (typeof QRInvite !== 'undefined') {
              const qi = new QRInvite({
                publicKeyHex: identity.publicKeyHex,
                name: identity.name,
                fingerprint: identity.fingerprint,
                keyPair: identity.keyPair || null
              });
              qrInviteRef.current = qi;
              setQrInviteData(qi);
            }
          };

          initSignalProtocol();
          initP2P();
          initOfflineQueue();
          initQR();

          return () => {
            if (peerManager) peerManager.leaveRoom();
          };
        }, [identity]);

        // ==================== ACTIONS ====================
        const initSetup = () => {
          if (!displayName.trim()) return;
          const seed = generateSeedPhrase();
          setPendingSeed(seed);
          setSeedPhrase(seed);
          setSetupStep("seed");
        };

        const setupIdentity = async () => {
          const seed = pendingSeed;
          if (!seed) return;
          const { keyPair, publicKeyHex } = await CryptoEngine.generateKeyPair();
          const fp = (await CryptoEngine.sha256(publicKeyHex)).slice(0, 16).toUpperCase();
          const masterKey = await CryptoEngine.deriveKeyFromSeed(seed);
          const identityObj = { keyPair, publicKeyHex, fingerprint: fp, name: displayName.trim() };
          const blobStr = await buildBackupBlob(identityObj, masterKey, { messages: {}, contacts: [], settings: {}, chain: [], files: [] });
          const fragments = generateBackupFragments(blobStr);
          const blobParsed = JSON.parse(blobStr);
          localStorage.setItem("gl_identity", JSON.stringify({
            name: blobParsed.name, pubKeyHex: blobParsed.pubKeyHex, fingerprint: blobParsed.fingerprint, wrappedPrivKey: blobParsed.wrappedPrivKey
          }));
          setShamirFragments(fragments);
          setIdentity(identityObj);
          setView("main");
        };

        // Step 1: validate seed + derive key, try localStorage first, else advance to fragments
        const validateAndDeriveKey = async () => {
          const words = verifyInput.trim().split(/\s+/);
          if (words.length !== 12) { setRestoreStatus("error"); return; }
          setRestoreStatus("loading");
          try {
            const masterKey = await CryptoEngine.deriveKeyFromSeed(words);
            const saved = localStorage.getItem("gl_identity");
            if (saved) {
              const d = JSON.parse(saved);
              const wk = d.wrappedPrivKey || d.wrappedKey; // backward compat
              try {
                const privKey = await CryptoEngine.unwrapPrivKey(wk, masterKey);
                setSeedPhrase(words);
                const fragMeta = localStorage.getItem("gl_fragment_meta");
                // Reconstruct fragment objects from metadata (no data, just display info)
                setIdentity({ keyPair: { privateKey: privKey }, publicKeyHex: d.pubKeyHex || d.publicKeyHex, fingerprint: d.fingerprint, name: d.name });
                setRestoreStatus("ok");
                setTimeout(() => { setShowRecovery(false); setView("main"); }, 1500);
                return;
              } catch { /* wrong seed for this localStorage — fall through to fragments */ }
            }
            // No localStorage or wrong seed — need fragments
            setMasterKeyTemp(masterKey);
            setRestoreStep("fragments");
            setRestoreStatus(null);
          } catch { setRestoreStatus("wrongseed"); }
        };

        // Step 2: combine ≥3 fragments + finalize restore
        const combineAndRestoreIdentity = async () => {
          const validFrags = fragmentInputs.map(f => f.trim()).filter(f => f.length > 10);
          if (validFrags.length < 3) { setCombineStatus("need3"); return; }
          setCombineStatus("loading");
          try {
            const result = await combineAndRestore(masterKeyTemp, validFrags);
            if (!result.success) { setCombineStatus(result.error); return; }
            setSeedPhrase(verifyInput.trim().split(/\s+/));
            setIdentity(result.identity);
            setCombineStatus("ok");
            setTimeout(() => { setShowRecovery(false); setView("main"); }, 1500);
          } catch (e) { setCombineStatus("error"); }
        };

        const getConvoMsgs = () => messages[activeConvo] || [];

        const sendMessage = async (content, type = "text", meta = {}) => {
          if (!content?.trim() && type === "text") return;
          try {
          if (replyTo) meta.replyTo = { index: replyTo.index, sender: replyTo.sender, preview: replyTo.content?.slice(0, 60) };
          if (selfDestruct > 0) meta.selfDestruct = selfDestruct;
          const block = await chain.add(identity.name, content.trim(), type, meta);
          block.encrypted = await CryptoEngine.encrypt(content.trim(), identity.fingerprint);
          setMessages(prev => ({ ...prev, [activeConvo]: [...(prev[activeConvo] || []), block] }));
          setMsgInput("");
          setReplyTo(null);
          setChainValid(await chain.verify());

          if (meta.selfDestruct) {
            setTimeout(() => {
              setMessages(prev => {
                const convo = (prev[activeConvo] || []).map(m => m.index === block.index ? { ...m, destroyed: true } : m);
                return { ...prev, [activeConvo]: convo };
              });
            }, meta.selfDestruct * 1000);
          }

          // Send via P2P if connected — check manual connections first, then peerManager
          const peerId = peers.find(p => p.id === activeConvo)?.fingerprint || String(activeConvo);
          const manualConn = manualConnectionsRef.current[peerId];
          const dataChannelReady = peerManager?.isDataChannelReady?.(peerId) || false;
          if (manualConn?.dc?.readyState === 'open') {
            try {
              const msgPayload = JSON.stringify({
                type: 'chat', sender: identity.name, content: content.trim(),
                msgType: type, meta, iv: block.encrypted.iv,
                ciphertext: block.encrypted.ciphertext, blockHash: block.hash
              });
              manualConn.dc.send(msgPayload);
            } catch (e) {
              console.error('Manual DC send failed:', e);
              addToast('Send failed on manual channel', 'error');
            }
          } else if (peerManager && (connectionStates[peerId] === 'connected' || dataChannelReady)) {
            try {
              // Try Signal Protocol encryption first, fall back to AES
              let msgPayload;
              if (sessionManager && sessionManager.getSession(peerId)) {
                try {
                  const encrypted = await sessionManager.encryptMessage(peerId, JSON.stringify({
                    type: 'chat',
                    sender: identity.name,
                    content: content.trim(),
                    msgType: type,
                    meta,
                    blockHash: block.hash
                  }));
                  msgPayload = JSON.stringify({ signalProtocol: true, envelope: encrypted });
                } catch (signalErr) {
                  console.warn('[GhostLink] Signal encrypt failed, using AES fallback:', signalErr);
                  msgPayload = JSON.stringify({
                    type: 'chat',
                    sender: identity.name,
                    content: content.trim(),
                    msgType: type,
                    meta,
                    iv: block.encrypted.iv,
                    ciphertext: block.encrypted.ciphertext,
                    blockHash: block.hash
                  });
                }
              } else {
                msgPayload = JSON.stringify({
                  type: 'chat',
                  sender: identity.name,
                  content: content.trim(),
                  msgType: type,
                  meta,
                  iv: block.encrypted.iv,
                  ciphertext: block.encrypted.ciphertext,
                  blockHash: block.hash
                });
              }
              await peerManager.sendMessage(peerId, msgPayload);
            } catch (e) {
              console.error('P2P send failed, queuing:', e);
              if (offlineQueue) {
                await offlineQueue.queueMessage(peerId, block.encrypted);
              }
            }
          } else if (offlineQueue) {
            // Peer offline — queue for later delivery
            await offlineQueue.queueMessage(peerId, block.encrypted);
            setPendingMessages(prev => ({
              ...prev,
              [peerId]: [...(prev[peerId] || []), { id: block.hash, encrypted: block.encrypted }]
            }));
          }
          } catch (e) { console.error('sendMessage error:', e); addToast(e.message || 'Failed to send message', 'error'); }
        };

        const sendFile = async (fileName, fileSize, fileObj) => {
          try {
          const id = Date.now();
          setUploadProgress(p => ({ ...p, [id]: 0 }));

          const peerId = peers.find(p => p.id === activeConvo)?.fingerprint || String(activeConvo);

          // Real P2P file transfer if available
          if (fileTransferManager && fileObj && connectionStates[peerId] === 'connected') {
            try {
              fileTransferManager.on('progress', ({ transferId, progress }) => {
                if (transferId === id) setUploadProgress(p => ({ ...p, [id]: progress }));
              });
              await fileTransferManager.sendFile(peerId, fileObj);
              const fHash = (await CryptoEngine.sha256(fileName + fileSize)).slice(0, 12);
              const fChunks = Math.ceil(fileSize / 65536);
              await sendMessage(fileName, "file", { fileSize, chunks: fChunks, hash: fHash });
              setTransferredFiles(prev => [...prev, { name: fileName, size: fileSize, from: identity?.name || 'You', ts: Date.now(), hash: fHash + '...', chunks: fChunks, encrypted: true }]);
              setUploadProgress(p => { const n = { ...p }; delete n[id]; return n; });
              return;
            } catch (e) { console.error('P2P file transfer failed:', e); addToast('File transfer failed: ' + e.message, 'error'); }
          }

          // Fallback: local-only file record (no P2P connection)
          const chunks = Math.ceil(fileSize / 65536);
          const fileHash = (await CryptoEngine.sha256(fileName + fileSize)).slice(0, 12);
          await sendMessage(fileName, "file", { fileSize, chunks, hash: fileHash });
          setTransferredFiles(prev => [...prev, { name: fileName, size: fileSize, from: identity?.name || 'You', ts: Date.now(), hash: fileHash + '...', chunks, encrypted: true }]);
          setUploadProgress(p => { const n = { ...p }; delete n[id]; return n; });
          } catch (e) { console.error('sendFile error:', e); addToast(e.message || 'Failed to send file', 'error'); }
        };

        const handleFileDrop = (e) => {
          e.preventDefault();
          setDragOver(false);
          const f = e.dataTransfer?.files;
          if (f?.length) Array.from(f).forEach(file => sendFile(file.name, file.size, file));
        };

        const pinMsg = (msg) => {
          setPinnedMsgs(prev => prev.find(m => m.index === msg.index) ? prev.filter(m => m.index !== msg.index) : [...prev, msg]);
          setMsgContext(null);
        };

        const copyMsg = (msg) => { navigator.clipboard?.writeText(msg.content); setMsgContext(null); };

        const exportChat = () => {
          const data = chain.export();
          const blob = new Blob([data], { type: "application/json" });
          const url = URL.createObjectURL(blob);
          const a = document.createElement("a");
          a.href = url; a.download = `ghostlink-export-${Date.now()}.json`;
          a.click(); URL.revokeObjectURL(url);
        };

        const generateSeedPhrase = () => {
          const arr = new Uint32Array(12);
          crypto.getRandomValues(arr);
          return Array.from(arr).map(n => BIP39_WORDS[n % BIP39_WORDS.length]);
        };

        const openRecovery = () => {
          if (!seedPhrase) setSeedPhrase(generateSeedPhrase());
          setRecoveryStep("view");
          setVerifyInput("");
          setVerifyWords(["", "", ""]);
          setVerifyResult(null);
          setRestoreStep("seed");
          setRestoreStatus(null);
          setCombineStatus(null);
          setFragmentInputs(["", "", ""]);
          setMasterKeyTemp(null);
          setShowRecovery(true);
        };

        const wipeAll = () => {
          if (!confirm("Wipe all messages and reset chain? This cannot be undone.")) return;
          setMessages({});
          chain.blocks = [];
          setChainValid(true);
          setPinnedMsgs([]);
          setActiveConvo(null);
          setShowSettings(false);
        };

        const startCall = async (type) => {
          try {
            // Check HTTPS requirement
            const isSecure = window.location.protocol === 'https:' || window.location.hostname === 'localhost' || window.location.hostname === '127.0.0.1';
            if (!isSecure) {
              addToast('Calls require HTTPS. Please use https:// or run on localhost.', 'error');
              return;
            }

            setCallType(type);
            setCallActive(true);
            setMicOn(true);
            setCamOn(type === "video");
            setScreenSharing(false);

            if (mediaHandler && activeConvo) {
              const peerId = peers.find(p => p.id === activeConvo)?.fingerprint || String(activeConvo);
              if (type === "voice") await mediaHandler.startVoiceCall(peerId);
              else if (type === "video") await mediaHandler.startVideoCall(peerId);
              else if (type === "screen") await mediaHandler.startScreenShare(peerId);
            }
          } catch (e) { 
            console.error('Call start failed:', e); 
            if (e.message.includes('HTTPS') || e.message.includes('permission')) {
              addToast('⚠️ ' + e.message, 'error');
            } else {
              addToast('Call failed: ' + e.message, 'error');
            }
            setCallActive(false); 
            setCallType(null); 
          }
        };

        const endCall = async () => {
          const peer = peers.find(p => p.id === activeConvo);
          const duration = callTimer;
          const ct = callType;

          // Stop media tracks first to free hardware immediately
          if (localStream) {
            localStream.getTracks().forEach(track => track.stop());
          }
          Object.values(remoteStreams).forEach(stream => {
            if (stream && stream.getTracks) stream.getTracks().forEach(track => track.stop());
          });

          // End via media handler
          if (mediaHandler && activeConvo) {
            const peerId = peer?.fingerprint || String(activeConvo);
            try { await mediaHandler.endCall(peerId); } catch (e) { console.warn('endCall media cleanup:', e); }
          }

          // Reset all call state
          setCallActive(false);
          setCallType(null);
          setScreenSharing(false);
          setMicOn(true);
          setCamOn(true);
          setLocalStream(null);
          setRemoteStreams({});
          setCallTimer(0);
          clearInterval(timerRef.current);

          // Add to call history
          if (peer && duration > 0) {
            setCallHistory(prev => [{
              id: Date.now(),
              peer: peer.name,
              type: ct || 'voice',
              duration,
              status: 'completed',
              dir: 'out',
              ts: Date.now(),
              avatar: peer.avatar,
              color: peer.color
            }, ...prev]);
          }
        };

        const answerIncomingCall = async (withVideo) => {
          if (!incomingCall || !mediaHandler) return;
          setCallActive(true);
          setCallType(withVideo ? 'video' : 'voice');
          setMicOn(true);
          setCamOn(withVideo);
          try {
            await mediaHandler.answerCall(incomingCall.peerId, withVideo);
          } catch (e) { console.error('Answer failed:', e); }
          setIncomingCall(null);
        };

        const rejectIncomingCall = async () => {
          if (mediaHandler && incomingCall) {
            try { await mediaHandler.endCall(incomingCall.peerId); } catch (e) {}
          }
          setIncomingCall(null);
        };

        const toggleMicReal = () => {
          if (mediaHandler) mediaHandler.toggleMic();
          setMicOn(prev => !prev);
        };

        const toggleCamReal = () => {
          if (mediaHandler) mediaHandler.toggleCamera();
          setCamOn(prev => !prev);
        };

        // Separate ref to hold QRInvite class instance (don't overwrite with plain object)
        const qrInviteRef = useRef(null);
        const [qrSvgMarkup, setQrSvgMarkup] = useState(null);

        const genInvite = async () => {
          const code = CryptoEngine.genInvite();
          setInviteCode(code);
          setShowInvite(true);
          // Auto-detect: if no signaling available, default to manual tab
          setInviteTab(signalingAvailable === false ? "manual" : "create");
          setManualSignalStep('idle');
          setManualOfferString('');
          setManualAnswerString('');
          setManualPeerInput('');

          // Generate QR code SVG if QRInvite class is available
          const qrInstance = qrInviteRef.current || qrInviteData;
          if (qrInstance && typeof qrInstance.generateQRCodeSVG === 'function') {
            try {
              const svg = await qrInstance.generateQRCodeSVG(200);
              setQrSvgMarkup(svg);
            } catch (e) { console.error('QR generation failed:', e); }
          } else if (typeof qrEncode !== 'undefined' && typeof matrixToSVG !== 'undefined') {
            // Fallback: use raw QR encode functions directly
            try {
              const qrData = JSON.stringify({ c: code, n: identity?.name || '', p: identity?.publicKeyHex || '', t: Date.now() });
              const { matrix } = qrEncode(qrData);
              const svg = matrixToSVG(matrix, matrix.length, 200);
              setQrSvgMarkup(svg);
            } catch (e) { console.error('QR fallback generation failed:', e); }
          }
        };
        const copyInvite = () => { navigator.clipboard?.writeText(inviteCode); setCopied(true); setTimeout(() => setCopied(false), 2000); };

        // ==================== MANUAL SIGNALING FUNCTIONS ====================
        const setupManualDataChannel = (dc, pc, peerId, peerInfo) => {
          const peerColor = (id) => {
            const colors = ['#1a3a2a', '#2a1a3a', '#1a2a3a', '#3a2a1a', '#2a3a1a', '#1a3a3a', '#3a1a2a', '#2a2a3a'];
            let hash = 0;
            for (let i = 0; i < (id || '').length; i++) hash = ((hash << 5) - hash) + id.charCodeAt(i);
            return colors[Math.abs(hash) % colors.length];
          };
          manualConnectionsRef.current[peerId] = { pc, dc };
          dc.onopen = () => {
            setConnectionMode('Manual Signal');
            setConnectionStates(prev => ({ ...prev, [peerId]: 'connected' }));
            setAutoReconnectStatus('connected');
            PeerCache.addPeer(peerId, {
              fingerprint: peerId, name: peerInfo.n, publicKeyHex: peerInfo.p,
              lastIce: peerInfo.i, sdpOffer: peerInfo.s
            });
            const name = peerInfo.n || `Peer-${peerId.slice(0,6)}`;
            setPeers(prev => {
              if (prev.find(p => p.fingerprint === peerId || p.id === peerId)) {
                return prev.map(p => (p.fingerprint === peerId || p.id === peerId)
                  ? { ...p, status: 'online', lastSeen: 'now', name } : p);
              }
              return [...prev, {
                id: peerId, name, status: 'online', pubKey: peerInfo.p || '',
                lastSeen: 'now', avatar: name.split(' ').map(w => w[0]).join('').slice(0,2).toUpperCase() || 'P',
                color: peerColor(peerId), unread: 0, fingerprint: peerId, isReal: true, isManual: true
              }];
            });
            addToast(`${name} connected via manual signal`, 'success');
            setManualSignalStep('connected');
          };
          dc.onclose = () => {
            setConnectionStates(prev => ({ ...prev, [peerId]: 'disconnected' }));
            setPeers(prev => prev.map(p =>
              (p.fingerprint === peerId || p.id === peerId) ? { ...p, status: 'offline', lastSeen: fmtTime(Date.now()) } : p
            ));
          };
          dc.onmessage = async (evt) => {
            try {
              const msg = JSON.parse(evt.data);
              if (msg.type === 'chat') {
                const block = await chain.add(msg.sender, msg.content, msg.msgType || 'text', msg.meta || {});
                block.encrypted = msg.iv ? { iv: msg.iv, ciphertext: msg.ciphertext } : await CryptoEngine.encrypt(msg.content, identity.fingerprint);
                setMessages(prev => ({ ...prev, [peerId]: [...(prev[peerId] || []), block] }));
                setPeers(prev => prev.map(p =>
                  (p.fingerprint === peerId || p.id === peerId) && peerId !== activeConvo
                    ? { ...p, unread: (p.unread || 0) + 1 } : p
                ));
              } else if (msg.type === 'typing') {
                setTyping(true);
                setTimeout(() => setTyping(false), 3000);
              }
            } catch (e) { console.error('Manual DC message error:', e); }
          };
          pc.oniceconnectionstatechange = () => {
            if (pc.iceConnectionState === 'disconnected' || pc.iceConnectionState === 'failed') {
              setConnectionStates(prev => ({ ...prev, [peerId]: 'disconnected' }));
              setPeers(prev => prev.map(p =>
                (p.fingerprint === peerId || p.id === peerId) ? { ...p, status: 'offline', lastSeen: fmtTime(Date.now()) } : p
              ));
            }
          };
        };

        const generateManualOffer = async () => {
          if (!identity) return;
          setManualSignalStep('creating');
          try {
            const result = await ManualSignaling.createOffer(identity);
            manualPcRef.current = result.pc;
            manualDcRef.current = result.dc;
            setManualOfferString(result.encoded);
            setManualSignalStep('offer-ready');
            // Set up the data channel handlers for when answer arrives
            setupManualDataChannel(result.dc, result.pc, 'pending-manual', { n: 'Peer', p: '', i: [], s: '' });
          } catch (e) {
            console.error('Manual offer failed:', e);
            addToast('Failed to create offer: ' + e.message, 'error');
            setManualSignalStep('idle');
          }
        };

        const processManualAnswer = async () => {
          if (!manualPeerInput.trim() || !manualPcRef.current) return;
          try {
            const peerInfo = await ManualSignaling.processAnswer(manualPeerInput.trim(), manualPcRef.current);
            // Re-register the connection under the real peer ID
            const peerId = peerInfo.f || 'manual-peer';
            const oldConn = manualConnectionsRef.current['pending-manual'];
            if (oldConn) {
              delete manualConnectionsRef.current['pending-manual'];
              manualConnectionsRef.current[peerId] = oldConn;
              setupManualDataChannel(oldConn.dc, oldConn.pc, peerId, peerInfo);
            }
            setManualPeerInfo(peerInfo);
            setManualPeerInput('');
            addToast('Processing answer...', 'info');
          } catch (e) {
            console.error('Answer processing failed:', e);
            addToast('Invalid answer signal', 'error');
          }
        };

        const processManualOffer = async () => {
          if (!manualPeerInput.trim() || !identity) return;
          if (!ManualSignaling.isManualSignal(manualPeerInput.trim())) {
            addToast('Invalid signal format', 'error');
            return;
          }
          setManualSignalStep('processing-offer');
          try {
            const result = await ManualSignaling.processOffer(manualPeerInput.trim(), identity);
            manualPcRef.current = result.pc;
            setManualAnswerString(result.encoded);
            setManualSignalStep('answer-ready');
            const peerId = result.peerInfo.f || 'manual-peer';
            setManualPeerInfo(result.peerInfo);
            // Listen for incoming data channel
            result.pc.ondatachannel = (evt) => {
              manualDcRef.current = evt.channel;
              setupManualDataChannel(evt.channel, result.pc, peerId, result.peerInfo);
            };
            setManualPeerInput('');
          } catch (e) {
            console.error('Offer processing failed:', e);
            addToast('Invalid offer signal', 'error');
            setManualSignalStep('idle');
          }
        };

        const joinPeer = async (code) => {
          // Detect if this is a manual signal (base64 SDP bundle) or a GL- invite code
          if (ManualSignaling.isManualSignal(code)) {
            setManualPeerInput(code);
            await processManualOffer();
            return;
          }
          if (!code || !code.startsWith('GL-')) { addToast('Invalid code. Use GL- invite or paste a manual signal.', 'error'); return; }
          try {
            if (peerManager) {
              await peerManager.joinRoom(code);
              addToast('Connecting to peer...', 'info');
            } else if (typeof RTCPeerManager !== 'undefined' && identity) {
              // peerManager not set yet — create one on the fly as fallback
              const SIG_URL = window.GHOSTLINK_SIGNAL_URL || window.ghostlink?.signalingUrl
                || (!window.location.hostname || window.location.hostname === 'localhost'
                    ? 'ws://localhost:3001'
                    : `ws://${window.location.hostname}:3001`);
              const pm = new RTCPeerManager(SIG_URL, {
                peerId: identity.fingerprint,
                id: identity.fingerprint,
                name: identity.name,
                publicKey: identity.publicKeyHex,
                publicKeyHex: identity.publicKeyHex,
                keyPair: identity.keyPair || null
              });
              setPeerManager(pm);
              try { await pm.connect(); } catch (e) { console.warn('[GhostLink] Signaling connect failed:', e.message); }
              await pm.joinRoom(code);
              addToast('Connecting to peer...', 'info');
            } else {
              addToast('P2P not initialized — check your connection and try again', 'error');
            }
            setShowInvite(false);
          } catch (e) {
            console.error('Join failed:', e);
            addToast('Join failed: ' + e.message, 'error');
          }
        };

        const themes = {
          phantom: { bg: "#0a0a0f", bg2: "#08080d", bg3: "#0c0c13", accent: "#00ffa3", accent2: "#00d4ff", accent3: "#b347ff" },
          crimson: { bg: "#0f0a0a", bg2: "#0d0808", bg3: "#130c0c", accent: "#ff4466", accent2: "#ff8844", accent3: "#ffcc00" },
          arctic: { bg: "#0a0d0f", bg2: "#080b0d", bg3: "#0c1013", accent: "#44ddff", accent2: "#8899ff", accent3: "#cc88ff" },
          void: { bg: "#050508", bg2: "#030305", bg3: "#080810", accent: "#8866ff", accent2: "#ff66aa", accent3: "#44ffcc" },
        };
        const th = themes[settings.theme] || themes.phantom;

        // ==================== GLOBAL STYLES ====================
        const globalCSS = `
          @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;500;600;700;800&family=Space+Grotesk:wght@300;400;500;600;700&display=swap');
          ::-webkit-scrollbar { width: 4px; }
          ::-webkit-scrollbar-track { background: transparent; }
          ::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.06); border-radius: 4px; }
          @keyframes ghostFloat { 0%,100% { transform: translateY(0); } 50% { transform: translateY(-12px); } }
          @keyframes fadeIn { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: translateY(0); } }
          @keyframes fadeInScale { from { opacity:0; transform: scale(0.95); } to { opacity:1; transform: scale(1); } }
          @keyframes pulse { 0%,100% { opacity: 0.4; } 50% { opacity: 1; } }
          @keyframes ripple { 0% { transform:scale(1); opacity:0.3; } 100% { transform:scale(3); opacity:0; } }
          @keyframes progress { from { width:0; } to { width:100%; } }
          @keyframes shake { 0%,100% { transform:translateX(0); } 25% { transform:translateX(-4px); } 75% { transform:translateX(4px); } }

            button { -webkit-tap-highlight-color: transparent; }
          }
          @media (hover: none) and (pointer: coarse) {
            button:active { opacity: 0.7; }
          }
        `;

        // Tag helper
        const Tag = ({ color, children, icon }) => (
          <span style={{ display: "inline-flex", alignItems: "center", gap: 3, padding: "2px 8px", borderRadius: 6, background: `${color}15`, color, fontSize: 10, fontWeight: 600, letterSpacing: 0.5 }}>
            {icon && <I t={icon} s={10} c={color} />}{children}

        // Button helper
        const Btn = ({ children, onClick, style, ghost, small, accent, ...rest }) => (

        // ==================== SPLASH ====================
        if (view === "splash") return (
          <div style={{ display: "flex", flexDirection: "column", alignItems: "center", justifyContent: "center", height: "100vh", background: `radial-gradient(ellipse at center, ${th.bg} 0%, #010409 70%)`, position: "relative", overflow: "hidden", fontFamily: "'JetBrains Mono', monospace" }}>
            <style>{globalCSS}</style>
            {[15, 30, 45, 60, 75, 85].map((t, i) => <div key={i} style={{ position: "absolute", width: "100%", height: 1, top: `${t}%`, background: `linear-gradient(90deg, transparent, ${th.accent}15, transparent)` }} />)}
            <div style={{ animation: "ghostFloat 2s ease-in-out infinite", filter: `drop-shadow(0 0 40px ${th.accent}66)`, marginBottom: 20 }}><I t="ghost" s={80} c={th.accent} /></div>
            <div style={{ fontSize: isMobile ? 28 : 44, fontWeight: 800, letterSpacing: isMobile ? 6 : 10, background: `linear-gradient(135deg, ${th.accent}, ${th.accent2}, ${th.accent3})`, WebkitBackgroundClip: "text", WebkitTextFillColor: "transparent", marginBottom: 8 }}>GHOSTLINK</div>
            <div style={{ fontSize: 11, color: "#4a5568", letterSpacing: 6, textTransform: "uppercase" }}>Zero Trust · Zero Trace · Zero Servers</div>
            <div style={{ marginTop: 40, display: "flex", gap: 5 }}>
              {[0, 1, 2, 3].map(i => <div key={i} style={{ width: 6, height: 6, borderRadius: "50%", background: th.accent, animation: "pulse 1.2s ease-in-out infinite", animationDelay: `${i * 0.25}s` }} />)}
            </div>
            <div style={{ position: "absolute", top: 0, left: 0, right: 0, bottom: 0, pointerEvents: "none", overflow: "hidden" }}>
              <div style={{ position: "absolute", width: "100%", height: "30%", background: `linear-gradient(transparent, ${th.accent}05, transparent)`, animation: "scanline 4s linear infinite" }} />
            </div>
          </div>
        );

        // ==================== SETUP ====================
        if (view === "setup") return (
          <div style={{ display: "flex", flexDirection: "column", alignItems: "center", justifyContent: "center", height: "100vh", background: th.bg, padding: 24, fontFamily: "'JetBrains Mono', monospace", color: "#e0e0e8" }}>
            <style>{globalCSS}</style>
            <div style={{ background: `linear-gradient(145deg, #111118, #0d0d14)`, border: `1px solid ${th.accent}18`, borderRadius: 20, padding: "40px 36px", maxWidth: 460, width: "100%", animation: "fadeInScale 0.5s ease" }}>
              <div style={{ textAlign: "center", marginBottom: 28 }}>
                <div style={{ color: th.accent, marginBottom: 14 }}><I t="ghost" s={52} c={th.accent} /></div>
                <h2 style={{ fontSize: 26, fontWeight: 800, margin: 0, letterSpacing: 3, background: `linear-gradient(135deg, ${th.accent}, ${th.accent2})`, WebkitBackgroundClip: "text", WebkitTextFillColor: "transparent" }}>GHOSTLINK</h2>
                <p style={{ fontSize: 11, color: "#5a5a6a", marginTop: 6, lineHeight: 1.6 }}>
                  Your private key never leaves this device. All communication is peer-to-peer, end-to-end encrypted, and blockchain-verified.
                </p>
              </div>

              <div style={{ background: `${th.accent}06`, border: `1px solid ${th.accent}12`, borderRadius: 12, padding: 14, marginBottom: 20 }}>
                {[
                  { icon: "shield", label: "AES-256-GCM + ECDH P-256 Encryption", color: th.accent },
                  { icon: "chain", label: "SHA-256 Blockchain Message Integrity", color: th.accent2 },
                  { icon: "lock", label: "P2P Direct · Zero Servers · Zero Metadata", color: th.accent3 },
                  { icon: "timer", label: "Self-Destructing Messages", color: "#ff8844" },
                  { icon: "file", label: "Chunked Encrypted File Transfer", color: "#44aaff" },
                ].map((f, i) => (
                  <div key={i} style={{ display: "flex", alignItems: "center", gap: 10, padding: "5px 0" }}>
                    <I t={f.icon} s={15} c={f.color} />
                    <span style={{ fontSize: 11, color: "#7a7a8a" }}>{f.label}</span>
                  </div>
                ))}
              </div>

              {setupStep === "name" ? (
                <>
                  <div style={{ marginBottom: 6 }}>
                    <label style={{ fontSize: 10, color: "#5a5a6a", letterSpacing: 1, textTransform: "uppercase", marginBottom: 6, display: "block" }}>Display Name</label>
                    <input value={displayName} onChange={e => setDisplayName(e.target.value)}
                      onKeyDown={e => e.key === "Enter" && initSetup()}
                      placeholder="Enter your alias..."
                      style={{ width: "100%", background: "rgba(255,255,255,0.04)", border: "1px solid rgba(255,255,255,0.08)", borderRadius: 10, padding: "12px 14px", color: "#e0e0e8", fontSize: 13, fontFamily: "inherit" }} />
                  </div>
                  <div style={{ fontSize: 9, color: "#3a3a4a", marginBottom: 20, paddingLeft: 2 }}>This name is visible only to connected peers</div>
                  <button onClick={initSetup} disabled={!displayName.trim()} style={{
                    width: "100%", background: displayName.trim() ? `linear-gradient(135deg, ${th.accent}, ${th.accent2})` : "rgba(255,255,255,0.04)",
                    border: "none", borderRadius: 12, padding: "14px 0", color: displayName.trim() ? "#000" : "#3a3a4a",
                    fontSize: 13, fontWeight: 700, cursor: displayName.trim() ? "pointer" : "default", fontFamily: "inherit",
                    letterSpacing: 1.5, transition: "all 0.3s ease", boxShadow: displayName.trim() ? `0 0 30px ${th.accent}30` : "none",
                  }}>
                    GENERATE IDENTITY
                  </button>
                </>
              ) : (
                <>
                  <div style={{ fontSize: 11, color: "#5a5a6a", marginBottom: 14, lineHeight: 1.7 }}>
                    Write down your <span style={{ color: th.accent }}>12-word seed phrase</span> and store it offline. This is the <strong style={{ color: "#e0e0e8" }}>only way</strong> to recover your identity on a new device.
                  </div>
                  <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr 1fr", gap: 6, marginBottom: 14 }}>
                    {(pendingSeed || []).map((word, i) => (
                      <div key={i} style={{ background: `${th.accent}08`, border: `1px solid ${th.accent}18`, borderRadius: 8, padding: "7px 10px", display: "flex", alignItems: "center", gap: 7 }}>
                        <span style={{ fontSize: 8, color: "#3a3a4a", fontFamily: "monospace", minWidth: 14 }}>{String(i+1).padStart(2,"0")}</span>
                        <span style={{ fontSize: 12, fontWeight: 600, color: th.accent, letterSpacing: 0.5 }}>{word}</span>
                      </div>
                    ))}
                  </div>
                  <div style={{ background: "rgba(255,136,68,0.06)", border: "1px solid rgba(255,136,68,0.2)", borderRadius: 8, padding: "10px 12px", marginBottom: 16, fontSize: 10, color: "#ff8844", lineHeight: 1.6 }}>
                    ⚠ Never store this digitally. Write it on paper. Anyone with these words can access your identity.
                  </div>
                  <button onClick={setupIdentity} style={{
                    width: "100%", background: `linear-gradient(135deg, ${th.accent}, ${th.accent2})`,
                    border: "none", borderRadius: 12, padding: "14px 0", color: "#000",
                    fontSize: 13, fontWeight: 700, cursor: "pointer", fontFamily: "inherit",
                    letterSpacing: 1.5, transition: "all 0.3s ease", boxShadow: `0 0 30px ${th.accent}30`,
                  }}>
                    I'VE WRITTEN IT DOWN — ACTIVATE
                  </button>
                  <button onClick={() => setSetupStep("name")} style={{ marginTop: 8, width: "100%", background: "transparent", border: "none", color: "#4a5568", cursor: "pointer", fontFamily: "inherit", fontSize: 11, padding: 6 }}>
                    ← Back
                  </button>
                </>
              )}
            </div>
          </div>
        );

        // ==================== CALL OVERLAY ====================
        if (callActive) {
          const peer = peers.find(p => p.id === activeConvo);
          return (
            <div style={{ position: "fixed", inset: 0, background: `radial-gradient(ellipse at center, ${th.bg} 0%, #010409 80%)`, display: "flex", flexDirection: "column", alignItems: "center", justifyContent: "center", zIndex: 200, fontFamily: "'JetBrains Mono', monospace", color: "#e0e0e8" }}>
              <style>{globalCSS}</style>
              {[1, 2, 3].map(i => <div key={i} style={{ position: "absolute", width: 180 + i * 90, height: 180 + i * 90, borderRadius: "50%", border: `1px solid ${th.accent}${Math.round(15 / i).toString(16)}`, animation: `ripple ${3 + i}s ease-out infinite`, animationDelay: `${i * 0.5}s` }} />)}

              <div style={{ width: 88, height: 88, borderRadius: 22, background: `linear-gradient(135deg, ${peer?.color || "#1a3a2a"}, ${peer?.color || "#1a3a2a"}88)`, display: "flex", alignItems: "center", justifyContent: "center", fontSize: 28, fontWeight: 700, marginBottom: 16, border: `2px solid ${th.accent}33` }}>{peer?.avatar || "?"}</div>
              <div style={{ fontSize: 22, fontWeight: 700, marginBottom: 6 }}>{peer?.name || "Unknown"}</div>
              <div style={{ display: "flex", gap: 6, marginBottom: 8 }}>
                <Tag color={th.accent} icon="lock">E2E ENCRYPTED</Tag>
                <Tag color={th.accent2}>{callType === "video" ? "VIDEO" : callType === "screen" ? "SCREEN SHARE" : "VOICE"}</Tag>
              </div>
              <div style={{ fontSize: 32, fontWeight: 300, color: th.accent, marginBottom: 40, letterSpacing: 6, fontFamily: "'Space Grotesk', sans-serif" }}>{fmtCallT(callTimer)}</div>

              {(callType === "video" || screenSharing) && (
                <div style={{ width: "100%", maxWidth: 480, aspectRatio: "16/9", background: "#111", borderRadius: 12, overflow: "hidden", position: "relative", marginBottom: 36 }}>
                  {Object.values(remoteStreams).map((stream, i) => (
                    <video key={i} autoPlay playsInline ref={el => { if (el && stream) el.srcObject = stream; }} style={{ width: "100%", height: "100%", objectFit: "cover" }} />
                  ))}
                  {localStream && (
                    <video autoPlay playsInline muted ref={el => { if (el && localStream) el.srcObject = localStream; }} style={{ position: "absolute", bottom: 8, right: 8, width: 120, height: 90, borderRadius: 8, objectFit: "cover", border: `2px solid ${th.accent}` }} />
                  )}
                  {!Object.keys(remoteStreams).length && (
                    <div style={{ position: "absolute", inset: 0, display: "flex", alignItems: "center", justifyContent: "center", color: "#555", fontSize: 13 }}>Waiting for peer video...</div>
                  )}
                </div>
              )}

              <div style={{ display: "flex", gap: 16 }}>
                {[
                  { icon: micOn ? "mic" : "micOff", bg: micOn ? "rgba(255,255,255,0.08)" : "#ff4444", action: () => toggleMicReal() },
                  ...(callType === "video" ? [{ icon: camOn ? "video" : "vidOff", bg: camOn ? "rgba(255,255,255,0.08)" : "#ff4444", action: () => toggleCamReal() }] : []),
                  { icon: "screen", bg: screenSharing ? th.accent + "33" : "rgba(255,255,255,0.08)", action: () => setScreenSharing(!screenSharing) },
                  { icon: "phone", bg: "#ff3344", action: () => endCall() },
                ].map((b, i) => (
                  <button key={i} onClick={b.action} style={{ width: 56, height: 56, borderRadius: "50%", border: "none", background: b.bg, color: "#fff", cursor: "pointer", display: "flex", alignItems: "center", justifyContent: "center", transition: "all 0.2s ease", boxShadow: `0 0 20px ${b.bg}33` }}>
                    <I t={b.icon} s={22} />
                  </button>
                ))}
              </div>
            </div>
          );
        }

        // ==================== MAIN VIEW ====================
        const activePeer = peers.find(p => p.id === activeConvo);
        const convoMsgs = getConvoMsgs();
        const filteredMsgs = searchQuery ? convoMsgs.filter(m => m.content?.toLowerCase().includes(searchQuery.toLowerCase())) : convoMsgs;

        return (
          <div style={{ width: "100%", height: "100vh", background: th.bg, color: "#e0e0e8", fontFamily: "'JetBrains Mono', monospace", overflow: "hidden", position: "relative", display: "flex" }}>
            <style>{globalCSS}</style>

            {/* ══════ TOAST NOTIFICATIONS ══════ */}
            {toasts.length > 0 && (
              <div style={{ position: 'fixed', top: 12, right: 12, zIndex: 99999, display: 'flex', flexDirection: 'column', gap: 8 }}>
                {toasts.map(t => (
                  <div key={t.id} style={{
                    padding: '10px 16px', borderRadius: 10, fontSize: 12, fontWeight: 500,
                    fontFamily: "'JetBrains Mono', monospace", animation: 'fadeIn 0.3s ease',

                          <Tag color={th.accent3}>SHA-256</Tag>

                    {filteredMsgs.map((msg, i) => {

                        <div key={i} style={{ animation: "fadeIn 0.25s ease", animationFillMode: "both", animationDelay: `${Math.min(i, 10) * 0.02}s`, alignSelf: isMe ? "flex-end" : "flex-start", maxWidth: isMobile ? "88%" : "72%", position: "relative" }}

                              <span style={{ color: th.accent2 }}>{msg.meta.replyTo.sender}:</span> {msg.meta.replyTo.preview}
                            </div>

                          <div onClick={() => setShowBlockInfo(msg)} style={{
                            padding: msg.type === "file" ? "10px 14px" : "9px 14px",
                            borderRadius: isMe ? "14px 14px 4px 14px" : "14px 14px 14px 4px",
                            background: isMe ? `linear-gradient(135deg, ${th.accent}14, ${th.accent2}0a)` : "rgba(255,255,255,0.03)",
                            border: isMe ? `1px solid ${th.accent}18` : "1px solid rgba(255,255,255,0.05)",
                            cursor: "pointer", transition: "all 0.15s ease",
                          }}>
                            {msg.type === "file" ? (
                              (() => {
                                const fileData = transferredFiles.find(f => f.name === msg.content && Math.abs(f.size - (msg.meta?.fileSize || 0)) < 1000);
                                return (
                                  <div style={{ display: "flex", alignItems: "center", gap: 10 }}>
                                    <div style={{ width: 36, height: 36, borderRadius: 8, background: `${th.accent}12`, display: "flex", alignItems: "center", justifyContent: "center" }}>

                                    </div>
                                    <div style={{ flex: 1 }}>
                                      <div style={{ fontSize: 12, fontWeight: 600 }}>{msg.content}</div>
                                      <div style={{ fontSize: 9, color: "#4a5568", marginTop: 2 }}>{msg.meta?.chunks} chunks · {fmtSize(msg.meta?.fileSize || 0)}</div>

                                    {fileData?.url && (
                                      <a href={fileData.url} download={fileData.name} style={{

                                        background: `${th.accent}15`, color: th.accent,
                                        textDecoration: "none", fontSize: 14
                                      }}>
                                        ↓

                                  </div>

                            <div style={{ fontSize: 9.5, color: "#3a3a4a", marginTop: 4, display: "flex", alignItems: "center", gap: 5, justifyContent: isMe ? "flex-end" : "flex-start" }}>

                              <span style={{ color: th.accent, fontSize: 4 }}>●</span>
                              <span>#{msg.index}</span>
                              <span style={{ color: th.accent, fontSize: 8, fontFamily: "monospace" }}>{msg.hash?.slice(0, 8)}</span>
                              {msg.meta?.selfDestruct && <I t="timer" s={9} c="#ff8844" />}
                              {pinnedMsgs.find(m => m.index === msg.index) && <I t="pin" s={9} c={th.accent2} />}
                            </div>
                          </div>
                        </div>
                      );
                    })}

                    {typing && (
                      <div style={{ alignSelf: "flex-start", padding: "10px 16px", borderRadius: "14px 14px 14px 4px", background: "rgba(255,255,255,0.03)", border: "1px solid rgba(255,255,255,0.05)", display: "flex", gap: 4, alignItems: "center" }}>
                        {[0, 1, 2].map(i => <div key={i} style={{ width: 6, height: 6, borderRadius: "50%", background: th.accent, animation: "typing 1.2s ease-in-out infinite", animationDelay: `${i * 0.2}s` }} />)}
                      </div>
                    )}

                    {Object.entries(uploadProgress).map(([id, pct]) => (
                      <div key={id} style={{ alignSelf: "flex-end", maxWidth: "72%", padding: "10px 14px", borderRadius: "14px 14px 4px 14px", background: `${th.accent}0a`, border: `1px solid ${th.accent}18` }}>
                        <div style={{ fontSize: 11, color: "#8a8a9a", marginBottom: 6, display: "flex", alignItems: "center", gap: 6 }}>
                          <I t="ul" s={12} c={th.accent} /> Encrypting & sending... {Math.round(pct)}%
                        </div>
                        <div style={{ width: "100%", height: 3, background: "rgba(255,255,255,0.06)", borderRadius: 2, overflow: "hidden" }}>
                          <div style={{ width: `${pct}%`, height: "100%", background: `linear-gradient(90deg, ${th.accent}, ${th.accent2})`, borderRadius: 2, transition: "width 0.2s ease" }} />
                        </div>
                      </div>
                    ))}

                    <div ref={chatEndRef} />

                  {/* Reply preview */}
                  {replyTo && (
                    <div style={{ padding: "8px 18px", borderTop: "1px solid rgba(255,255,255,0.04)", display: "flex", alignItems: "center", gap: 10, background: `${th.accent2}08`, animation: "fadeIn 0.15s ease" }}>
                      <I t="reply" s={14} c={th.accent2} />
                      <div style={{ flex: 1, fontSize: 11, color: "#6a6a7a", overflow: "hidden", textOverflow: "ellipsis", whiteSpace: "nowrap" }}>
                        <span style={{ color: th.accent2 }}>{replyTo.sender}:</span> {replyTo.content?.slice(0, 80)}
                      </div>
                      <button onClick={() => setReplyTo(null)} style={{ background: "none", border: "none", color: "#4a5568", cursor: "pointer" }}><I t="x" s={14} /></button>
                    </div>

                  {/* ── INPUT BAR ── */}
                  {showEmojiPicker && (
                    <div onClick={e => e.stopPropagation()} style={{ position: "absolute", bottom: 64, left: isMobile ? 0 : 14, right: isMobile ? 0 : "auto", background: "#151520", border: "1px solid rgba(255,255,255,0.08)", borderRadius: isMobile ? "12px 12px 0 0" : 12, padding: 10, display: "flex", flexWrap: "wrap", gap: 4, width: isMobile ? "100%" : 260, zIndex: 50, animation: "fadeInScale 0.15s ease", boxShadow: "0 -10px 40px rgba(0,0,0,0.5)" }}>
                      {EMOJIS.map((em, i) => (
                        <button key={i} onClick={() => { setMsgInput(p => p + em); setShowEmojiPicker(false); }} style={{ background: "none", border: "none", cursor: "pointer", fontSize: isMobile ? 24 : 20, padding: isMobile ? 6 : 3, borderRadius: 6, lineHeight: 1, transition: "background 0.1s" }}

                    </button>

                      <I t="emoji" s={15} />
                    </button>

                    {!isMobile && (
                      <button onClick={() => setSelfDestruct(selfDestruct === 0 ? 30 : selfDestruct === 30 ? 60 : selfDestruct === 60 ? 300 : 0)} title={selfDestruct ? `Self-destruct: ${selfDestruct}s` : "Self-destruct off"} style={{
                        width: 36, height: 36, borderRadius: 8, border: "none",
                        background: selfDestruct ? `${th.accent3}15` : "rgba(255,255,255,0.03)",
                        color: selfDestruct ? th.accent3 : "#4a5568", cursor: "pointer",
                        display: "flex", alignItems: "center", justifyContent: "center", flexShrink: 0, position: "relative",

                      </button>

                    <input value={msgInput} onChange={e => setMsgInput(e.target.value)}

                      width: isMobile ? 44 : 40, height: isMobile ? 44 : 40, borderRadius: 10, border: "none",

                      <I t="send" s={16} />
                    </button>
                  </div>
                </>

            {/* ══════ MESSAGE CONTEXT MENU ══════ */}

                  {[
                    { icon: "reply", label: "Reply", action: () => { setReplyTo(msgContext); setMsgContext(null); } },
                    { icon: "pin", label: pinnedMsgs.find(m => m.index === msgContext.index) ? "Unpin" : "Pin", action: () => pinMsg(msgContext) },
                    { icon: "copy", label: "Copy", action: () => copyMsg(msgContext) },

                      onMouseEnter={e => e.currentTarget.style.background = "rgba(255,255,255,0.05)"}
                      onMouseLeave={e => e.currentTarget.style.background = "transparent"}>
                      <I t={item.icon} s={14} c="#6a6a7a" />{item.label}
                    </button>
                  ))}
                </div>
              </div>
            )}

            {/* ══════ BLOCK INFO MODAL ══════ */}
            {showBlockInfo && (
              <div style={{ position: "fixed", inset: 0, background: "rgba(0,0,0,0.85)", backdropFilter: "blur(10px)", display: "flex", alignItems: isMobile ? "flex-end" : "center", justifyContent: "center", zIndex: 100, padding: isMobile ? 0 : 16 }} onClick={() => setShowBlockInfo(null)}>
                <div onClick={e => e.stopPropagation()} style={{ background: "#111118", border: `1px solid ${th.accent}18`, borderRadius: isMobile ? "18px 18px 0 0" : 18, padding: isMobile ? "20px 16px" : 28, maxWidth: 540, width: "100%", animation: "fadeInScale 0.2s ease", maxHeight: "85vh", overflowY: "auto" }}>
                  <div style={{ display: "flex", alignItems: "center", justifyContent: "space-between", marginBottom: 22 }}>
                    <div style={{ display: "flex", alignItems: "center", gap: 8 }}>
                      <I t="chain" s={20} c={th.accent} />
                      <span style={{ fontSize: 17, fontWeight: 700, letterSpacing: 1.5 }}>BLOCK #{showBlockInfo.index}</span>
                    </div>
                    <button onClick={() => setShowBlockInfo(null)} style={{ background: "none", border: "none", color: "#6a6a7a", cursor: "pointer" }}><I t="x" s={18} /></button>
                  </div>
                  {[
                    { label: "Current Hash", value: showBlockInfo.hash, color: th.accent },
                    { label: "Previous Hash", value: showBlockInfo.prevHash, color: th.accent2 },
                    { label: "Nonce", value: String(showBlockInfo.nonce), color: th.accent3 },
                    { label: "Sender", value: showBlockInfo.sender, color: "#e0e0e8" },
                    { label: "Type", value: showBlockInfo.type?.toUpperCase(), color: "#e0e0e8" },
