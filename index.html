                                <span style={{ fontSize: 8, fontFamily: "monospace", color: "#3a3a4a", flex: 1, overflow: "hidden", textOverflow: "ellipsis", whiteSpace: "nowrap" }}>{f.check}…</span>
                                {f.distributed && <span style={{ fontSize: 8, color: th.accent }}>{f.peerName}</span>}
                                <button onClick={() => navigator.clipboard?.writeText(f.data)} style={{ background: `${th.accent2}15`, border: "none", borderRadius: 6, padding: "4px 8px", color: th.accent2, cursor: "pointer", fontSize: 9, fontFamily: "inherit", fontWeight: 600, flexShrink: 0 }}>COPY</button>
                                {!f.distributed && peers.filter(p => p.status === 'online').length > 0 ? (
                                  <select onChange={(e) => { if (e.target.value) { sendFragmentToPeer(f, e.target.value); e.target.value = ''; }}}
                                    style={{ background: `${th.accent}15`, border: `1px solid ${th.accent}30`, borderRadius: 6, padding: "4px 8px", color: th.accent, cursor: "pointer", fontSize: 9, fontFamily: "inherit", fontWeight: 600, flexShrink: 0, maxWidth: 100 }}>
                                    <option value="">Send to...</option>
                                    {peers.filter(p => p.status === 'online').map(p => (
                                      <option key={p.id} value={p.fingerprint || p.id}>{p.name}</option>
                                    ))}
                                  </select>
                                ) : !f.distributed && (
                                  <button onClick={() => {
                                    const name = prompt("Who are you giving this fragment to?");
                                    if (name) {
                                      const updated = markFragmentDistributed(f.id, name);
                                      setShamirFragments(frags => frags.map(frag => {
                                        const meta = updated.find(m => m.id === frag.id);
                                        return meta ? { ...frag, distributed: meta.distributed, peerName: meta.peerName } : frag;
                                      }));
                                    }
                                  }} style={{ background: "rgba(255,255,255,0.04)", border: "none", borderRadius: 6, padding: "4px 8px", color: "#5a5a6a", cursor: "pointer", fontSize: 9, fontFamily: "inherit", flexShrink: 0 }}>GIVE</button>
                                )}
                              </div>
                            ))}
                            <div style={{ fontSize: 9, color: "#3a3a4a", marginTop: 6 }}>Any 3 fragments reconstruct your key. Distribute to different trusted peers.</div>
                          </div>
                        );
                      })() : (
                        <div style={{ marginTop: 12, fontSize: 9, color: "#3a3a4a" }}>Fragments generated at setup. Re-enter your seed phrase in Restore tab to regenerate.</div>
                      )}
                    </>
                  )}

                  {recoveryStep === "verify" && (
                    <>
                      <div style={{ fontSize: 11, color: "#5a5a6a", marginBottom: 16, lineHeight: 1.7 }}>
                        Prove you've saved your seed phrase by entering words <span style={{ color: th.accent }}>3, 7, and 11</span> below.
                      </div>
                      <div style={{ display: "flex", gap: 8, marginBottom: 12 }}>
                        {[2, 6, 10].map((idx, pos) => {
                          const correct = verifyResult !== null && verifyWords[pos].trim().toLowerCase() === (seedPhrase || [])[idx];
                          const wrong = verifyResult === "fail" && verifyWords[pos].trim().toLowerCase() !== (seedPhrase || [])[idx];
                          return (
                            <div key={idx} style={{ flex: 1 }}>
                              <label style={{ fontSize: 9, color: "#4a5568", letterSpacing: 1, textTransform: "uppercase", marginBottom: 4, display: "block" }}>Word #{idx + 1}</label>
                              <input value={verifyWords[pos]} onChange={e => { setVerifyResult(null); setVerifyWords(w => w.map((v, i) => i === pos ? e.target.value : v)); }} placeholder={`word ${idx + 1}`}
                                style={{ width: "100%", background: "rgba(255,255,255,0.04)", border: `1px solid ${correct ? th.accent : wrong ? "#ff4444" : "rgba(255,255,255,0.08)"}`, borderRadius: 8, padding: "10px 12px", color: correct ? th.accent : wrong ? "#ff4444" : "#e0e0e8", fontSize: 12, fontFamily: "'JetBrains Mono', monospace" }} />
                            </div>
                          );
                        })}
                      </div>
                      {verifyResult === "ok" && (
                        <div style={{ padding: "10px 14px", borderRadius: 8, background: `${th.accent}10`, border: `1px solid ${th.accent}25`, fontSize: 11, color: th.accent, marginBottom: 10, display: "flex", alignItems: "center", gap: 8 }}>
                          <I t="check" s={14} c={th.accent} /> Backup verified! Your seed phrase is saved correctly.
                        </div>
                      )}
                      {verifyResult === "fail" && (
                        <div style={{ padding: "10px 14px", borderRadius: 8, background: "rgba(255,68,68,0.08)", border: "1px solid rgba(255,68,68,0.2)", fontSize: 11, color: "#ff4444", marginBottom: 10, display: "flex", alignItems: "center", gap: 8 }}>
                          <I t="x" s={14} c="#ff4444" /> One or more words are incorrect. Check your backup.
                        </div>
                      )}
                      <Btn accent style={{ width: "100%" }} onClick={() => {
                        const checks = [2, 6, 10].map((idx, pos) => verifyWords[pos].trim().toLowerCase() === (seedPhrase || [])[idx]);
                        setVerifyResult(checks.every(Boolean) ? "ok" : "fail");
                      }}>
                        <I t="shield" s={15} c="#000" /> VERIFY BACKUP
                      </Btn>
                    </>
                  )}

                  {recoveryStep === "restore" && (
                    <>
                      {restoreStep === "seed" ? (
                        <>
                          <div style={{ fontSize: 11, color: "#5a5a6a", marginBottom: 14, lineHeight: 1.7 }}>
                            <strong style={{ color: "#8a8a9a" }}>Step 1 of 2</strong> — Enter your 12-word seed phrase. If this device has a saved identity, restore completes here. Otherwise you'll paste fragments.
                          </div>
                          <textarea value={verifyInput} onChange={e => { setVerifyInput(e.target.value); setRestoreStatus(null); }} placeholder="word1 word2 word3 ... word12"
                            rows={3} style={{ width: "100%", background: "rgba(255,255,255,0.04)", border: `1px solid ${restoreStatus === "error" || restoreStatus === "wrongseed" ? "#ff4444" : restoreStatus === "ok" ? th.accent : "rgba(255,255,255,0.08)"}`, borderRadius: 10, padding: "12px 14px", color: "#e0e0e8", fontSize: 13, fontFamily: "'JetBrains Mono', monospace", resize: "none", marginBottom: 10 }} />
                          {restoreStatus === "loading" && <div style={{ padding: "9px 12px", borderRadius: 8, background: `${th.accent2}10`, border: `1px solid ${th.accent2}25`, fontSize: 10, color: th.accent2, marginBottom: 10 }}>Deriving key via PBKDF2 · 100,000 iterations…</div>}
                          {restoreStatus === "ok" && <div style={{ padding: "9px 12px", borderRadius: 8, background: `${th.accent}10`, border: `1px solid ${th.accent}25`, fontSize: 10, color: th.accent, marginBottom: 10 }}>Identity restored. Redirecting…</div>}
                          {restoreStatus === "error" && <div style={{ padding: "9px 12px", borderRadius: 8, background: "rgba(255,68,68,0.08)", border: "1px solid rgba(255,68,68,0.2)", fontSize: 10, color: "#ff4444", marginBottom: 10 }}>Enter exactly 12 words.</div>}
                          {restoreStatus === "wrongseed" && <div style={{ padding: "9px 12px", borderRadius: 8, background: "rgba(255,68,68,0.08)", border: "1px solid rgba(255,68,68,0.2)", fontSize: 10, color: "#ff4444", marginBottom: 10 }}>Wrong seed phrase — decryption failed.</div>}
                          <Btn accent style={{ width: "100%" }} onClick={validateAndDeriveKey} disabled={restoreStatus === "loading" || restoreStatus === "ok"}>
                            <I t="key" s={15} c="#000" /> DERIVE KEY & CHECK DEVICE
                          </Btn>
                        </>
                      ) : (
                        <>
                          <div style={{ fontSize: 11, color: "#5a5a6a", marginBottom: 14, lineHeight: 1.7 }}>
                            <strong style={{ color: "#8a8a9a" }}>Step 2 of 2</strong> — No saved identity found. Paste at least 3 Shamir fragments from your trusted peers.
                          </div>
                          {[0,1,2].map(i => (
                            <div key={i} style={{ marginBottom: 8 }}>
                              <label style={{ fontSize: 9, color: "#4a5568", letterSpacing: 1, textTransform: "uppercase", marginBottom: 4, display: "block" }}>Fragment {i+1}</label>
                              <textarea value={fragmentInputs[i]} onChange={e => setFragmentInputs(fi => fi.map((v,j) => j===i ? e.target.value : v))} placeholder="Paste hex fragment data..."
                                rows={2} style={{ width: "100%", background: "rgba(255,255,255,0.04)", border: "1px solid rgba(255,255,255,0.08)", borderRadius: 8, padding: "8px 10px", color: "#e0e0e8", fontSize: 10, fontFamily: "'JetBrains Mono', monospace", resize: "none" }} />
                            </div>
                          ))}
                          {combineStatus === "need3" && <div style={{ padding: "9px 12px", borderRadius: 8, background: "rgba(255,68,68,0.08)", border: "1px solid rgba(255,68,68,0.2)", fontSize: 10, color: "#ff4444", marginBottom: 8 }}>Need at least 3 non-empty fragments.</div>}
                          {combineStatus === "loading" && <div style={{ padding: "9px 12px", borderRadius: 8, background: `${th.accent2}10`, border: `1px solid ${th.accent2}25`, fontSize: 10, color: th.accent2, marginBottom: 8 }}>Combining fragments via Shamir GF-256…</div>}
                          {combineStatus === "ok" && <div style={{ padding: "9px 12px", borderRadius: 8, background: `${th.accent}10`, border: `1px solid ${th.accent}25`, fontSize: 10, color: th.accent, marginBottom: 8 }}>Reconstructed. Restoring identity…</div>}
                          {combineStatus && combineStatus !== "need3" && combineStatus !== "loading" && combineStatus !== "ok" && <div style={{ padding: "9px 12px", borderRadius: 8, background: "rgba(255,68,68,0.08)", border: "1px solid rgba(255,68,68,0.2)", fontSize: 10, color: "#ff4444", marginBottom: 8 }}>{combineStatus}</div>}
                          <Btn accent style={{ width: "100%", marginBottom: 8 }} onClick={combineAndRestoreIdentity} disabled={combineStatus === "loading" || combineStatus === "ok"}>
                            <I t="recover" s={15} c="#000" /> COMBINE & RESTORE
                          </Btn>
                          <button onClick={() => { setRestoreStep("seed"); setCombineStatus(null); setFragmentInputs(["","",""]); }} style={{ width: "100%", background: "transparent", border: "none", color: "#4a5568", cursor: "pointer", fontFamily: "inherit", fontSize: 11 }}>← Back to seed entry</button>
                        </>
                      )}
                    </>
                  )}

                </div>
              </div>
            )}

            {/* QR Scanner Modal */}
            {showQRScanner && (
              <div style={{ position: "fixed", inset: 0, background: "rgba(0,0,0,0.9)", zIndex: 9999, display: "flex", flexDirection: "column", alignItems: "center", justifyContent: "center", fontFamily: "'JetBrains Mono', monospace" }}>
                <div style={{ background: th.bg2, borderRadius: 16, padding: 24, width: isMobile ? "95%" : 400, border: `1px solid ${th.accent}22` }}>
                  <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 16 }}>
                    <span style={{ color: "#fff", fontSize: 16, fontWeight: 700 }}>Scan QR Invite</span>
                    <button onClick={() => { setShowQRScanner(false); if (qrScannerRef.current) qrScannerRef.current.stopScanning(); }} style={{ background: "none", border: "none", color: "#8a8a9a", cursor: "pointer", fontSize: 20 }}>&#x2715;</button>
                  </div>
                  <div style={{ position: "relative", width: "100%", paddingBottom: "100%", background: "#000", borderRadius: 12, overflow: "hidden", marginBottom: 16 }}>
                    <video ref={qrVideoRef} autoPlay playsInline muted style={{ position: "absolute", inset: 0, width: "100%", height: "100%", objectFit: "cover" }} />
                    <div style={{ position: "absolute", inset: "10%", border: `2px solid ${th.accent}88`, borderRadius: 12 }} />
                    <div style={{ position: "absolute", left: "10%", right: "10%", height: 2, background: th.accent, animation: "scanline 2s linear infinite", opacity: 0.7 }} />
                  </div>
                  {qrScanResult && (
                    <div style={{ padding: 12, background: `${th.accent}15`, borderRadius: 8, color: th.accent, fontSize: 12, textAlign: "center" }}>
                      Invite found: {qrScanResult.code || qrScanResult}
                    </div>
                  )}
                  <Btn accent onClick={async () => {
                    if (typeof QRScanner !== 'undefined' && qrVideoRef.current) {
                      const scanner = new QRScanner();
                      qrScannerRef.current = scanner;
                      scanner.on('scan', async (data) => {
                        try {
                          const invite = QRInvite.parseInvite(data);
                          setQrScanResult(invite);
                          scanner.stopScanning();
                          if (peerManager && invite.c) {
                            await peerManager.joinRoom(invite.c);
                          }
                          setTimeout(() => setShowQRScanner(false), 2000);
                        } catch (e) { setQrScanResult('Invalid QR code'); }
                      });
                      await scanner.startScanning(qrVideoRef.current);
                    }
                  }} style={{ width: "100%", marginTop: 8 }}>
                    <I t="search" s={14} c="#000" /> Start Scanning
                  </Btn>
                </div>
              </div>
            )}

            {/* Incoming Call Overlay */}
            {incomingCall && !callActive && (
              <div style={{ position: "fixed", inset: 0, background: "rgba(0,0,0,0.85)", zIndex: 9998, display: "flex", flexDirection: "column", alignItems: "center", justifyContent: "center", fontFamily: "'JetBrains Mono', monospace" }}>
                <div style={{ textAlign: "center" }}>
                  <div style={{ width: 80, height: 80, borderRadius: "50%", background: `linear-gradient(135deg, ${th.accent}, ${th.accent2})`, display: "flex", alignItems: "center", justifyContent: "center", margin: "0 auto 16px", animation: "pulse 1.5s ease-in-out infinite" }}>
                    <I t={incomingCall.callType === 'video' ? 'video' : 'phone'} s={36} c="#000" />
                  </div>
                  <div style={{ color: "#fff", fontSize: 18, fontWeight: 700, marginBottom: 4 }}>Incoming {incomingCall.callType} call</div>
                  <div style={{ color: "#8a8a9a", fontSize: 13, marginBottom: 32 }}>{incomingCall.peerId}</div>
                  <div style={{ display: "flex", gap: 24, justifyContent: "center" }}>
                    <button onClick={rejectIncomingCall} style={{ width: 60, height: 60, borderRadius: "50%", background: "#ff4444", border: "none", cursor: "pointer", display: "flex", alignItems: "center", justifyContent: "center" }}>
                      <I t="phone" s={24} c="#fff" />
                    </button>
                    <button onClick={() => answerIncomingCall(incomingCall.callType === 'video')} style={{ width: 60, height: 60, borderRadius: "50%", background: "#00cc66", border: "none", cursor: "pointer", display: "flex", alignItems: "center", justifyContent: "center" }}>
                      <I t="phone" s={24} c="#fff" />
                    </button>
                  </div>
                </div>
              </div>
            )}

            {/* ══════ CONTACT VERIFICATION CEREMONY MODAL ══════ */}
            {showVerificationCeremony && verificationPeer && (
              <div style={{ position: "fixed", inset: 0, background: "rgba(0,0,0,0.9)", WebkitBackdropFilter: "blur(16px)", backdropFilter: "blur(16px)", display: "flex", alignItems: "center", justifyContent: "center", zIndex: 200, padding: 16 }} onClick={() => setShowVerificationCeremony(false)}>
                <div onClick={e => e.stopPropagation()} style={{ background: "#0d0d14", border: `1px solid ${th.accent}22`, borderRadius: 20, padding: 28, maxWidth: 460, width: "100%", animation: "fadeInScale 0.2s ease" }}>
                  <div style={{ display: "flex", alignItems: "center", justifyContent: "space-between", marginBottom: 20 }}>
                    <div style={{ display: "flex", alignItems: "center", gap: 8 }}>
                      <I t="shield" s={20} c={th.accent} />
                      <span style={{ fontSize: 17, fontWeight: 700, letterSpacing: 1.5 }}>VERIFY CONTACT</span>
                    </div>
                    <button onClick={() => setShowVerificationCeremony(false)} style={{ background: "none", border: "none", color: "#6a6a7a", cursor: "pointer" }}><I t="x" s={18} /></button>
                  </div>

                  <div style={{ textAlign: "center", marginBottom: 24 }}>
                    <div style={{ width: 56, height: 56, borderRadius: 14, background: verificationPeer.color || th.accent + '22', display: "flex", alignItems: "center", justifyContent: "center", fontSize: 22, fontWeight: 700, color: th.accent, margin: "0 auto 12px" }}>
                      {verificationPeer.avatar || verificationPeer.name?.charAt(0)?.toUpperCase() || "?"}
                    </div>
                    <div style={{ fontSize: 15, fontWeight: 600 }}>{verificationPeer.name}</div>
                    <div style={{ fontSize: 9, color: "#3a3a4a", fontFamily: "monospace", marginTop: 4 }}>FP: {verificationPeer.fingerprint}</div>
                  </div>

                  <div style={{ background: `${th.accent}06`, border: `1px solid ${th.accent}15`, borderRadius: 12, padding: 16, marginBottom: 20, textAlign: "center" }}>
                    <div style={{ fontSize: 9, color: "#4a5568", letterSpacing: 2, textTransform: "uppercase", marginBottom: 10 }}>Safety Number</div>
                    <div style={{ fontSize: 22, fontWeight: 700, fontFamily: "'Space Grotesk', monospace", letterSpacing: 3, color: th.accent, wordBreak: "break-all", lineHeight: 1.8 }}>
                      {safetyNumber}
                    </div>
                    <div style={{ fontSize: 10, color: "#4a5568", marginTop: 10, lineHeight: 1.6 }}>
                      Compare this number with {verificationPeer.name}. If they match, your conversation is secure from man-in-the-middle attacks.
                    </div>
                  </div>

                  {verificationComplete[verificationPeer.id] ? (
                    <div style={{ padding: "10px 14px", borderRadius: 10, background: `${th.accent}10`, border: `1px solid ${th.accent}25`, fontSize: 11, color: th.accent, textAlign: "center", display: "flex", alignItems: "center", justifyContent: "center", gap: 8 }}>
                      <I t="check" s={14} c={th.accent} /> Contact verified
                    </div>
                  ) : (
                    <Btn accent style={{ width: "100%" }} onClick={confirmVerification}>
                      <I t="shield" s={15} c="#000" /> I VERIFIED THIS NUMBER
                    </Btn>
                  )}
                </div>
              </div>
            )}

            {/* ══════ GROUP CHAT CREATOR MODAL ══════ */}
            {showGroupCreator && (
              <div style={{ position: "fixed", inset: 0, background: "rgba(0,0,0,0.85)", WebkitBackdropFilter: "blur(10px)", backdropFilter: "blur(10px)", display: "flex", alignItems: "center", justifyContent: "center", zIndex: 100, padding: 16 }} onClick={() => setShowGroupCreator(false)}>
                <div onClick={e => e.stopPropagation()} style={{ background: "#111118", border: `1px solid ${th.accent}18`, borderRadius: 18, padding: 28, maxWidth: 480, width: "100%", animation: "fadeInScale 0.2s ease" }}>
                  <div style={{ display: "flex", alignItems: "center", justifyContent: "space-between", marginBottom: 20 }}>
                    <span style={{ fontSize: 17, fontWeight: 700, letterSpacing: 1.5, display: "flex", alignItems: "center", gap: 8 }}>
                      <I t="users" s={20} c={th.accent} /> NEW GROUP
                    </span>
                    <button onClick={() => setShowGroupCreator(false)} style={{ background: "none", border: "none", color: "#6a6a7a", cursor: "pointer" }}><I t="x" s={18} /></button>
                  </div>

                  <div style={{ marginBottom: 14 }}>
                    <label style={{ fontSize: 10, color: "#4a5568", letterSpacing: 1, textTransform: "uppercase", marginBottom: 6, display: "block" }}>Group Name</label>
                    <input value={groupName} onChange={e => setGroupName(e.target.value)} placeholder="e.g. Team Alpha"
                      style={{ width: "100%", background: "rgba(255,255,255,0.04)", border: "1px solid rgba(255,255,255,0.08)", borderRadius: 10, padding: "12px 14px", color: "#e0e0e8", fontSize: 13, fontFamily: "inherit" }} />
                  </div>

                  <div style={{ fontSize: 10, color: "#4a5568", letterSpacing: 1, textTransform: "uppercase", marginBottom: 8 }}>Select Members ({selectedGroupPeers.length} selected, min 2)</div>
                  <div style={{ maxHeight: 240, overflowY: "auto", marginBottom: 16 }}>
                    {peers.filter(p => p.status === 'online' && !p.type).map(peer => (
                      <button key={peer.id} onClick={() => {
                        setSelectedGroupPeers(prev => prev.includes(peer.id) ? prev.filter(id => id !== peer.id) : [...prev, peer.id]);
                      }} style={{
                        width: "100%", display: "flex", alignItems: "center", gap: 10, padding: "8px 10px",
                        borderRadius: 8, border: selectedGroupPeers.includes(peer.id) ? `1px solid ${th.accent}` : "1px solid transparent",
                        background: selectedGroupPeers.includes(peer.id) ? `${th.accent}08` : "transparent",
                        cursor: "pointer", marginBottom: 4, transition: "all 0.15s ease"
                      }}>
                        <div style={{ width: 32, height: 32, borderRadius: 8, background: peer.color, display: "flex", alignItems: "center", justifyContent: "center", fontSize: 12, fontWeight: 700 }}>{peer.avatar}</div>
                        <div style={{ flex: 1, textAlign: "left" }}>
                          <div style={{ fontSize: 12, fontWeight: 600, color: "#e0e0e8" }}>{peer.name}</div>
                          <div style={{ fontSize: 9, color: "#3a3a4a", fontFamily: "monospace" }}>FP: {peer.fingerprint?.slice(0, 12)}...</div>
                        </div>
                        {selectedGroupPeers.includes(peer.id) && <I t="check" s={14} c={th.accent} />}
                      </button>
                    ))}
                    {peers.filter(p => p.status === 'online' && !p.type).length === 0 && (
                      <div style={{ textAlign: "center", padding: "20px", fontSize: 11, color: "#3a3a4a" }}>No online peers available</div>
                    )}
                  </div>

                  <Btn accent style={{ width: "100%" }} onClick={createGroup} disabled={!groupName.trim() || selectedGroupPeers.length < 2}>
                    <I t="users" s={15} c="#000" /> CREATE GROUP
                  </Btn>
                </div>
              </div>
            )}

            {/* ══════ TURN SERVER CONFIG MODAL ══════ */}
            {showTurnConfig && (
              <div style={{ position: "fixed", inset: 0, background: "rgba(0,0,0,0.85)", WebkitBackdropFilter: "blur(10px)", backdropFilter: "blur(10px)", display: "flex", alignItems: "center", justifyContent: "center", zIndex: 100, padding: 16 }} onClick={() => setShowTurnConfig(false)}>
                <div onClick={e => e.stopPropagation()} style={{ background: "#111118", border: `1px solid ${th.accent3}18`, borderRadius: 18, padding: 28, maxWidth: 480, width: "100%", animation: "fadeInScale 0.2s ease" }}>
                  <div style={{ display: "flex", alignItems: "center", justifyContent: "space-between", marginBottom: 20 }}>
                    <span style={{ fontSize: 17, fontWeight: 700, letterSpacing: 1.5, display: "flex", alignItems: "center", gap: 8 }}>
                      <I t="globe" s={20} c={th.accent3} /> TURN SERVER CONFIG
                    </span>
                    <button onClick={() => setShowTurnConfig(false)} style={{ background: "none", border: "none", color: "#6a6a7a", cursor: "pointer" }}><I t="x" s={18} /></button>
                  </div>

                  <div style={{ background: `${th.accent3}06`, border: `1px solid ${th.accent3}12`, borderRadius: 10, padding: 12, marginBottom: 16, fontSize: 10, color: "#5a5a6a", lineHeight: 1.6 }}>
                    TURN servers relay media when direct P2P is blocked by symmetric NAT. Configure your own TURN server for maximum reliability.
                  </div>

                  <div style={{ marginBottom: 16 }}>
                    <div style={{ display: "flex", alignItems: "center", justifyContent: "space-between", marginBottom: 10 }}>
                      <span style={{ fontSize: 12, color: "#8a8a9a" }}>Enable TURN Fallback</span>
                      <button onClick={() => toggleTurnFallback(!turnFallbackEnabled)} style={{
                        width: 40, height: 22, borderRadius: 11, border: "none",
                        background: turnFallbackEnabled ? th.accent3 : "rgba(255,255,255,0.08)",
                        cursor: "pointer", position: "relative", transition: "all 0.2s ease",
                      }}>
                        <div style={{ width: 16, height: 16, borderRadius: "50%", background: "#fff", position: "absolute", top: 3, left: turnFallbackEnabled ? 21 : 3, transition: "all 0.2s ease" }} />
                      </button>
                    </div>
                  </div>

                  {turnServers.map((server, i) => (
                    <div key={i} style={{ background: "rgba(255,255,255,0.02)", borderRadius: 10, padding: 12, marginBottom: 8 }}>
                      <div style={{ fontSize: 9, color: "#4a5568", letterSpacing: 1, textTransform: "uppercase", marginBottom: 6 }}>Server {i + 1}</div>
                      <input value={server.url} onChange={e => { const s = [...turnServers]; s[i] = { ...s[i], url: e.target.value }; saveTurnServers(s); }} placeholder="turn:your-server.com:3478"
                        style={{ width: "100%", background: "rgba(255,255,255,0.04)", border: "1px solid rgba(255,255,255,0.08)", borderRadius: 8, padding: "8px 10px", color: "#e0e0e8", fontSize: 11, fontFamily: "inherit", marginBottom: 6 }} />
                      <div style={{ display: "flex", gap: 6 }}>
                        <input value={server.username} onChange={e => { const s = [...turnServers]; s[i] = { ...s[i], username: e.target.value }; saveTurnServers(s); }} placeholder="Username"
                          style={{ flex: 1, background: "rgba(255,255,255,0.04)", border: "1px solid rgba(255,255,255,0.08)", borderRadius: 8, padding: "8px 10px", color: "#e0e0e8", fontSize: 11, fontFamily: "inherit" }} />
                        <input value={server.credential} onChange={e => { const s = [...turnServers]; s[i] = { ...s[i], credential: e.target.value }; saveTurnServers(s); }} placeholder="Credential" type="password"
                          style={{ flex: 1, background: "rgba(255,255,255,0.04)", border: "1px solid rgba(255,255,255,0.08)", borderRadius: 8, padding: "8px 10px", color: "#e0e0e8", fontSize: 11, fontFamily: "inherit" }} />
                      </div>
                    </div>
                  ))}

                  <Btn small ghost onClick={() => saveTurnServers([...turnServers, { url: '', username: '', credential: '' }])} style={{ width: "100%", marginBottom: 12 }}>
                    + Add Server
                  </Btn>
                  <Btn accent style={{ width: "100%" }} onClick={() => { setShowTurnConfig(false); addToast('TURN config saved', 'success'); }}>
                    <I t="check" s={14} c="#000" /> SAVE CONFIG
                  </Btn>
                </div>
              </div>
            )}

            {/* ══════ ROADMAP / PLANNED FEATURES MODAL ══════ */}
            {showRoadmap && (
              <div style={{ position: "fixed", inset: 0, background: "rgba(0,0,0,0.9)", WebkitBackdropFilter: "blur(16px)", backdropFilter: "blur(16px)", display: "flex", alignItems: "center", justifyContent: "center", zIndex: 200, padding: 16 }} onClick={() => setShowRoadmap(false)}>
                <div onClick={e => e.stopPropagation()} style={{ background: "#0d0d14", border: `1px solid ${th.accent}22`, borderRadius: 20, padding: 28, maxWidth: 560, width: "100%", maxHeight: "85vh", overflowY: "auto", animation: "fadeInScale 0.2s ease" }}>
                  <div style={{ display: "flex", alignItems: "center", justifyContent: "space-between", marginBottom: 24 }}>
                    <div style={{ display: "flex", alignItems: "center", gap: 8 }}>
                      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke={th.accent3} strokeWidth="1.5"><path d="M12 2L2 7l10 5 10-5-10-5z"/><path d="M2 17l10 5 10-5"/><path d="M2 12l10 5 10-5"/></svg>
                      <span style={{ fontSize: 17, fontWeight: 700, letterSpacing: 1.5 }}>ROADMAP</span>
                    </div>
                    <button onClick={() => setShowRoadmap(false)} style={{ background: "none", border: "none", color: "#6a6a7a", cursor: "pointer" }}><I t="x" s={18} /></button>
                  </div>

                  {/* Done */}
                  <div style={{ marginBottom: 24 }}>
                    <div style={{ fontSize: 10, color: "#00cc66", letterSpacing: 2, textTransform: "uppercase", marginBottom: 10, display: "flex", alignItems: "center", gap: 6 }}>
                      <I t="check" s={12} c="#00cc66" /> COMPLETED
                    </div>
                    {[
                      "E2E encrypted chat with blockchain integrity",
                      "BIP39 seed phrase identity generation",
                      "Shamir's Secret Sharing backup GF(256) — 7 shares, threshold 3",
                      "PBKDF2 key derivation from seed (100K iterations)",
                      "AES-GCM private key wrapping",
                      "Self-destructing messages",
                      "Encrypted file transfer (64KB chunks, per-chunk AES-GCM)",
                      "Voice / Video calls via WebRTC",
                      "Screen sharing",
                      "Blockchain chain explorer",
                      "QR code invite generation with Reed-Solomon",
                      "4 themes (Phantom, Crimson, Arctic, Void)",
                      "Responsive layouts (mobile / tablet / desktop)",
                      "Offline message queue (IndexedDB, 24h TTL)",
                      "Message reactions",
                      "Voice messages with waveform",
                      "Contact verification ceremony (safety numbers)",
                      "Group key agreement UI",
                      "TURN server fallback config",
                      "Push notifications (web)",
                      "Biometric unlock detection",
                    ].map((item, i) => (
                      <div key={i} style={{ display: "flex", alignItems: "center", gap: 8, padding: "5px 0", fontSize: 11, color: "#5a6a5a" }}>
                        <span style={{ color: "#00cc66", fontSize: 10 }}>&#10003;</span> {item}
                      </div>
                    ))}
                  </div>

                  {/* In Progress */}
                  <div style={{ marginBottom: 24 }}>
                    <div style={{ fontSize: 10, color: th.accent2, letterSpacing: 2, textTransform: "uppercase", marginBottom: 10, display: "flex", alignItems: "center", gap: 6 }}>
                      <div style={{ width: 8, height: 8, borderRadius: "50%", background: th.accent2, animation: "pulse 1.5s infinite" }} /> IN PROGRESS
                    </div>
                    {[
                      "Hybrid signaling (QR/paste first connect + relay reconnect)",
                      "Fragment distribution UI with peer-to-peer send",
                      "Restore tab with full combineAndRestore() wiring",
                      "Signal Protocol Double Ratchet integration",
                    ].map((item, i) => (
                      <div key={i} style={{ display: "flex", alignItems: "center", gap: 8, padding: "5px 0", fontSize: 11, color: "#7a8a9a" }}>
                        <span style={{ color: th.accent2, fontSize: 10 }}>&#9679;</span> {item}
                      </div>
                    ))}
                  </div>

                  {/* Planned */}
                  <div>
                    <div style={{ fontSize: 10, color: th.accent3, letterSpacing: 2, textTransform: "uppercase", marginBottom: 10, display: "flex", alignItems: "center", gap: 6 }}>
                      <I t="zap" s={12} c={th.accent3} /> PLANNED
                    </div>
                    {[
                      "Group chat with multi-party key agreement",
                      "Native mobile push notifications (iOS/Android)",
                      "Native biometric unlock (Face ID / Touch ID)",
                      "Desktop release (Windows / macOS / Linux via Electron)",
                      "Mobile app store release (App Store / Play Store)",
                      "Advanced message search with filters",
                      "Disappearing messages with custom timers",
                      "Multi-device sync via P2P",
                    ].map((item, i) => (
                      <div key={i} style={{ display: "flex", alignItems: "center", gap: 8, padding: "5px 0", fontSize: 11, color: "#4a5a6a" }}>
                        <span style={{ color: th.accent3, fontSize: 10 }}>&#9675;</span> {item}
                      </div>
                    ))}
                  </div>

                  <div style={{ marginTop: 20, textAlign: "center", fontSize: 9, color: "#2a2a3a" }}>
                    GhostLink v0.0.1 · Zero Trust · Zero Trace
                  </div>
                </div>
              </div>
            )}

            {showExpiryModal && (
              <div style={{ position: "fixed", inset: 0, background: "rgba(0,0,0,0.75)", display: "flex", alignItems: "center", justifyContent: "center", zIndex: 999999, padding: 20 }}>
                <div style={{ background: "#12121c", border: "1px solid #ff4466", borderRadius: 14, padding: 24, maxWidth: 400, width: "100%", textAlign: "center" }}>
                  <div style={{ fontSize: 28, marginBottom: 8 }}>⏱</div>
                  <div style={{ fontSize: 16, fontWeight: 700, color: "#ff4466", marginBottom: 8 }}>License Expired</div>
                  <div style={{ fontSize: 12, color: "#8a8a9a", lineHeight: 1.6, marginBottom: 16 }}>
                    Your {licenseTier} plan has reached its usage limit. Pro features are now locked.<br/><br/>
                    {licenseTier === 'pro' ? 'Send your Device ID to renew:' : 'Send your company name and user count to renew:'}
                  </div>
                  {deviceId && licenseTier === 'pro' && (
                    <div style={{ fontSize: 9, fontFamily: "monospace", color: "#5a5a6a", wordBreak: "break-all", marginBottom: 12, padding: 8, background: "#0a0a14", borderRadius: 6 }}>{deviceId}</div>
                  )}
                  <button
                    onClick={() => { setShowExpiryModal(false); setShowSettings(true); }}
                    style={{ width: "100%", padding: "11px", borderRadius: 8, border: "none", background: th.accent, color: "#000", fontWeight: 600, fontSize: 12, cursor: "pointer", marginBottom: 8 }}
                  >Renew License</button>
                  <button
                    onClick={() => { setShowExpiryModal(false); setExpiryDismissed(true); }}
                    style={{ width: "100%", padding: "9px", borderRadius: 8, border: "1px solid rgba(255,255,255,0.1)", background: "transparent", color: "#8a8a9a", fontSize: 11, cursor: "pointer" }}
                  >Continue on Free Plan</button>
                </div>
              </div>
            )}

            {/* ══════ WORKSPACE & UPGRADE MODALS ══════ */}
            <window.UpgradeModal
              show={showUpgradeModal}
              onClose={() => setShowUpgradeModal(false)}
              limitType={upgradeLimitType}
              deviceId={deviceId}
              licenseKeyInput={licenseKeyInput}
              setLicenseKeyInput={setLicenseKeyInput}
              licenseError={licenseError}
              setLicenseError={setLicenseError}
              licenseActivating={licenseActivating}
              onActivate={async () => {
                setLicenseActivating(true);
                setLicenseError(null);
                try {
                  const ns = window.GLLicenseRuntime;
                  if (ns && ns.licenseManager) {
                    const res = await ns.licenseManager.activate(licenseKeyInput.trim());
                    if (res.success) {
                      const tier = await ns.licenseManager.getTier();
                      setLicenseStatus(tier);
                      setLicenseTier(tier);
                      setShowUpgradeModal(false);
                      addToast('License activated successfully!', 'success');
                    } else {
                      setLicenseError(res.error || 'Invalid key or fingerprint check failed');
                    }
                  } else {
                    setLicenseError('License validation system not loaded.');
                  }
                } catch (e) {
                  setLicenseError(e.message || 'Activation failed');
                } finally {
                  setLicenseActivating(false);
                }
              }}
              th={th}
            />

            <window.WorkspaceCreateModal
              show={showWorkspaceCreate}
              onClose={() => setShowWorkspaceCreate(false)}
              value={workspaceCreateName}
              onChange={setWorkspaceCreateName}
              onCreate={handleCreateWorkspace}
              th={th}
            />

            <window.WorkspaceJoinModal
              show={showWorkspaceJoin}
              onClose={() => setShowWorkspaceJoin(false)}
              code={workspaceJoinInvite}
              onCodeChange={setWorkspaceJoinInvite}
              words={inviteWordsInput}
              onWordsChange={setInviteWordsInput}
              onJoin={handleJoinWorkspace}
              th={th}
            />

            <window.WorkspaceInviteModal
              show={!!showWorkspaceInviteGen}
              onClose={() => { setShowWorkspaceInviteGen(false); setWorkspaceInviteCode(''); setWorkspaceInviteRecipientPub(''); }}
              inviteType={showWorkspaceInviteGen || 'public'}
              onInviteTypeChange={setShowWorkspaceInviteGen}
              recipientPub={workspaceInviteRecipientPub}
              onRecipientPubChange={setWorkspaceInviteRecipientPub}
              onGenerate={handleGenerateWorkspaceInvite}
              inviteCode={workspaceInviteCode}
              th={th}
            />
          </div>
        );
      }

      const root = ReactDOM.createRoot(document.getElementById("root"));
      root.render(React.createElement(ErrorBoundary, null, React.createElement(GhostLinkApp)));
    </script>
  </body>
</html>
