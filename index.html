            const maxBytes = limits.maxTransferBytes;

              setUploadProgress(p => { const n = { ...p }; delete n[id]; return n; });
              return;

          }

            setMessages(prev => ({ ...prev, [activeConvo]: [...(prev[activeConvo] || []), block] }));
            setTransferredFiles(prev => [...prev, { name: fileName, size: fileSize, from: identity?.name || 'You', ts: Date.now(), hash: fileHash + '...', chunks, encrypted: true }]);
            setUploadProgress(p => { const n = { ...p }; delete n[id]; return n; });

      };

        const sendImage = async (file) => {

            blocks = blocks.map(block => ({

            }));

        const generateSeedPhrase = async () => {
          const entropy = crypto.getRandomValues(new Uint8Array(16));
          const hash = new Uint8Array(await crypto.subtle.digest('SHA-256', entropy));
          const bits = [];
          for (let i = 0; i < 16; i++) for (let b = 7; b >= 0; b--) bits.push((entropy[i] >> b) & 1);
          for (let i = 0; i < 4; i++) bits.push((hash[i >> 3] >> (7 - (i & 7))) & 1);
          const words = [];
          for (let i = 0; i < 12; i++) {
            let idx = 0;
            for (let j = 0; j < 11; j++) idx = (idx << 1) | bits[i * 11 + j];
            words.push(BIP39_WORDS[idx]);

        const setupManualDataChannel = (dc, pc, peerId, peerInfo) => {

                const convoMsgs = messages[peerId] || [];

          const combined = sorted.join('');
          // Create 5 groups of 5 digits
          let hash = 0;
          for (let i = 0; i < combined.length; i++) {
            hash = ((hash << 5) - hash) + combined.charCodeAt(i);
            hash |= 0;
          }
          const hexHash = Math.abs(hash).toString(16).padStart(25, '0');
          const groups = [];
          for (let i = 0; i < 5; i++) {
            groups.push(hexHash.slice(i * 5, i * 5 + 5));
          }
          return groups.join(' ');

            analyser.fftSize = 64;
            source.connect(analyser);
            const dataArray = new Uint8Array(analyser.frequencyBinCount);

            const waveformInterval = setInterval(() => {
              analyser.getByteFrequencyData(dataArray);
              const avg = dataArray.reduce((a, b) => a + b, 0) / dataArray.length;
              waveformData.push(avg / 255);
              setRecordingWaveform([...waveformData]);
            }, 50);

            recorder.ondataavailable = (e) => { if (e.data.size > 0) chunks.push(e.data); };
            recorder.onstop = async () => {
              clearInterval(waveformInterval);
              clearInterval(recordingTimerRef.current);
              audioContext.close();
              const blob = new Blob(chunks, { type: mimeType });
              const duration = recordingDuration;

              if (duration > 0) {
                const msgId = 'voice-' + Date.now();
                // Build local preview
                const localUrl = URL.createObjectURL(blob);
                setVoiceMessages(prev => ({
                  ...prev,
                  [activeConvo]: [...(prev[activeConvo] || []), {
                    id: msgId, url: localUrl, duration, waveform: [...waveformData],
                    ts: Date.now(), sender: identity?.name
                  }]
                }));

                // Send real voice data via P2P — convert blob to base64
                const peerId = peers.find(p => p.id === activeConvo)?.fingerprint || String(activeConvo);
                const arrayBuffer = await blob.arrayBuffer();
                const binaryString = Array.from(new Uint8Array(arrayBuffer)).map(b => String.fromCharCode(b)).join('');
                const base64Audio = btoa(binaryString);
                const conn = p2pConnectorRef.current;
                const payload = {
                  type: 'voice', audioData: base64Audio, mimeType,
                  duration, waveform: [...waveformData],
                  sender: identity?.name, ts: Date.now()
                };

                if (conn && conn.isConnected(peerId)) {
                  try {
                    conn.sendMessage(peerId, payload);
                  } catch (e) { console.error('Voice send failed:', e); addToast('Voice send failed', 'error'); }
                } else if (offlineQueue) {

                    const enc = await CryptoEngine.encrypt(JSON.stringify(payload), identity.fingerprint);
                    await offlineQueue.queueMessage(peerId, enc);

                  } catch (e) { console.error('Voice queue failed:', e); }
                } else {
                  addToast('Not connected — voice message saved locally only', 'info');
                }
              }

              stream.getTracks().forEach(t => t.stop());
              setIsRecording(false);
              setRecordingDuration(0);
              setRecordingWaveform([]);
            };

            recorder.start(100);
            mediaRecorderRef.current = recorder;
            setIsRecording(true);
            setRecordingWaveform([]);
            setRecordingDuration(0);

          audio.onended = () => {

                  </div>

                  <div style={{ display: "flex", gap: 8, marginTop: 8 }}>

                    <Tag color={th.accent2} icon="chain">BLOCKCHAIN</Tag>
                    <Tag color={th.accent3} icon="lock">ZERO TRUST</Tag>
                  </div>
                </div>
              ) : (
                <>

                    <div style={{ display: "flex", alignItems: "center", gap: 11 }}>
                      {isMobile && (
                        <button onClick={() => setActiveConvo(null)} style={{ width: 36, height: 36, borderRadius: 10, border: "none", background: "rgba(255,255,255,0.04)", color: th.accent, cursor: "pointer", display: "flex", alignItems: "center", justifyContent: "center", flexShrink: 0 }}>

                    </div>

                    {filteredMsgs.length === 0 && !searchQuery && (

                            // Only show block info if not clicking an interactive element like a link or button

                            setShowBlockInfo(msg);
                          }} style={{
                            padding: msg.type === "file" ? "10px 14px" : "9px 14px",
                            borderRadius: isMe ? "14px 14px 4px 14px" : "14px 14px 14px 4px",
                            background: isMe ? `linear-gradient(135deg, ${th.accent}14, ${th.accent2}0a)` : "rgba(255,255,255,0.03)",
                            border: isMe ? `1px solid ${th.accent}18` : "1px solid rgba(255,255,255,0.05)",
                            cursor: "pointer", transition: "all 0.15s ease",
                          }}>
                            {msg.type === "file" ? (
                              (() => {
                                const fileData = transferredFiles.find(f =>
                                  f.name === msg.content && Math.abs((f.size || 0) - (msg.meta?.fileSize || 0)) < 1000
                                );
                                return (
                                  <div style={{ display: "flex", alignItems: "center", gap: 10 }}>
                                    <div style={{ width: 36, height: 36, borderRadius: 8, background: `${th.accent}12`, display: "flex", alignItems: "center", justifyContent: "center" }}>
                                      <I t="file" s={16} c={th.accent} />
                                    </div>
                                    <div style={{ flex: 1 }}>
                                      <div style={{ fontSize: 12, fontWeight: 600 }}>{msg.content}</div>
                                      <div style={{ fontSize: 9, color: "#4a5568", marginTop: 2 }}>{msg.meta?.chunks || '?'} chunks · {fmtSize(msg.meta?.fileSize || 0)}</div>

                                      <a href={fileData.url} download={fileData.name} onClick={e => e.stopPropagation()} style={{
                                        display: "flex", alignItems: "center", justifyContent: "center",

                                        background: `${th.accent}15`, color: th.accent,

                                      <span style={{ fontSize: 9, color: th.accent2 }}>Awaiting peer…</span>

                                      <span style={{ fontSize: 9, color: "#5a5a6a" }}>Receiving…</span>
                                    )}
                                  </div>
                                );
                              })()
                            ) : msg.type === "image" && msg.meta?.imageData ? (
                              <div>
                                <img

                                  style={{ maxWidth: "100%", maxHeight: 280, borderRadius: 8, display: "block", cursor: "default" }}
                                />
                                <div style={{ fontSize: 9, color: "#4a5568", marginTop: 4 }}>{msg.meta.fileName || msg.content} · {fmtSize(msg.meta.fileSize || 0)}</div>

                              <div style={{ fontSize: settings.fontSize, lineHeight: 1.55, color: "#d0d0d8" }}>

                                    const sanitized = htmlSanitizer ? htmlSanitizer(parsed) : parsed;

                                  } catch { return msg.content; }
                                })() : msg.content}
                              </div>
                            )}
                            <div style={{ fontSize: 9.5, color: "#3a3a4a", marginTop: 4, display: "flex", alignItems: "center", gap: 5, justifyContent: isMe ? "flex-end" : "flex-start" }}>

                                +

                          </div>

                            <div style={{ flex: 1, display: "flex", alignItems: "flex-end", gap: 1, height: 24 }}>

                                  width: 2, borderRadius: 1,
                                  height: `${Math.max(3, amp * 24)}px`,

                            <span style={{ fontSize: 9, color: "#4a5568", fontVariantNumeric: "tabular-nums" }}>

                          {(playbackProgress[vm.id] || 0) > 0 && (

                              <div style={{ width: `${(playbackProgress[vm.id] || 0) * 100}%`, height: "100%", background: `linear-gradient(90deg, ${th.accent}, ${th.accent2})`, borderRadius: 1, transition: "width 0.1s linear" }} />
                            </div>
                          )}
                          <div style={{ fontSize: 9, color: "#3a3a4a", marginTop: 4 }}>
                            {vm.sender} · {fmtTime(vm.ts)}
                          </div>
                        </div>
                      </div>
                    ))}

                    {typing && (
                      <div style={{ alignSelf: "flex-start", padding: "10px 16px", borderRadius: "14px 14px 14px 4px", background: "rgba(255,255,255,0.03)", border: "1px solid rgba(255,255,255,0.05)", display: "flex", gap: 4, alignItems: "center" }}>
                        {[0, 1, 2].map(i => <div key={i} style={{ width: 6, height: 6, borderRadius: "50%", background: th.accent, animation: "typing 1.2s ease-in-out infinite", animationDelay: `${i * 0.2}s` }} />)}

                      <div key={id} style={{ alignSelf: "flex-end", maxWidth: "72%", padding: "10px 14px", borderRadius: "14px 14px 4px 14px", background: `${th.accent}0a`, border: `1px solid ${th.accent}18` }}>

                          <I t="ul" s={12} c={th.accent} /> Encrypting & sending... {Math.round(pct)}%
                        </div>
                        <div style={{ width: "100%", height: 3, background: "rgba(255,255,255,0.06)", borderRadius: 2, overflow: "hidden" }}>
                          <div style={{ width: `${pct}%`, height: "100%", background: `linear-gradient(90deg, ${th.accent}, ${th.accent2})`, borderRadius: 2, transition: "width 0.2s ease" }} />
                        </div>
                      </div>
                    ))}

                    <div ref={chatEndRef} />
                  </div>

                  {replyTo && (
                    <div style={{ padding: "8px 18px", borderTop: "1px solid rgba(255,255,255,0.04)", display: "flex", alignItems: "center", gap: 10, background: `${th.accent2}08`, animation: "fadeIn 0.15s ease" }}>
                      <I t="reply" s={14} c={th.accent2} />
                      <div style={{ flex: 1, fontSize: 11, color: "#6a6a7a", overflow: "hidden", textOverflow: "ellipsis", whiteSpace: "nowrap" }}>

                  {showEmojiPicker && (

                      <div style={{ flex: 1, display: "flex", alignItems: "flex-end", gap: 1, height: 28 }}>

                  <div style={{ padding: "10px 14px", borderTop: "1px solid rgba(255,255,255,0.04)", display: "flex", alignItems: "center", gap: 8, background: `${th.bg}ee`, flexShrink: 0 }}>

                      width: 36, height: 36, borderRadius: 8, border: "none",

                  </div> {/* End of Left Chat Flow */}

                  {[
                    { icon: "reply", label: "Reply", action: () => { setReplyTo(msgContext); setMsgContext(null); } },
                    { icon: "pin", label: pinnedMsgs.find(m => m.index === msgContext.index) ? "Unpin" : "Pin", action: () => pinMsg(msgContext) },
                    { icon: "copy", label: "Copy", action: () => copyMsg(msgContext) },
                    { icon: "chain", label: "View Block", action: () => { setShowBlockInfo(msgContext); setMsgContext(null); } },

                    <button key={i} onClick={item.action} style={{ width: "100%", display: "flex", alignItems: "center", gap: 10, padding: "9px 14px", border: "none", borderRadius: 8, background: "transparent", color: "#c0c0c8", cursor: "pointer", fontFamily: "inherit", fontSize: 12, textAlign: "left", transition: "background 0.1s" }}

            {/* ══════ BLOCK INFO MODAL ══════ */}

              <div style={{ position: "fixed", inset: 0, background: "rgba(0,0,0,0.85)", WebkitBackdropFilter: "blur(10px)", backdropFilter: "blur(10px)", display: "flex", alignItems: isMobile ? "flex-end" : "center", justifyContent: "center", zIndex: 100, padding: isMobile ? 0 : 16 }} onClick={() => setShowBlockInfo(null)}>
                <div onClick={e => e.stopPropagation()} style={{ background: "#111118", border: `1px solid ${th.accent}18`, borderRadius: isMobile ? "18px 18px 0 0" : 18, padding: isMobile ? "20px 16px" : 28, maxWidth: 540, width: "100%", animation: "fadeInScale 0.2s ease", maxHeight: "85vh", overflowY: "auto" }}>

                    <div style={{ display: "flex", alignItems: "center", gap: 8 }}>
                      <I t="chain" s={20} c={th.accent} />
                      <span style={{ fontSize: 17, fontWeight: 700, letterSpacing: 1.5 }}>BLOCK #{showBlockInfo.index}</span>
                    </div>
                    <button onClick={() => setShowBlockInfo(null)} style={{ background: "none", border: "none", color: "#6a6a7a", cursor: "pointer" }}><I t="x" s={18} /></button>
                  </div>
                  {[
                    { label: "Current Hash", value: showBlockInfo.hash, color: th.accent },
                    { label: "Previous Hash", value: showBlockInfo.prevHash, color: th.accent2 },

                    { label: "Sender", value: showBlockInfo.sender, color: "#e0e0e8" },

                    </div>

                  {showBlockInfo.encrypted && (
                    <div>
                      <div style={{ fontSize: 9, color: "#4a5568", marginBottom: 4, letterSpacing: 1.5, textTransform: "uppercase" }}>Encrypted Payload (AES-256-GCM)</div>
                      <div style={{ fontFamily: "monospace", fontSize: 9, color: "#ff8844", wordBreak: "break-all", lineHeight: 1.7, background: "rgba(255,136,68,0.05)", padding: "8px 10px", borderRadius: 8 }}>
                        IV: {showBlockInfo.encrypted.iv}<br />
                        CT: {showBlockInfo.encrypted.ciphertext?.slice(0, 256)}{showBlockInfo.encrypted.ciphertext?.length > 256 ? "..." : ""}
                      </div>
                    </div>
                  )}
                  <div style={{ marginTop: 16, display: "flex", gap: 6, flexWrap: "wrap" }}>
                    <Tag color={th.accent} icon="check">VERIFIED</Tag>
                    <Tag color={th.accent2} icon="lock">E2E ENCRYPTED</Tag>
                    <Tag color={th.accent3} icon="zap">P2P DIRECT</Tag>
                    {showBlockInfo.meta?.selfDestruct && <Tag color="#ff8844" icon="timer">SELF-DESTRUCT {showBlockInfo.meta.selfDestruct}s</Tag>}
                  </div>
                </div>
              </div>
            )}

            {/* ══════ CHAIN EXPLORER ══════ */}
            {showChainExplorer && (
              <div style={{ position: "fixed", inset: 0, background: "rgba(0,0,0,0.85)", WebkitBackdropFilter: "blur(10px)", backdropFilter: "blur(10px)", display: "flex", alignItems: isMobile ? "flex-end" : "center", justifyContent: "center", zIndex: 100, padding: isMobile ? 0 : 16 }} onClick={() => { setShowChainExplorer(false); setActiveTab("chat"); }}>
                <div onClick={e => e.stopPropagation()} style={{ background: "#111118", border: `1px solid ${th.accent}18`, borderRadius: isMobile ? "18px 18px 0 0" : 18, padding: isMobile ? "20px 16px" : 28, maxWidth: 580, width: "100%", maxHeight: "85vh", overflowY: "auto", animation: "fadeInScale 0.2s ease" }}>
                  <div style={{ display: "flex", alignItems: "center", justifyContent: "space-between", marginBottom: 20 }}>
                    <div>
                      <div style={{ fontSize: 17, fontWeight: 700, letterSpacing: 1.5, display: "flex", alignItems: "center", gap: 8 }}>

                      </div>
                    </div>
                    <button onClick={() => { setShowChainExplorer(false); setActiveTab("chat"); }} style={{ background: "none", border: "none", color: "#6a6a7a", cursor: "pointer" }}><I t="x" s={18} /></button>

                  {chain.blocks.length === 0 ? (

                      <div style={{ display: "flex", justifyContent: "space-between", marginBottom: 5 }}>
                        <span style={{ fontSize: 11.5, fontWeight: 700, color: i % 2 === 0 ? th.accent : th.accent2 }}>Block #{b.index}</span>
                        <div style={{ display: "flex", gap: 6 }}>
                          <Tag color="#4a5568">{b.type}</Tag>
                          <span style={{ fontSize: 10, color: "#4a5568" }}>{fmtTime(b.ts)}</span>
                        </div>
                      </div>
                      <div style={{ fontSize: 11, color: "#7a7a8a", marginBottom: 5 }}>{b.sender}: {b.content?.slice(0, 70)}{b.content?.length > 70 ? "..." : ""}</div>
                      <div style={{ fontSize: 8.5, color: "#2a2a3a", fontFamily: "monospace" }}>{b.hash}</div>
                      {i < chain.blocks.length - 1 && <div style={{ textAlign: "center", color: "#1a1a2a", fontSize: 14, marginTop: 4 }}>↓</div>}
                    </div>
                  ))}
                  {chain.blocks.length > 0 && (
                    <div style={{ marginTop: 14, display: "flex", gap: 8 }}>
                      <Btn small ghost onClick={exportChat}><I t="dl" s={13} /> Export Chain</Btn>
                    </div>
                  )}
                </div>
              </div>
            )}

            {/* ══════ INVITE MODAL (Zero-Server WebRTC P2P) ══════ */}
            {showInvite && (
              <div style={{ position: "fixed", inset: 0, background: "rgba(0,0,0,0.85)", WebkitBackdropFilter: "blur(10px)", backdropFilter: "blur(10px)", display: "flex", alignItems: isMobile ? "flex-end" : "center", justifyContent: "center", zIndex: 100, padding: isMobile ? 0 : 16 }} onClick={() => { setShowInvite(false); setManualSignalStep('idle'); setManualOfferString(''); setManualAnswerString(''); setManualPeerInput(''); closeQuickConnect(); }}>
                <div onClick={e => e.stopPropagation()} style={{ background: "#111118", border: `1px solid ${th.accent}18`, borderRadius: isMobile ? "18px 18px 0 0" : 18, padding: isMobile ? "20px 16px" : 28, maxWidth: 520, width: "100%", maxHeight: "90vh", overflowY: "auto", animation: "fadeInScale 0.2s ease" }}>
                  <div style={{ display: "flex", alignItems: "center", justifyContent: "space-between", marginBottom: 14 }}>
                    <span style={{ fontSize: 17, fontWeight: 700, letterSpacing: 1.5, display: "flex", alignItems: "center", gap: 8 }}>
                      <I t="link" s={20} c={th.accent} /> PEER CONNECTION
                    </span>
                    <button onClick={() => { setShowInvite(false); setManualSignalStep('idle'); closeQuickConnect(); }} style={{ background: "none", border: "none", color: "#6a6a7a", cursor: "pointer" }}><I t="x" s={18} /></button>
                  </div>

                  {/* Tab row: Create Invite / Join Channel / Manual P2P / Quick Connect */}
                  <div style={{ display: "flex", gap: 4, marginBottom: 20, background: "rgba(255,255,255,0.03)", borderRadius: 10, padding: 3 }}>
                    {["create", "join", "manual"].map(t => (
                      <button key={t} onClick={() => {
                        setInviteTab(t);
                        if (t !== 'quick') closeQuickConnect();
                        if (t === 'manual') {
                          setManualSignalStep('idle');
                          setManualOfferString('');
                          setManualAnswerString('');
                          setManualPeerInput('');
                        }
                      }} style={{
                        flex: 1, padding: "9px 0", borderRadius: 8, border: "none",
                        background: inviteTab === t ? `${th.accent}15` : "transparent",
                        color: inviteTab === t ? th.accent : "#5a5a6a", cursor: "pointer",
                        fontFamily: "inherit", fontSize: 10, fontWeight: 600, letterSpacing: 0.5, textTransform: "uppercase",
                      }}>{t === "create" ? "Create Invite" : t === "join" ? "Join Channel" : t === "manual" ? "Manual P2P" : "Quick Connect"}</button>
                    ))}
                  </div>

                  {quickSignalStep === 'connected' ? (
                    <div style={{ textAlign: "center", padding: 20 }}>
                      <div style={{ width: 56, height: 56, borderRadius: "50%", background: `${th.accent}15`, display: "flex", alignItems: "center", justifyContent: "center", margin: "0 auto 12px", border: `2px solid ${th.accent}30` }}>
                        <I t="check" s={28} c={th.accent} />
                      </div>
                      <div style={{ fontSize: 15, fontWeight: 700, color: th.accent, marginBottom: 6 }}>Connected ✓</div>
                      <div style={{ fontSize: 12, color: "#8a8a9a", marginBottom: 4 }}>Peer connected via Signaling Relay</div>
                      <Tag color={th.accent3} icon="link">P2P DIRECT ENCRYPTED</Tag>
                      <div style={{ marginTop: 16 }}>
                        <Btn accent style={{ width: "100%" }} onClick={() => { setShowInvite(false); closeQuickConnect(); }}>
                          <I t="chat" s={14} c="#000" /> START CHATTING
                        </Btn>
                      </div>
                    </div>
                  ) : manualSignalStep === 'connected' ? (
                    <div style={{ textAlign: "center", padding: 20 }}>
                      <div style={{ width: 56, height: 56, borderRadius: "50%", background: `${th.accent}15`, display: "flex", alignItems: "center", justifyContent: "center", margin: "0 auto 12px", border: `2px solid ${th.accent}30` }}>
                        <I t="check" s={28} c={th.accent} />
                      </div>
                      <div style={{ fontSize: 15, fontWeight: 700, color: th.accent, marginBottom: 6 }}>Connected ✓</div>
                      {manualPeerInfo && <div style={{ fontSize: 12, color: "#8a8a9a", marginBottom: 4 }}>{manualPeerInfo.name}</div>}
                      <Tag color={th.accent3} icon="link">MANUAL P2P DIRECT</Tag>
                      <div style={{ marginTop: 16 }}>
                        <Btn accent style={{ width: "100%" }} onClick={() => { setShowInvite(false); setManualSignalStep('idle'); }}>
                          <I t="chat" s={14} c="#000" /> START CHATTING
                        </Btn>
                      </div>
                    </div>
                  ) : inviteTab === "quick" ? (
                    /* ── QUICK CONNECT TAB ── */
                    <>
                      <p style={{ fontSize: 11, color: "#5a5a6a", marginBottom: 14, lineHeight: 1.6 }}>

                      </p>

                      {quickMode === null && (

                          <Btn accent style={{ width: "100%" }} onClick={startQuickHost}>
                            <I t="zap" s={15} c="#000" /> HOST A SESSION
                          </Btn>
                          <Btn ghost style={{ width: "100%" }} onClick={() => setQuickMode('join')}>
                            <I t="link" s={15} /> JOIN A SESSION
                          </Btn>
                        </div>
                      )}

                      {quickMode === 'host' && (
                        <>
                          <div style={{ fontSize: 10, color: th.accent, fontWeight: 600, marginBottom: 8, letterSpacing: 1 }}>SHARE THIS ROOM CODE WITH YOUR PEER</div>
                          <div style={{ background: `${th.accent}06`, border: `1px dashed ${th.accent}30`, borderRadius: 12, padding: 18, textAlign: "center", marginBottom: 14 }}>
                            <div style={{ fontFamily: "monospace", fontSize: 24, color: th.accent, letterSpacing: 4, fontWeight: 700 }}>{quickRoomCode}</div>
                          </div>

                          <Btn accent style={{ width: "100%", marginBottom: 12 }} onClick={() => { navigator.clipboard?.writeText(quickRoomCode); addToast('Room code copied to clipboard', 'success'); }}>
                            <I t="copy" s={15} c="#000" /> COPY ROOM CODE
                          </Btn>

                          <div style={{ padding: "8px 12px", borderRadius: 8, background: "rgba(255,255,255,0.02)", border: "1px solid rgba(255,255,255,0.05)", fontSize: 10, color: "#8a8a9a", textAlign: "center", marginBottom: 12, lineHeight: 1.5 }}>
                            {quickSignalStep === 'host-connecting' && <div>Connecting to signaling relay...</div>}
                            {quickSignalStep === 'host-waiting' && <div style={{ fontWeight: 600, color: th.accent }}>Waiting for peer to join...</div>}
                            {quickSignalStep === 'host-handshaking' && <div style={{ fontWeight: 600, color: th.accent2 }}>Peer joined. Handshaking WebRTC...</div>}
                            {quickSignalStep === 'failed' && <div style={{ color: "#ff4444" }}>Connection failed. Check settings and try again.</div>}
                          </div>

                          {quickSignalStep === 'failed' && (
                            <Btn accent style={{ width: "100%", marginBottom: 8 }} onClick={startQuickHost}>RETRY HOSTING</Btn>
                          )}

                          <Btn ghost small style={{ width: "100%" }} onClick={closeQuickConnect}>
                            CANCEL
                          </Btn>
                        </>
                      )}

                      {quickMode === 'join' && (
                        <>
                          <div style={{ fontSize: 10, color: th.accent, fontWeight: 600, marginBottom: 8, letterSpacing: 1 }}>ENTER PEER'S 6-CHARACTER ROOM CODE</div>
                          <input
                            type="text"
                            maxLength={6}
                            value={quickInputCode}
                            onChange={e => setQuickInputCode(e.target.value.toUpperCase())}
                            placeholder="e.g. X7Y2Z9"
                            style={{
                              width: "100%",
                              background: "rgba(255,255,255,0.04)",
                              border: "1px solid rgba(255,255,255,0.08)",
                              borderRadius: 10,
                              padding: "12px 14px",
                              color: "#e0e0e8",
                              fontSize: 18,
                              fontFamily: "monospace",
                              fontWeight: 700,
                              textAlign: "center",
                              letterSpacing: 4,
                              marginBottom: 12,
                              textTransform: "uppercase"
                            }}
                          />

                          <Btn accent style={{ width: "100%", marginBottom: 12 }} onClick={startQuickJoin} disabled={quickInputCode.length !== 6 || quickSignalStep === 'join-connecting' || quickSignalStep === 'join-handshaking'}>
                            <I t="link" s={15} c="#000" /> CONNECT TO PEER
                          </Btn>

                          <div style={{ padding: "8px 12px", borderRadius: 8, background: "rgba(255,255,255,0.02)", border: "1px solid rgba(255,255,255,0.05)", fontSize: 10, color: "#8a8a9a", textAlign: "center", marginBottom: 12, lineHeight: 1.5 }}>
                            {quickSignalStep === 'idle' && <div>Ready to connect.</div>}
                            {quickSignalStep === 'join-connecting' && <div>Connecting to signaling relay...</div>}
                            {quickSignalStep === 'join-handshaking' && <div style={{ fontWeight: 600, color: th.accent2 }}>Joining room & establishing WebRTC...</div>}
                            {quickSignalStep === 'failed' && <div style={{ color: "#ff4444" }}>Connection failed. Confirm room code or check settings.</div>}
                          </div>

                          {quickSignalStep === 'failed' && (
                            <Btn accent style={{ width: "100%", marginBottom: 8 }} onClick={startQuickJoin}>RETRY JOINING</Btn>
                          )}

                          <Btn ghost small style={{ width: "100%" }} onClick={closeQuickConnect}>
                            BACK
                          </Btn>
                        </>
                      )}
                    </>
                  ) : inviteTab === "create" ? (
                    <>
                      <p style={{ fontSize: 11, color: "#5a5a6a", marginBottom: 14, lineHeight: 1.6 }}>

                      </div>

                      <div style={{ background: `${th.accent}08`, border: `1px dashed ${th.accent}30`, borderRadius: 10, padding: 16, textAlign: "center", marginBottom: 20 }}>
                        <div style={{ fontSize: 10, color: "#8a8a9a", marginBottom: 4 }}>TOTAL DUE PRICE (USD):</div>
                        <div style={{ fontSize: 20, fontWeight: 800, color: th.accent }}>${buyTotalPriceUSD}.00 USD</div>
                      </div>

                      <div style={{ display: "flex", gap: 10 }}>
                        <button
                          onClick={() => setBuyStep(1)}
                          style={{ flex: 1, padding: "12px", borderRadius: 8, border: "1px solid rgba(255,255,255,0.1)", background: "transparent", color: "#8a8a9a", fontSize: 11, fontWeight: 600, cursor: "pointer" }}
                        >
                          [ Back to Plans ]
                        </button>
                        <button
                          onClick={() => setBuyStep(3)}
                          style={{ flex: 1, padding: "12px", borderRadius: 8, border: "none", background: th.accent, color: "#000", fontSize: 11, fontWeight: 600, cursor: "pointer" }}
                        >
                          [ Next: Select Coin ]
                        </button>
                      </div>
                    </div>
                  )}

                  {/* Step 3: Select Coin */}
                  {buyStep === 3 && (
                    <div style={{ animation: "fadeIn 0.2s ease" }}>
                      <div style={{ fontSize: 14, fontWeight: 700, color: th.accent, marginBottom: 16, textTransform: "uppercase", textAlign: "center" }}>Select Payment Coin</div>

                      <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 12, marginBottom: 16 }}>
                        {[
                          { key: "BTC", name: "Bitcoin (BTC)", emoji: "🪙" },
                          { key: "ETH", name: "Ethereum (ETH)", emoji: "🔷" },
                          { key: "LTC", name: "Litecoin (LTC)", emoji: "⚡" },
                          { key: "USDT", name: "Tether (USDT)", emoji: "💵" }
                        ].map(c => (
                          <button
                            key={c.key}
                            onClick={() => setBuyCoin(c.key)}
                            style={{
                              padding: 16, borderRadius: 10, border: buyCoin === c.key ? `2px solid ${th.accent}` : "1px solid rgba(255,255,255,0.06)",
                              background: buyCoin === c.key ? `${th.accent}12` : "transparent",
                              color: buyCoin === c.key ? th.accent : "#e8e8e8",
                              fontSize: 11, fontWeight: 600, cursor: "pointer", display: "flex", flexDirection: "column", alignItems: "center", gap: 6, transition: "all 0.15s ease"
                            }}
                          >
                            <span style={{ fontSize: 18 }}>{c.emoji}</span>
                            <span>{c.name}</span>
                          </button>
                        ))}
                      </div>

                      {buyCoin === 'USDT' && (
                        <div style={{ display: "flex", flexDirection: "column", gap: 6, marginBottom: 20 }}>
                          <span style={{ fontSize: 10, color: "#8a8a9a", fontWeight: 600 }}>TETHER USDT NETWORK:</span>
                          <div style={{ display: "flex", gap: 10 }}>
                            {["ERC20", "TRC20"].map(net => {
                              const netLabel = net === "ERC20" ? "USDT (ERC-20 / Ethereum)" : "USDT (TRC-20 / Tron)";
                              return (
                                <button
                                  key={net}
                                  onClick={() => setBuyUsdtNetwork(net)}
                                  style={{
                                    flex: 1, padding: "8px 12px", borderRadius: 8, border: buyUsdtNetwork === net ? `2px solid ${th.accent}` : "1px solid rgba(255,255,255,0.08)",
                                    background: buyUsdtNetwork === net ? `${th.accent}12` : "transparent",
                                    color: buyUsdtNetwork === net ? th.accent : "#8a8a9a",
                                    fontSize: 10, fontWeight: 600, cursor: "pointer"
                                  }}
                                >
                                  {netLabel}
                                </button>
                              );
                            })}
                          </div>
                          <div style={{ padding: 10, borderRadius: 8, background: '#ff444410', border: '1px solid #ff444430', color: '#ff4466', fontSize: 9, lineHeight: 1.4, textAlign: 'left', marginTop: 4 }}>
                            <strong>IMPORTANT:</strong> Select the correct network. Sending ERC-20 USDT to a TRC-20 address (or vice versa) will result in permanent loss of funds.
                          </div>
                        </div>
                      )}

                      <div style={{ display: "flex", gap: 10 }}>
                        <button
                          onClick={() => setBuyStep(2)}
                          style={{ flex: 1, padding: "12px", borderRadius: 8, border: "1px solid rgba(255,255,255,0.1)", background: "transparent", color: "#8a8a9a", fontSize: 11, fontWeight: 600, cursor: "pointer" }}
                        >
                          [ Back ]
                        </button>
                        <button
                          disabled={!buyCoin}
                          onClick={() => { setBuyCountdown(900); setBuyStep(4); }}
                          style={{ flex: 1, padding: "12px", borderRadius: 8, border: "none", background: buyCoin ? th.accent : "#3a5e4a", color: buyCoin ? "#000" : "#a0a0b0", fontSize: 11, fontWeight: 600, cursor: buyCoin ? "pointer" : "not-allowed" }}
                        >
                          {buyCoin ? `[ Continue with ${buyCoin} ]` : '[ Select Coin ]'}
                        </button>
                      </div>
                    </div>
                  )}

                  {/* Step 4: Payment Details */}
                  {buyStep === 4 && (
                    <div style={{ animation: "fadeIn 0.2s ease" }}>
                      <div style={{ fontSize: 14, fontWeight: 700, color: th.accent, marginBottom: 16, textTransform: "uppercase", textAlign: "center" }}>Payment Details</div>

                      {/* QR Code Container */}
                      <div style={{ display: "flex", justifyContent: "center", marginBottom: 16 }}>
                        {buyQrSvgStr ? (
                          <div style={{ background: "#fff", padding: 12, borderRadius: 10, display: "inline-block", boxShadow: "0 4px 20px rgba(0,0,0,0.5)" }} dangerouslySetInnerHTML={{ __html: buyQrSvgStr }} />
                        ) : (
                          <div style={{ color: "#6a6a7a", fontSize: 10, padding: 20, border: "1px dashed rgba(255,255,255,0.06)", borderRadius: 10 }}>QR Code Rendering...</div>
                        )}
                      </div>

                      <div style={{ display: "flex", flexDirection: "column", gap: 12, marginBottom: 16 }}>
                        <div>
                          <div style={{ fontSize: 9, color: "#8a8a9a", fontWeight: 600, marginBottom: 4 }}>SEND EXACT CRYPTO AMOUNT:</div>
                          <div style={{ fontSize: 20, fontWeight: 800, color: th.accent, fontFamily: "monospace" }}>
                            {buyCryptoAmount} {buyCoin}
                          </div>
                        </div>

                        <div>
                          <div style={{ fontSize: 9, color: "#8a8a9a", fontWeight: 600, marginBottom: 4 }}>TO WALLET ADDRESS:</div>
                          <div style={{ display: "flex", gap: 8 }}>
                            <input
                              type="text"
                              readOnly
                              value={buyWalletAddress}
                              style={{ flex: 1, padding: "10px 12px", background: "#0a0a14", border: "1px solid rgba(255,255,255,0.08)", borderRadius: 8, color: "#8a8a9a", fontSize: 10, fontFamily: "monospace", outline: "none" }}
                            />
                            <button
                              onClick={() => {
                                navigator.clipboard?.writeText(buyWalletAddress);
                                addToast('Copied to clipboard', 'success');
                              }}
                              style={{ padding: "10px 14px", borderRadius: 8, border: "none", background: th.accent, color: "#000", fontWeight: 600, fontSize: 11, cursor: "pointer" }}
                            >
                              Copy
                            </button>
                          </div>
                        </div>
                      </div>

                      {buyCoin === 'USDT' && (
                        <div style={{ padding: 10, borderRadius: 8, background: '#ff444410', border: '1px solid #ff444430', color: '#ff4466', fontSize: 9, lineHeight: 1.4, textAlign: 'left', marginBottom: 16 }}>
                          <strong>IMPORTANT:</strong> Select the correct network. Sending ERC-20 USDT to a TRC-20 address (or vice versa) will result in permanent loss of funds.
                        </div>
                      )}

                      {/* Countdown Display */}
                      <div style={{ background: "rgba(255,255,255,0.02)", border: "1px solid rgba(255,255,255,0.04)", borderRadius: 10, padding: 12, textAlign: "center", marginBottom: 20 }}>
                        <div style={{ fontSize: 8, color: "#6a6a7a", textTransform: "uppercase", letterSpacing: 1.5, marginBottom: 4 }}>Quote Exchange Rate Lock</div>
                        <div style={{ fontSize: 18, fontWeight: 800, fontFamily: "monospace", color: buyCountdown <= 60 ? "#ff4466" : th.accent }}>
                          {buyCountdownStr}
                        </div>
                      </div>

                      <div style={{ display: "flex", gap: 10 }}>
                        <button
                          onClick={() => setBuyStep(3)}
                          style={{ flex: 1, padding: "12px", borderRadius: 8, border: "1px solid rgba(255,255,255,0.1)", background: "transparent", color: "#8a8a9a", fontSize: 11, fontWeight: 600, cursor: "pointer" }}
                        >
                          [ Back ]
                        </button>
                        <button
                          onClick={() => setBuyStep(5)}
                          style={{ flex: 1, padding: "12px", borderRadius: 8, border: "none", background: th.accent, color: "#000", fontSize: 11, fontWeight: 600, cursor: "pointer" }}
                        >
                          [ I Have Paid ]
                        </button>
                      </div>
                    </div>
                  )}

                  {/* Step 5: Confirm Payment (TXID + Screenshot + Email) */}
                  {buyStep === 5 && (
                    <div style={{ animation: "fadeIn 0.2s ease" }}>
                      <div style={{ fontSize: 14, fontWeight: 700, color: th.accent, marginBottom: 16, textTransform: "uppercase", textAlign: "center" }}>Submit Payment Details</div>

                      <div style={{ display: "flex", flexDirection: "column", gap: 12, marginBottom: 20 }}>
                        <div>
                          <span style={{ fontSize: 10, color: "#8a8a9a", fontWeight: 600, display: "block", marginBottom: 6 }}>TRANSACTION ID (TXID / HASH):</span>
                          <input
                            type="text"
                            placeholder="Enter blockchain transaction hash"
                            value={buyTxHash}
                            onChange={e => setBuyTxHash(e.target.value)}
                            style={{ width: "100%", padding: "10px 12px", background: "#0a0a14", border: "1px solid rgba(255,255,255,0.08)", borderRadius: 8, color: "#e0e0e0", fontSize: 11, fontFamily: "monospace", outline: "none" }}
                          />
                        </div>

                        <div>
                          <span style={{ fontSize: 10, color: "#8a8a9a", fontWeight: 600, display: "block", marginBottom: 6 }}>TRANSACTION SCREENSHOT:</span>
                          <input
                            type="file"
                            accept="image/*"
                            onChange={e => {
                              const file = e.target.files[0];
                              if (file) {
                                setBuyFileName(file.name);
                                const reader = new FileReader();
                                reader.onload = function(evt) {
                                  setBuyFileBlob(new Blob([evt.target.result], { type: file.type }));
                                };
                                reader.readAsArrayBuffer(file);
                              }
                            }}
                            style={{ width: "100%", padding: "8px 10px", background: "#0a0a14", border: "1px solid rgba(255,255,255,0.08)", borderRadius: 8, color: "#8a8a9a", fontSize: 11, outline: "none" }}
                          />
                        </div>

                        <div>
                          <span style={{ fontSize: 10, color: "#8a8a9a", fontWeight: 600, display: "block", marginBottom: 6 }}>DELIVERY EMAIL ADDRESS:</span>
                          <input
                            type="email"
                            placeholder="Enter your email address"
                            value={buyEmail}
                            onChange={e => setBuyEmail(e.target.value)}
                            style={{ width: "100%", padding: "10px 12px", background: "#0a0a14", border: "1px solid rgba(255,255,255,0.08)", borderRadius: 8, color: "#e0e0e0", fontSize: 11, outline: "none" }}
                          />
                        </div>
                      </div>

                      <div style={{ display: "flex", gap: 10 }}>
                        <button
                          onClick={() => setBuyStep(4)}
                          style={{ flex: 1, padding: "12px", borderRadius: 8, border: "1px solid rgba(255,255,255,0.1)", background: "transparent", color: "#8a8a9a", fontSize: 11, fontWeight: 600, cursor: "pointer" }}
                        >
                          [ Back ]
                        </button>
                        <button
                          onClick={() => {
                            if (!buyTxHash.trim()) { alert('TXID is required'); return; }
                            if (!buyFileBlob) { alert('Screenshot is required'); return; }
                            if (!buyEmail.trim() || !buyEmail.includes('@')) { alert('Valid delivery email is required'); return; }
                            setBuyStep(6);
                          }}
                          style={{ flex: 1, padding: "12px", borderRadius: 8, border: "none", background: th.accent, color: "#000", fontSize: 11, fontWeight: 600, cursor: "pointer" }}
                        >
                          [ Submit Verification ]
                        </button>
                      </div>
                    </div>
                  )}

                  {/* Step 6: Verifying Payment (Spinner) */}
                  {buyStep === 6 && (
                    <div style={{ textAlign: "center", padding: "30px 10px", animation: "fadeIn 0.2s ease" }}>
                      <div style={{ display: "inline-block", width: 40, height: 40, border: `3px solid ${th.accent}20`, borderTopColor: th.accent, borderRadius: "50%", animation: "ripple 1s linear infinite", marginBottom: 20 }} />
                      <div style={{ fontSize: 13, fontWeight: 700, color: "#e0e0e8", marginBottom: 8 }}>Querying Blockchain Network...</div>
                      <div style={{ fontSize: 10, color: "#6a6a7a", fontFamily: "monospace" }}>Checking confirmations for tx {buyTxHash.substring(0, 16)}...</div>
                    </div>
                  )}

                  {/* Step 7: Manual Submission (Email Draft) */}
                  {buyStep === 7 && (
                    <div style={{ animation: "fadeIn 0.2s ease" }}>
                      <div style={{ fontSize: 13, fontWeight: 700, color: "#ff8800", marginBottom: 12, textAlign: "center" }}>⚠️ AUTOMATED CHECK UNRESOLVED</div>
                      <div style={{ fontSize: 11, color: "#8a8a9a", lineHeight: 1.5, marginBottom: 16 }}>
                        Our automated verifier could not immediately find your transaction confirmation on-chain. Please complete verification by sending your details to support manually.
                      </div>

                      <div style={{ background: "rgba(255,255,255,0.02)", border: "1px solid rgba(255,255,255,0.06)", borderRadius: 10, padding: 12, fontSize: 10, color: "#a0a0b0", lineHeight: 1.6, marginBottom: 16 }}>
                        <div><strong>Reference ID:</strong> <span style={{ fontFamily: "monospace", color: th.accent }}>{buyRefId}</span></div>
                        <div><strong>Delivery Email:</strong> {buyEmail}</div>
                        <div><strong>Transaction:</strong> {buyCryptoAmount} {buyCoin}</div>
                        <div style={{ wordBreak: "break-all" }}><strong>TXID:</strong> <span style={{ fontFamily: "monospace" }}>{buyTxHash}</span></div>
                      </div>

                      <div style={{ display: "flex", flexDirection: "column", gap: 10, marginBottom: 16 }}>
                        <button
                          onClick={() => {
                            if (!buyFileBlob) return;
                            const url = URL.createObjectURL(buyFileBlob);
                            const a = document.createElement('a');
                            a.href = url;
                            a.download = buyFileName || 'ghostlink-receipt.png';
                            document.body.appendChild(a);
                            a.click();
                            document.body.removeChild(a);
                            URL.revokeObjectURL(url);
                          }}
                          style={{ width: "100%", padding: "12px", borderRadius: 8, border: `1px solid ${th.accent}`, background: "transparent", color: th.accent, fontSize: 11, fontWeight: 600, cursor: "pointer", outline: "none" }}
                        >
                          📥 Download Payment Screenshot
                        </button>
                        
                        <button
                          onClick={() => {
                            const durationStr = buyBilling === 'lifetime' ? 'LIFETIME' : `${buyDuration} ${buyBilling === 'monthly' ? 'MONTHS' : 'YEARS'}`;
                            const subject = encodeURIComponent(`GhostLink License Request — ${buyPlan} — ${durationStr}`);
                            const body = encodeURIComponent(
                              `Plan: ${buyPlan}\n` +
                              `Billing: ${buyBilling.toUpperCase()}\n` +
                              `Duration: ${buyBilling === 'lifetime' ? 'Lifetime' : buyDuration + ' ' + (buyBilling === 'monthly' ? 'month(s)' : 'year(s)')}\n` +
                              `Amount Paid: ${buyCryptoAmount} ${buyCoin} ($${buyTotalPriceUSD} USD)\n` +
                              `Transaction Hash: ${buyTxHash}\n` +
                              `Device ID: ${deviceId || 'N/A'}\n` +
                              `Verification Status: Pending Manual Review\n` +
                              `Reference ID: ${buyRefId}\n\n` +
                              `[Screenshot attached separately — please attach the downloaded payment screenshot to this email before sending]`
                            );
                            window.location.href = `mailto:ghostlink@proton.me?subject=${subject}&body=${body}`;
                            setBuyStep(8);
                          }}
                          style={{ width: "100%", padding: "12px", borderRadius: 8, border: "none", background: th.accent, color: "#000", fontSize: 11, fontWeight: 600, cursor: "pointer", outline: "none" }}
                        >
                          ✉️ Launch Email Client
                        </button>
                      </div>
                    </div>
                  )}

                  {/* Step 8: Success/Instructions */}
                  {buyStep === 8 && (
                    <div style={{ textAlign: "center", animation: "fadeIn 0.2s ease" }}>
                      <div style={{ fontSize: 32, marginBottom: 12 }}>📬</div>
                      <div style={{ fontSize: 15, fontWeight: 800, color: th.accent, marginBottom: 8 }}>Verification Details Sent</div>
                      <div style={{ fontSize: 11, color: "#8a8a9a", lineHeight: 1.6, marginBottom: 20 }}>
                        We have queued your activation request under Reference ID: <strong style={{ color: "#fff", fontFamily: "monospace" }}>{buyRefId}</strong>.<br/><br/>
                        Once the transaction has been verified by our team, your activation key will be delivered to: <strong style={{ color: "#fff" }}>{buyEmail}</strong>.<br/><br/>
                        Copy the received license key and paste it directly into the Settings activation input field to unlock your Pro features.
                      </div>
                      
                      <button
                        onClick={() => setShowBuyModal(false)}
                        style={{ width: "100%", padding: "12px", borderRadius: 8, border: "none", background: th.accent, color: "#000", fontSize: 11, fontWeight: 600, cursor: "pointer" }}
                      >
                        [ Close Portal ]
                      </button>
                    </div>
                  )}

                </div>
              </div>
            )}
          </div>
        );
      }

      const root = ReactDOM.createRoot(document.getElementById("root"));
      root.render(React.createElement(ErrorBoundary, null, React.createElement(GhostLinkApp)));
    </script>
  </body>
</html>
