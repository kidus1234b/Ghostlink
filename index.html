    <script>
      /* Defensive stub. Some browser wallet/privacy extensions inject
         `window.ethereum.selectedAddress = ...` into every page they load.
         GhostLink is not a Web3 app and never provides a wallet, so on this
         page `window.ethereum` is undefined and that injected assignment throws
         "TypeError: undefined is not an object". Predefine a harmless, writable
         placeholder so the injected code no-ops instead of crashing the page.
         Guarded so the stub itself can never break anything. */
      (function () {
        try {
          if (typeof window.ethereum === "undefined") {
            Object.defineProperty(window, "ethereum", {
              value: { selectedAddress: undefined, isGhostLinkStub: true },
              writable: true,
              configurable: true
            });
          }
        } catch (e) { /* ignore: a real provider already owns window.ethereum */ }
      })();
    </script>

    <script>
      (function() {
        window.errs = [];
        window.onerror = function(msg, url, line, col, error) {
          window.errs.push({type: 'error', msg, url, line, col, stack: error?.stack});
          showDebug();
          return false;
        };
        window.onunhandledrejection = function(event) {
          window.errs.push({type: 'promise', msg: event.reason?.message || event.reason, stack: event.reason?.stack});
          showDebug();
        };
        const origLog = console.log;
        const origError = console.error;
        console.log = function(...args) {
          origLog.apply(console, args);
          window.errs.push({type: 'log', text: args.map(a => typeof a === 'object' ? JSON.stringify(a) : String(a)).join(' ')});
          showDebug();
        };
        console.error = function(...args) {
          origError.apply(console, args);
          window.errs.push({type: 'error', text: args.map(a => typeof a === 'object' ? JSON.stringify(a) : String(a)).join(' ')});
          showDebug();
        };
        function showDebug() {
          const errors = window.errs.filter(e => e.type === 'error' || e.type === 'promise');
          if (errors.length === 0) {
            const existing = document.getElementById('debug-reporter');
            if (existing) existing.remove();
            return;
          }
          let div = document.getElementById('debug-reporter');
          if (!div) {
            div = document.createElement('div');
            div.id = 'debug-reporter';
            div.style.position = 'fixed';
            div.style.bottom = '0';
            div.style.left = '0';
            div.style.right = '0';
            div.style.height = '300px';
            div.style.background = '#111';
            div.style.color = '#ff4466';
            div.style.fontFamily = 'monospace';
            div.style.overflow = 'auto';
            div.style.padding = '10px';
            div.style.zIndex = '999999';
            div.style.borderTop = '2px solid red';
            if (document.body) {
              document.body.appendChild(div);
            } else {
              window.addEventListener('DOMContentLoaded', () => {
                if (window.errs.filter(e => e.type === 'error' || e.type === 'promise').length > 0) {
                  document.body.appendChild(div);
                  showDebug();
                }
              });
              return;
            }
          }
          div.innerHTML = errors.map(e => `<div>[${e.type}] ${e.msg || e.text || ''} ${e.url ? 'in ' + e.url : ''} ${e.line ? 'line ' + e.line + ':' + e.col : ''} ${e.stack ? '<pre>' + e.stack + '</pre>' : ''}</div>`).join('');
        }
      })();

      // The whole app is one in-browser-compiled <script type="text/babel"> that
      // exceeds 500KB, so @babel/generator auto-enables compact output and logs a
      // benign "[BABEL] Note: ...deoptimised the styling..." message via console.error.
      // Compact mode is already applied and has no functional effect; the standalone
      // script-tag runner gives no way to pass `compact` explicitly, so we filter out
      // just this one note to keep the console clean. All other errors pass through.
      (function () {
        const origError = console.error;
        console.error = function (...args) {
          if (typeof args[0] === 'string' &&
              args[0].startsWith('[BABEL] Note: The code generator has deoptimised')) {
            return;
          }
          return origError.apply(console, args);
        };
      })();

      // License API — saved in GLLicenseAPI before React component overwrites window.GhostLink
      const GLLicenseAPI = window.GLLicenseAPI || {};
      let _licenseInitPromise = null;

      async function computeDeviceId(pubKeyHex) {
        if (!pubKeyHex || !crypto?.subtle) return '';
        const hash = await crypto.subtle.digest('SHA-256', new TextEncoder().encode(pubKeyHex));
        return Array.from(new Uint8Array(hash)).map(b => b.toString(16).padStart(2, '0')).join('');
      }

      async function resolveDeviceId(identity) {
        try {
          if (identity?.publicKeyHex) return await computeDeviceId(identity.publicKeyHex);
          const raw = localStorage.getItem('gl_identity');
          if (raw) {
            const d = JSON.parse(raw);
            const hex = d.pubKeyHex || d.publicKeyHex;
            if (hex) return await computeDeviceId(hex);
          }
          if (GLLicenseAPI.DeviceFingerprintManager) {
            const fp = new GLLicenseAPI.DeviceFingerprintManager();
            return await fp.getFingerprint();
          }
        } catch (err) {
          console.error('[GhostLink] Device ID error:', err);
        }
        return '';
      }

      async function bootstrapLicenseSystem() {
        const GL = GLLicenseAPI;
        const deviceFP = new GL.DeviceFingerprintManager();
        const validator = new GL.LicenseValidator({ deviceFingerprint: deviceFP });
        const licenseManager = new GL.LicenseManager({ validator, deviceFingerprint: deviceFP });
        const featureGate = new GL.FeatureGateManager({ licenseManager });
        await licenseManager.init();
        featureGate.setLicenseManager(licenseManager);
        return { deviceFingerprint: deviceFP, validator, licenseManager, featureGate };
      }

      async function ensureLicenseSystem() {
        if (window.GLLicenseRuntime?.licenseManager) return window.GLLicenseRuntime;

        if (!_licenseInitPromise) {
          _licenseInitPromise = (async () => {
            const GL = GLLicenseAPI;
            if (typeof GL.initLicenseSystem === 'function') {
              try {
                const system = await GL.initLicenseSystem({});
                window.GLLicenseRuntime = system;
                return system;
              } catch (err) {
                console.warn('[GhostLink] initLicenseSystem failed, using bootstrap:', err.message);
              }
            }
            if (GL.LicenseManager && GL.LicenseValidator) {
              const system = await bootstrapLicenseSystem();
              window.GLLicenseRuntime = system;
              return system;
            }
            throw new Error('License scripts failed to load — refresh via http://localhost:8000');
          })().catch(err => {
            _licenseInitPromise = null;
            throw err;
          });
        }
        return _licenseInitPromise;
      }

      // ==================== GHOSTLINK PLATFORM (Production Architecture) ====================
      class GhostLinkPlatform {
        static _instance = null;
        static _initPromise = null;

        constructor() {
          if (GhostLinkPlatform._instance) return GhostLinkPlatform._instance;
          this._initialized = false;
          this._identity = null;
          this._managers = {};
          this._eventBus = null;
          this._logger = null;
          this._signalBus = null;
        }

        static getInstance() {
          if (!GhostLinkPlatform._instance) {
            GhostLinkPlatform._instance = new GhostLinkPlatform();
          }
          return GhostLinkPlatform._instance;
        }

        static async init(identity) {
          if (GhostLinkPlatform._initPromise) return GhostLinkPlatform._initPromise;
          const platform = GhostLinkPlatform.getInstance();

          GhostLinkPlatform._initPromise = platform._initInternal(identity);
          return GhostLinkPlatform._initPromise;
        }

        async _initInternal(identity) {
          if (this._initialized) return;

          this._identity = identity;

          // Core infrastructure
          this._eventBus = new GhostLink.EventBus('ghostlink-platform');
          this._logger = new GhostLink.Logger('GhostLink', { minLevel: 'debug' });
          this._signalBus = new GhostLink.SignalBus({ busName: 'ghostlink-signals' });

          const logger = this._logger;

          // Security Manager (no dependencies)
          this._managers.security = new GhostLink.SecurityManager({
            eventBus: this._eventBus,
            logger: logger.child ? logger.child('security') : logger,
          });

          // Connection Manager (depends on identity, eventBus, logger)
          this._managers.connection = new GhostLink.ConnectionManager({
            identity,
            eventBus: this._eventBus,
            logger: logger.child ? logger.child('connection') : logger,
          });

          // Signal Manager (depends on identity, eventBus, logger)
          this._managers.signal = new GhostLink.SignalManager({
            identity,
            eventBus: this._eventBus,
            logger: logger.child ? logger.child('signal') : logger,
          });

          // Relay Manager (depends on eventBus, logger)
          this._managers.relay = new GhostLink.RelayManager({
            eventBus: this._eventBus,
            logger: logger.child ? logger.child('relay') : logger,
            connectionManager: this._managers.connection,
          });

          // Key Manager (depends on eventBus, logger)
          this._managers.key = new GhostLink.KeyManager({
            identity,
            eventBus: this._eventBus,
            logger: logger.child ? logger.child('key') : logger,
          });

          // Offline Queue (depends on eventBus, logger)
          this._managers.offlineQueue = new GhostLink.OfflineQueue({
            eventBus: this._eventBus,
            logger: logger.child ? logger.child('offlineQueue') : logger,
          });

          // Message Router (depends on many)
          this._managers.message = new GhostLink.MessageRouter({
            eventBus: this._eventBus,
            logger: logger.child ? logger.child('message') : logger,
            connectionManager: this._managers.connection,
            securityManager: this._managers.security,
            offlineQueue: this._managers.offlineQueue,
          });

          // File Transfer Manager (depends on connection, key)
          this._managers.fileTransfer = new GhostLink.FileTransferManager({
            eventBus: this._eventBus,
            logger: logger.child ? logger.child('fileTransfer') : logger,
            connectionManager: this._managers.connection,
            keyManager: this._managers.key,
          });

          // Presence Manager (depends on connection)
          this._managers.presence = new GhostLink.PresenceManager({
            eventBus: this._eventBus,
            logger: logger.child ? logger.child('presence') : logger,
            connectionManager: this._managers.connection,
          });

          // Peer Manager (wires everything together)
          this._managers.peer = new GhostLink.PeerManager({
            identity,
            eventBus: this._eventBus,
            logger: logger.child ? logger.child('peer') : logger,
            connectionManager: this._managers.connection,
            signalManager: this._managers.signal,
            messageRouter: this._managers.message,
            fileTransferManager: this._managers.fileTransfer,
            presenceManager: this._managers.presence,
            relayManager: this._managers.relay,
            keyManager: this._managers.key,
          });

          // Debug Console
          if (typeof GhostLink.DebugConsole !== 'undefined') {
            this._managers.debugConsole = new GhostLink.DebugConsole({
              eventBus: this._eventBus,
              logger: logger,
              peerManager: this._managers.peer,
              connectionManager: this._managers.connection,
              messageRouter: this._managers.message,
              fileTransferManager: this._managers.fileTransfer,
              signalManager: this._managers.signal,
            });
          }

          // Self-test capability
          if (typeof GhostLink.SelfTest !== 'undefined') {
            this._managers.selfTest = GhostLink.SelfTest;
          }

          // License System (Pro Licensing & Team Workspaces)
          const licenseNS = window.GLLicenseAPI || {};
          if (typeof licenseNS.initLicenseSystem === 'function') {
            try {
              const licenseSystem = await licenseNS.initLicenseSystem({
                keyManager: this._managers.key,
                eventBus: this._eventBus
              });
              Object.assign(this._managers, licenseSystem);
              window.GLLicenseRuntime = licenseSystem;
              this._logger.info('License system initialized');
            } catch (err) {
              this._logger.error('License system initialization failed', { error: err.message });
            }
          }

          // Wire eventBus to signalBus channels for cross-module communication
          this._wireEventBusToSignalBus();

          this._initialized = true;
          this._logger.info('GhostLink Platform initialized', { peerId: identity?.name });

          return this;
        }

        _wireEventBusToSignalBus() {
          // Map EventBus events to SignalBus channels
          const wiring = [
            { event: 'peer:', channel: 'peer' },
            { event: 'conn:', channel: 'network' },
            { event: 'signal:', channel: 'network' },
            { event: 'message:', channel: 'message' },
            { event: 'file:', channel: 'file' },
            { event: 'presence:', channel: 'presence' },
            { event: 'security:', channel: 'security' },
            { event: 'system:', channel: 'system' },
          ];

          wiring.forEach(({ event, channel }) => {
            this._eventBus.on(event + '*', (data) => {
              const topic = data?._topic || event + 'event';
              this._signalBus.getChannel(channel).emit(topic, data);
            });
          });
        }

        // API
        get eventBus() { return this._eventBus; }
        get logger() { return this._logger; }
        get signalBus() { return this._signalBus; }
        get managers() { return this._managers; }
        get identity() { return this._identity; }
        get isInitialized() { return this._initialized; }

        // Convenience getters for managers
        get peerManager() { return this._managers.peer; }
        get connectionManager() { return this._managers.connection; }
        get signalManager() { return this._managers.signal; }
        get messageRouter() { return this._managers.message; }
        get fileTransferManager() { return this._managers.fileTransfer; }
        get presenceManager() { return this._managers.presence; }
        get securityManager() { return this._managers.security; }
        get relayManager() { return this._managers.relay; }
        get keyManager() { return this._managers.key; }
        get offlineQueue() { return this._managers.offlineQueue; }

        // License System getters
        get licenseManager() { return this._managers.licenseManager; }
        get featureGate() { return this._managers.featureGate; }
        get workspaceManager() { return this._managers.workspaceManager; }
        get proThemes() { return this._managers.proThemes; }
        get dataExport() { return this._managers.dataExport; }
        get generator() { return this._managers.generator; }
        get deviceFingerprint() { return this._managers.deviceFingerprint; }
        get licenseValidator() { return this._managers.validator; }
        get securityHardening() { return this._managers.hardening; }
        get activationUI() { return this._managers.activationUI; }

        // High-level API
        async connectToPeer(peerId, mode = 'auto') {
          return this._managers.peer?.addPeer(peerId, { mode });
        }

        async disconnectFromPeer(peerId) {
          return this._managers.peer?.removePeer(peerId);
        }

        async sendMessage(peerId, content, type = 'chat') {
          return this._managers.message?.sendMessage(peerId, type, { content });
        }

        async sendFile(peerId, file) {
          return this._managers.fileTransfer?.sendFile(peerId, file);
        }

        getConnectedPeers() {
          return this._managers.peer?.getAllPeers() || [];
        }

        getPeerState(peerId) {
          return this._managers.peer?.getPeerState(peerId) || 'idle';
        }

        async runSelfTest() {
          return this._managers.selfTest?.runAllTests();
        }

        destroy() {
          this._managers.peer?.destroy();
          this._managers.connection?.destroy();
          this._managers.signal?.destroy();
          this._managers.presence?.destroy();
          this._managers.fileTransfer?.destroy();
          this._managers.message?.destroy();
          this._managers.relay?.destroy();
          this._managers.key?.destroy();
          this._managers.security?.destroy();
          this._managers.offlineQueue?.destroy();
          this._managers.licenseManager?.destroy();
          this._managers.featureGate?.destroy();
          this._managers.workspaceManager?.destroy();
          this._managers.proThemes?.destroy();
          this._managers.dataExport?.destroy();
          this._managers.devConsole?.destroy();
          this._managers.deviceFingerprint?.clearCache?.();
          this._managers.hardening?.destroy?.();
          this._managers.activationUI?.destroy?.();
          this._managers = {};
          this._initialized = false;
          this._logger?.info('GhostLink Platform destroyed');
        }
      }

      // Expose globally
      window.GhostLinkPlatform = GhostLinkPlatform;
      window.GhostLinkDebug = window.GhostLinkPlatform; // Alias for compatibility

      // ==================== CRYPTO ENGINE ====================
      const CryptoEngine = {
        async generateKeyPair() {
          const kp = await crypto.subtle.generateKey({ name: "ECDH", namedCurve: "P-256" }, true, ["deriveKey"]);
          const raw = await crypto.subtle.exportKey("raw", kp.publicKey);
          const hex = Array.from(new Uint8Array(raw)).map(b => b.toString(16).padStart(2, "0")).join("");
          return { keyPair: kp, publicKeyHex: hex };
        },
        async sha256(d) {
          const h = await crypto.subtle.digest("SHA-256", new TextEncoder().encode(d));
          return Array.from(new Uint8Array(h)).map(b => b.toString(16).padStart(2, "0")).join("");
        },
        async encrypt(text, key) {
          const iv = crypto.getRandomValues(new Uint8Array(12));
          const ck = await crypto.subtle.importKey("raw", new TextEncoder().encode(key.padEnd(32, "0").slice(0, 32)), "AES-GCM", false, ["encrypt"]);
          const ct = await crypto.subtle.encrypt({ name: "AES-GCM", iv }, ck, new TextEncoder().encode(text));
          return {
            iv: Array.from(iv).map(b => b.toString(16).padStart(2, "0")).join(""),
            ciphertext: Array.from(new Uint8Array(ct)).map(b => b.toString(16).padStart(2, "0")).join(""),
          };
        },
        genInvite() {
          const chars = "ABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789";
          const bytes = crypto.getRandomValues(new Uint8Array(9));
          const part1 = Array.from(bytes.slice(0, 3)).map(b => chars[b % chars.length]).join("");
          const part2 = Array.from(bytes.slice(3, 6)).map(b => chars[b % chars.length]).join("");
          const part3 = Array.from(bytes.slice(6, 9)).map(b => chars[b % chars.length]).join("");
          return `GHOST-${part1}-${part2}-${part3}`;
        },
        // URL-safe base64 encode (replaces deprecated unescape/escape)
        _base64Encode(str) {
          try {
            return btoa(encodeURIComponent(str).replace(/%([0-9A-F]{2})/g,
              (_, p1) => String.fromCharCode(parseInt(p1, 16))));
          } catch (e) {
            return btoa(str);
          }
        },
        _base64Decode(str) {
          try {
            return decodeURIComponent(Array.from(atob(str)).map(c =>
              '%' + c.charCodeAt(0).toString(16).padStart(2, '0')).join(''));
          } catch (e) {
            return atob(str);
          }
        },
        async deriveKeyFromSeed(words) {
          const enc = new TextEncoder();
          const km = await crypto.subtle.importKey("raw", enc.encode(words.join(" ")), "PBKDF2", false, ["deriveKey"]);
          return crypto.subtle.deriveKey(
            { name: "PBKDF2", salt: enc.encode("ghostlink-v2-salt"), iterations: 100000, hash: "SHA-256" },
            km, { name: "AES-GCM", length: 256 }, false, ["wrapKey", "unwrapKey"]
          );
        },
        async wrapPrivKey(privKey, wrapKey) {
          const iv = crypto.getRandomValues(new Uint8Array(12));
          const wrapped = await crypto.subtle.wrapKey("pkcs8", privKey, wrapKey, { name: "AES-GCM", iv });
          return {
            iv: [...iv].map(b => b.toString(16).padStart(2,"0")).join(""),
            data: [...new Uint8Array(wrapped)].map(b => b.toString(16).padStart(2,"0")).join("")
          };
        },
        async unwrapPrivKey(w, wrapKey) {
          const iv = new Uint8Array(w.iv.match(/.{2}/g).map(b => parseInt(b,16)));
          const data = new Uint8Array(w.data.match(/.{2}/g).map(b => parseInt(b,16)));
          return crypto.subtle.unwrapKey("pkcs8", data, wrapKey, { name: "AES-GCM", iv }, { name: "ECDH", namedCurve: "P-256" }, true, ["deriveKey"]);

        async decrypt(encObj, key) {
          const ck = await crypto.subtle.importKey("raw", new TextEncoder().encode(key.padEnd(32, "0").slice(0, 32)), "AES-GCM", false, ["decrypt"]);
          const iv = new Uint8Array(encObj.iv.match(/.{2}/g).map(b => parseInt(b, 16)));
          const ct = new Uint8Array(encObj.ciphertext.match(/.{2}/g).map(b => parseInt(b, 16)));

            "raw",
            keyBytes,
            { name: "ECDH", namedCurve: "P-256" },

      /* 
       * Known Limitation: Symmetric NAT Traversal
       * Direct connection requires either one peer to have a direct public IP, or both peers
       * to have cone NATs that allow hole punching via STUN reflexive candidates. If one or
       * both devices are on symmetric NAT networks (common on cellular/mobile carriers or strict
       * corporate firewalls), direct WebRTC hole punching will fail. In those cases, a TURN relay
       * server is required. This zero-server flow uses only STUN servers, so symmetric NAT cases

       *
       * Why full SDP exchange works:
       * A WebRTC peer connection needs to know the external IP and port for the remote peer,
       * as well as the cryptographic fingerprints and connection configuration. STUN servers
       * help each peer discover its own public-facing reflexive candidate mapping (IP and port).
       * By embedding all these candidates inside the full SDP block and exchanging them (via QR

      const ManualSignaling = {
        // Helper to wait for ICE gathering to complete before proceeding
        waitForIceGathering(pc) {
          return new Promise(resolve => {
            if (pc.iceGatheringState === 'complete') {
              resolve();
              return;
            }
            const timeoutId = setTimeout(() => {
              pc.removeEventListener('icegatheringstatechange', check);
              resolve();
            }, 4000);
            function check() {
              if (pc.iceGatheringState === 'complete') {
                clearTimeout(timeoutId);
                pc.removeEventListener('icegatheringstatechange', check);
                resolve();
              }
            }
            pc.addEventListener('icegatheringstatechange', check);
          });
        },

        async createOffer(identity) {
          const pc = new RTCPeerConnection({
            iceServers: getIceServers()
          });

          // Create 3 data channels: messages, files, presence
          const msgDc = pc.createDataChannel('messages', { ordered: true });
          const filesDc = pc.createDataChannel('files', { ordered: true });
          const presDc = pc.createDataChannel('presence', { ordered: false, maxRetransmits: 0 });

          // Call createOffer(), setLocalDescription(offer)
          const offer = await pc.createOffer();
          await pc.setLocalDescription(offer);

          // Wait for ICE gathering to complete
          await this.waitForIceGathering(pc);

          // Bundle: sdp, pubKeyHex, name, fingerprint, timestamp
          const bundle = {
            sdp: pc.localDescription,
            pubKeyHex: identity.publicKeyHex,
            name: identity.name,
            fingerprint: identity.fingerprint,
            timestamp: Date.now()
          };

          // Compress/encode raw base64
          const encoded = CryptoEngine._base64Encode(JSON.stringify(bundle));
          return { encoded, pc, dcs: { messages: msgDc, files: filesDc, presence: presDc }, bundle };

        async processOffer(encodedOffer, identity) {
          const bundle = JSON.parse(CryptoEngine._base64Decode(encodedOffer));
          if (!bundle || !bundle.sdp) {
            throw new Error("Invalid offer bundle structure");
          }

          const pc = new RTCPeerConnection({
            iceServers: getIceServers()
          });

          // setRemoteDescription(offer from bundle)
          await pc.setRemoteDescription(new RTCSessionDescription(bundle.sdp));

          // Listen for the 3 incoming data channels
          const dcs = { messages: null, files: null, presence: null };
          pc.ondatachannel = (e) => {
            const label = e.channel.label;
            if (label === 'messages' || label === 'files' || label === 'presence') {

          const answer = await pc.createAnswer();
          await pc.setLocalDescription(answer);

          await this.waitForIceGathering(pc);

            sdp: pc.localDescription,
            pubKeyHex: identity.publicKeyHex,
            name: identity.name,
            fingerprint: identity.fingerprint,
            timestamp: Date.now()

            const coeffs = new Uint8Array(k);

      // Build the full data blob that gets Shamir-split
      async function buildBackupBlob(identity, masterKey, appState) {
        const wrappedPrivKey = await CryptoEngine.wrapPrivKey(identity.keyPair.privateKey, masterKey);
        const blob = {
          version: 1,
          timestamp: Date.now(),
          name: identity.name,
          pubKeyHex: identity.publicKeyHex,
          fingerprint: identity.fingerprint,
          wrappedPrivKey,
          messages: appState.messages || {},
          contacts: appState.contacts || [],
          settings: appState.settings || {},
          chain: appState.chain || [],
          files: appState.files || [],
        };
        return JSON.stringify(blob);
      }

      // Split a blob string into 7 Shamir fragments (threshold: 3)
      // Fragment encoding: first byte = x-coordinate, rest = y-values (self-describing)
      function generateBackupFragments(blobStr) {
        const dataBytes = new TextEncoder().encode(blobStr);
        const shares = ShamirSSS.split(dataBytes, 7, 3);
        const fragments = shares.map((share) => {
          const encoded = [share.x, ...share.y].map(b => b.toString(16).padStart(2,'0')).join('');
          return {
            id: share.x,
            label: `Fragment ${share.x} of 7`,
            data: encoded,
            check: encoded.slice(0, 8),
            distributed: false,
            peerName: '',
          };
        });
        localStorage.setItem('gl_fragment_meta', JSON.stringify(
          fragments.map(f => ({ id: f.id, check: f.check, distributed: f.distributed, peerName: f.peerName }))
        ));
        return fragments;
      }

      // Mark a fragment as distributed to a named peer
      function markFragmentDistributed(fragmentId, peerName) {
        const meta = JSON.parse(localStorage.getItem('gl_fragment_meta') || '[]');
        const frag = meta.find(f => f.id === fragmentId);
        if (frag) { frag.distributed = true; frag.peerName = peerName; }
        localStorage.setItem('gl_fragment_meta', JSON.stringify(meta));
        return meta;
      }

      // Get current distribution status
      function getFragmentStatus() {
        const meta = JSON.parse(localStorage.getItem('gl_fragment_meta') || '[]');
        const distributed = meta.filter(f => f.distributed).length;
        return { total: 7, threshold: 3, distributed, safe: distributed >= 3, fragments: meta };
      }

      // Combine ≥3 fragment hex strings and unwrap identity using master key
      async function combineAndRestore(masterKey, fragmentHexArray) {
        if (fragmentHexArray.length < 3) return { success: false, error: `Need at least 3 fragments, got ${fragmentHexArray.length}` };
        let shares;
        try {
          shares = fragmentHexArray.map(hex => {
            const bytes = hex.trim().match(/.{2}/g).map(b => parseInt(b, 16));
            return { x: bytes[0], y: new Uint8Array(bytes.slice(1)) };
          });
        } catch (e) { return { success: false, error: 'Invalid fragment format' }; }

        let blob;
        try {
          const reconstructed = ShamirSSS.combine(shares);
          blob = JSON.parse(new TextDecoder().decode(reconstructed));
        } catch (e) { return { success: false, error: 'Fragment reconstruction failed — wrong or corrupted fragments' }; }

        let privKey;
        try {
          privKey = await CryptoEngine.unwrapPrivKey(blob.wrappedPrivKey, masterKey);
        } catch (e) { return { success: false, error: 'Key unwrap failed — wrong seed phrase' }; }

        const pubKeyBytes = new Uint8Array(blob.pubKeyHex.match(/.{2}/g).map(b => parseInt(b,16)));
        const pubKey = await crypto.subtle.importKey('raw', pubKeyBytes, { name: 'ECDH', namedCurve: 'P-256' }, true, []);

        const identity = {
          keyPair: { privateKey: privKey, publicKey: pubKey },
          publicKeyHex: blob.pubKeyHex,
          fingerprint: blob.fingerprint,
          name: blob.name,
        };

        // Restore app state to localStorage
        if (blob.messages) localStorage.setItem('gl_messages', JSON.stringify(blob.messages));
        if (blob.settings) localStorage.setItem('gl_settings', JSON.stringify(blob.settings));
        if (blob.chain) localStorage.setItem('gl_chain', JSON.stringify(blob.chain));
        localStorage.setItem('gl_identity', JSON.stringify({
          name: blob.name, pubKeyHex: blob.pubKeyHex, fingerprint: blob.fingerprint, wrappedPrivKey: blob.wrappedPrivKey
        }));

        return { success: true, identity, restored: { messages: !!blob.messages, settings: !!blob.settings, chain: !!blob.chain } };
      }

      // ==================== BRIDGE URL HELPER ====================
      // Reads ?bridge=IP:PORT from the URL to allow LAN devices to specify
      // the bridge host. Falls back to localhost:3002 when absent.
      // Uses wss:// when the page is loaded over HTTPS to avoid mixed-content
      // blocking (browsers refuse plain ws:// from an https:// page).
      // The GMP node's listen port. Configurable via ?gmpPort= so multiple nodes can
      // run on one host (e.g. LAN testing); defaults to 49500. Must agree across the
      // bridge 'start' message (actual listen port), the GHOST invite code (advertised
      // port), and the joiner's dial — so all three call sites read it from here.
      function getGmpPort() {
        const p = parseInt(new URLSearchParams(window.location.search).get('gmpPort'), 10);
        return Number.isInteger(p) && p > 0 && p < 65536 ? p : 49500;
      }

      function getBridgeWsUrl() {
        const isSecurePage = window.location.protocol === 'https:';
        const scheme = isSecurePage ? 'wss' : 'ws';
        const params = new URLSearchParams(window.location.search);
        const bridge = params.get('bridge');   // e.g. 192.168.1.15:3002
        if (bridge) {
          // If user only passed an IP (no port), append default port
          const target = bridge.includes(':') ? bridge : bridge + ':3002';
          return `${scheme}://${target}`;
        }
        const bridgePort = params.get('bridgePort') || '3002';
        return `${scheme}://localhost:${bridgePort}`;
      }

      // When a ?bridge= target is present but the page is served over plain
      // http://, getBridgeWsUrl() can only produce ws:// — which cannot reach a
      // LAN-mode bridge (it runs wss://), and on a LAN IP the app also loses
      // WebCrypto. Both are fixed only by serving this page over HTTPS. Returns
      // the HTTPS URL to reopen at (preserving ?bridge=), or null when fine.
      function getBridgeInsecureHttpsUrl() {
        try {
          const loc = window.location;
          const params = new URLSearchParams(loc.search);
          if (!params.get('bridge')) return null;
          if (loc.protocol === 'https:') return null;
          return `https://${loc.host}${loc.pathname}${loc.search}`;
        } catch (e) { return null; }
      }

      // ICE server list for every RTCPeerConnection: always the public STUN
      // servers, plus any user-configured TURN servers (Settings → TURN) when
      // the TURN fallback toggle is enabled. TURN relays are what let a
      // connection succeed through symmetric/strict NAT (mobile carriers) or on
      // networks where mDNS host candidates don't resolve between peers — the
      // usual cause of "Could not establish a direct connection". Reads the same
      // localStorage keys the settings UI writes, so this works from both the
      // React component and the top-level ManualSignaling helper.
      function getIceServers() {
        const servers = [
          { urls: 'stun:stun.l.google.com:19302' },
          { urls: 'stun:stun1.l.google.com:19302' },
          { urls: 'stun:stun2.l.google.com:19302' }
        ];
        try {
          if (localStorage.getItem('gl_turn_fallback') === 'true') {
            const turn = JSON.parse(localStorage.getItem('gl_turn_servers') || '[]');
            for (const s of (Array.isArray(turn) ? turn : [])) {
              if (s && typeof s.url === 'string' && s.url.trim()) {
                const entry = { urls: s.url.trim() };
                if (s.username) entry.username = s.username;
                if (s.credential) entry.credential = s.credential;
                servers.push(entry);
              }
            }
          }
        } catch (e) { /* malformed config — fall back to STUN-only */ }
        return servers;
      }

      // Helper to discover the local LAN IP address of this device using WebRTC
      async function getLocalIPAddress() {
        return new Promise((resolve) => {
          try {
            const pc = new RTCPeerConnection({ iceServers: [] });
            pc.createDataChannel('');
            pc.createOffer().then(offer => pc.setLocalDescription(offer));
            
            let resolved = false;
            pc.onicecandidate = (ice) => {
              if (resolved) return;
              if (ice && ice.candidate && ice.candidate.candidate) {
                const parts = ice.candidate.candidate.split(' ');
                const ip = parts[4];
                if (ip && ip.match(/^(192\.168\.|10\.|172\.(1[6-9]|2[0-9]|3[0-1])\.)/)) {
                  resolved = true;
                  pc.close();
                  resolve(ip);
                }
              }
            };
            setTimeout(() => {
              if (!resolved) {
                pc.close();
                // fallback to location.hostname if WebRTC IP gathering fails or times out
                if (window.location.hostname && window.location.hostname !== 'localhost' && window.location.hostname !== '127.0.0.1') {
                  resolve(window.location.hostname);
                } else {
                  resolve('127.0.0.1');
                }
              }
            }, 800);
          } catch (e) {
            resolve(window.location.hostname || '127.0.0.1');
          }
        });
      }

      // ==================== GMP BRIDGE CONNECTOR ====================
      class GMPBridgeConnector {
        constructor(identity) {
          this._listeners = {};
          this.identity = identity;
          this.ws = null;
          this.wsOpen = false;
          this.knownPeers = {};
          this.meshConns = {}; // mock for index.html compatibility
          this.states = {};
        }

        on(event, fn) {
          (this._listeners[event] = this._listeners[event] || []).push(fn);
          return this;
        }

        off(event, fn) {
          if (!this._listeners[event]) return this;
          this._listeners[event] = this._listeners[event].filter(f => f !== fn);
          return this;
        }

        emit(event, ...args) {
          if (!this._listeners[event]) return;
          this._listeners[event].forEach(fn => { try { fn(...args); } catch (e) { console.error(e); } });
        }

        async connect() {
          return new Promise((resolve, reject) => {
            try {
              const gmpPort = getGmpPort();

              this.ws = new WebSocket(getBridgeWsUrl());
              this.ws.onopen = () => {
                this.wsOpen = true;
                const seedStr = window.seedPhrase ? window.seedPhrase.join(" ") : "";
                this.ws.send(JSON.stringify({
                  type: 'start',
                  seedPhrase: seedStr,
                  port: gmpPort
                }));
                resolve();
              };

              this.ws.onmessage = (evt) => {
                let msg;
                try {
                  msg = JSON.parse(evt.data);
                } catch (e) {
                  return;
                }

                if (msg.type === 'started') {
                  this.emit('signaling-connected');
                  if (window.setConnectionMode) window.setConnectionMode('Ghost Mesh Active');
                  if (window.setSignalingConnected) window.setSignalingConnected(true);
                  if (window.setSignalingAvailable) window.setSignalingAvailable(true);
                } else if (msg.type === 'peer-connected') {
                  this.states[msg.nodeId] = 'connected';
                  this.meshConns[msg.nodeId] = { connId: msg.nodeId }; // mock
                  this.emit('peer-connected', msg.nodeId, { mode: 'Ghost Mesh' });
                } else if (msg.type === 'peer-disconnected') {
                  this.states[msg.nodeId] = 'disconnected';
                  delete this.meshConns[msg.nodeId];
                  this.emit('peer-disconnected', msg.nodeId);
                } else if (msg.type === 'message') {
                  try {
                    const parsed = JSON.parse(msg.payload);
                    if (parsed.type === 'file-meta' || parsed.type === 'file-chunk' || parsed.type === 'file-done' || parsed.type === 'file-ack') {
                      this.emit('file-chunk', msg.fromNodeId, parsed);
                    } else {
                      this.emit('message', msg.fromNodeId, parsed);
                    }
                  } catch (e) {
                    this.emit('message', msg.fromNodeId, msg.payload);
                  }
                }
              };

              this.ws.onclose = () => {
                this.wsOpen = false;
                this.emit('signaling-disconnected');
                if (window.setConnectionMode) window.setConnectionMode('Offline');
                if (window.setSignalingConnected) window.setSignalingConnected(false);
              };

              this.ws.onerror = (err) => {
                const bridgeUrl = getBridgeWsUrl();
                if (bridgeUrl.startsWith('wss://')) {
                  const httpsUrl = bridgeUrl.replace('wss://', 'https://');
                  console.warn(
                    `[GMP Bridge] WSS connection failed. If using a self-signed certificate, ` +
                    `open ${httpsUrl} in a new tab first and accept the certificate, then reload this page.`
                  );
                }
                this.emit('signaling-error', err);
                reject(err);
              };
            } catch (e) {
              reject(e);
            }
          });
        }

        sendMessage(peerId, dataObj) {
          if (!this.wsOpen) return false;
          const payload = typeof dataObj === 'string' ? dataObj : JSON.stringify(dataObj);
          this.ws.send(JSON.stringify({
            type: 'send',
            destinationNodeId: peerId,
            payload
          }));
          return true;
        }

        sendOnChannel(peerId, channelName, dataObj) {
          if (!this.wsOpen) return false;
          const payload = typeof dataObj === 'string' ? dataObj : JSON.stringify(dataObj);
          if (channelName === 'presence') {
            this.ws.send(JSON.stringify({
              type: 'sendDirect',
              destinationNodeId: peerId,
              payload
            }));
          } else {
            this.ws.send(JSON.stringify({
              type: 'send',
              destinationNodeId: peerId,
              payload
            }));
          }
          return true;
        }

        sendPresence(peerId, dataObj) {
          return this.sendOnChannel(peerId, 'presence', dataObj);
        }

        isConnected(peerId) {
          return this.states[peerId] === 'connected';
        }

        disconnect() {
          if (this.ws) {
            this.ws.close();
            this.ws = null;
          }
          this.wsOpen = false;
        }

        joinRoom(code) {
          console.log('[GMP Bridge Connector] joinRoom called with:', code);
          const clean = code.replace(/^(GHOST-|GL-)/i, '');
          const parts = clean.split('-');
          if (parts.length >= 2) {
            const port = parseInt(parts[parts.length - 1]);
            const ipParts = parts.slice(0, parts.length - 1);
            const address = ipParts.join('.');
            if (address && !isNaN(port)) {
              console.log(`[GMP Bridge Connector] Dialing GMP peer at ${address}:${port}`);
              if (this.wsOpen) {
                this.ws.send(JSON.stringify({
                  type: 'connect',
                  address,
                  port
                }));
              }
              return;
            }
          }
          console.warn('[GMP Bridge Connector] Invalid GMP connection code format:', code);
        }

        async createManualOffer() {
          return { offerBase64: '' };
        }
        async processManualOffer(offerBase64) {
          return { answerBase64: '', peerInfo: {} };
        }
        async processManualAnswer(answerBase64) {
          return true;
        }
      }

                if (!inviteWordsInput.trim()) {
                  addToast('This secure invite requires your 12-word recovery phrase to decrypt the workspace key.', 'info');
                  return;
                }
                const words = inviteWordsInput.trim().split(/\s+/);
                if (words.length !== 12) {
                  addToast('Please enter exactly 12 words.', 'error');
                  return;
                }
                const masterKey = await CryptoEngine.deriveKeyFromSeed(words);
                const saved = localStorage.getItem("gl_identity");
                if (!saved) throw new Error("No identity saved locally.");
                const d = JSON.parse(saved);
                const wk = d.wrappedPrivKey || d.wrappedKey;
                privateKey = await CryptoEngine.unwrapPrivKey(wk, masterKey);
              }
            }
            
            const res = await ns.workspaceManager.acceptInvite(inviteObj, identity.fingerprint, privateKey);
            if (res.success) {
              setWorkspaces(ns.workspaceManager.getWorkspaces());
              setActiveConvo(res.workspace.id);
              setShowWorkspaceJoin(false);
              setWorkspaceJoinInvite('');
              setInviteWordsInput('');
              addToast(`Joined workspace ${res.workspace.name}`, 'success');
              
              // Broadcast to remaining online members that we joined
              res.workspace.members.forEach(member => {
                if (member.id !== identity.fingerprint) {
                  const conn = p2pConnectorRef.current;
                  if (conn && (conn.isConnected(member.id) || connectionStates[member.id] === 'connected')) {
                    conn.sendMessage(member.id, {
                      type: 'workspace-sync',
                      workspaceId: res.workspace.id,
                      action: 'new-member',
                      member: { id: identity.fingerprint, role: 'member', joinedAt: Date.now() }
                    });
                  }
                }
              });
            } else {
              addToast(res.error || 'Failed to join workspace', 'error');
            }
          } catch (err) {
            console.error(err);
            addToast('Failed to parse or decrypt invite: ' + err.message, 'error');
          }
        };

        const handleKickMember = async (memberId) => {
          const ns = window.GLLicenseRuntime;
          if (!ns || !ns.workspaceManager || !activeWorkspace) return;
          
          if (confirm(`Are you sure you want to remove member ${memberId.slice(0, 8)}? This will rotate the workspace encryption key for forward secrecy.`)) {
            const res = await ns.workspaceManager.removeMember(activeWorkspace.id, memberId);
            if (res.success) {
              setWorkspaces(ns.workspaceManager.getWorkspaces());
              addToast('Member removed and key rotated successfully', 'success');
              
              // Notify remaining online members of removal and key rotation
              activeWorkspace.members.forEach(member => {
                if (member.id !== identity.fingerprint && member.id !== memberId) {
                  const conn = p2pConnectorRef.current;
                  if (conn && conn.isConnected(member.id)) {
                    conn.sendMessage(member.id, {
                      type: 'workspace-sync',
                      workspaceId: activeWorkspace.id,
                      action: 'remove-member',
                      targetId: memberId,
                      members: activeWorkspace.members,
                      newKey: res.newWorkspaceKey
                    });
                  }
                }
              });
              
              // Notify the kicked member itself so they auto-delete the workspace
              const conn = p2pConnectorRef.current;
              if (conn && conn.isConnected(memberId)) {
                conn.sendMessage(memberId, {
                  type: 'workspace-sync',
                  workspaceId: activeWorkspace.id,
                  action: 'remove-member',
                  targetId: memberId
                });
              }
            } else {
              addToast(res.error || 'Failed to remove member', 'error');
            }
          }
        };

        const handleGenerateWorkspaceInvite = async () => {
          const ns = window.GLLicenseRuntime;
          if (!ns || !ns.workspaceManager || !activeWorkspace) return;
          
          let pubKeyHex = null;
          if (showWorkspaceInviteGen === 'secure') {
            if (!workspaceInviteRecipientPub.trim() || workspaceInviteRecipientPub.trim().length < 20) {
              addToast('Please enter a valid recipient public key', 'error');
              return;
            }
            pubKeyHex = workspaceInviteRecipientPub.trim();
          }
          
          const res = await ns.workspaceManager.createInvite(activeWorkspace.id, identity.fingerprint, identity.name, pubKeyHex);
          if (res.success) {
            const inviteStr = 'GLWS-' + CryptoEngine._base64Encode(JSON.stringify(res.invite));
            setWorkspaceInviteCode(inviteStr);
            addToast('Invite generated successfully', 'success');
          } else {
            addToast(res.error || 'Failed to generate invite', 'error');
          }
        };

        useEffect(() => {
          if (callActive) {
            timerRef.current = setInterval(() => setCallTimer(t => t + 1), 1000);
            return () => clearInterval(timerRef.current);
          } else { setCallTimer(0); }
        }, [callActive]);

        useEffect(() => {
          const onResize = () => {
            const w = window.innerWidth;
            setIsMobile(w < 768);
            setIsTablet(w >= 768 && w < 1024);
          };
          window.addEventListener("resize", onResize);
          return () => window.removeEventListener("resize", onResize);
        }, []);

        // Probe a signaling server by hitting its /health endpoint
        const probeSignaling = async (wsUrl) => {
          try {
            const httpUrl = wsUrl.replace('ws://', 'http://').replace('wss://', 'https://');
            const controller = new AbortController();
            const timer = setTimeout(() => controller.abort(), 2000);
            const resp = await fetch(httpUrl + '/health', { signal: controller.signal });
            clearTimeout(timer);
            const data = await resp.json();
            const ok = data.status === 'ok';
            if (ok) setSignalingAvailable(true);
            return ok;
          } catch { return false; }
        };

        // Initialize P2P systems when identity is ready
        useEffect(() => {
          if (!identity || p2pConnectorRef.current) return;

          // Discover signaling server (async, caches result)
          let _cachedSignalingUrl = null;
          const discoverSignaling = async () => {
            if (_cachedSignalingUrl) return _cachedSignalingUrl;
            // 1. Explicit override
            if (window.GHOSTLINK_SIGNAL_URL) { _cachedSignalingUrl = window.GHOSTLINK_SIGNAL_URL; return _cachedSignalingUrl; }
            // 2. Electron preload provides it
            if (window.ghostlink?.signalingUrl) { _cachedSignalingUrl = window.ghostlink.signalingUrl; return _cachedSignalingUrl; }
            // Match the page's security: an https:// page can only reach a wss://
            // relay (browsers block ws:// / http:// to a LAN IP as mixed content).
            const wsScheme = window.location.protocol === 'https:' ? 'wss://' : 'ws://';
            // 3. If served by the signaling server, use same host
            if (window.location.protocol !== 'file:' && window.location.hostname) {
              const sameHost = `${wsScheme}${window.location.hostname}:${window.location.port || 3001}`;
              if (await probeSignaling(sameHost)) { _cachedSignalingUrl = sameHost; localStorage.setItem('gl_signaling_url', sameHost); return sameHost; }
              // Try port 3001 explicitly if served on different port
              if (window.location.port !== '3001') {
                const port3001 = `${wsScheme}${window.location.hostname}:3001`;
                if (await probeSignaling(port3001)) { _cachedSignalingUrl = port3001; localStorage.setItem('gl_signaling_url', port3001); return port3001; }
              }
            }
            // 4. Try localhost (Electron or standalone server on same machine)
            const localhost = 'ws://localhost:3001';
            if (await probeSignaling(localhost)) { _cachedSignalingUrl = localhost; localStorage.setItem('gl_signaling_url', localhost); return localhost; }
            // 5. Check saved server URL
            const saved = localStorage.getItem('gl_signaling_url');
            if (saved && await probeSignaling(saved)) { _cachedSignalingUrl = saved; return saved; }
            // 6. No server found
            setSignalingAvailable(false);
            _cachedSignalingUrl = localhost;
            return localhost;
          };

          // Initialize Signal Protocol session manager
          const initSignalProtocol = async () => {
            if (typeof GhostLinkSignal !== 'undefined') {
              const sm = new GhostLinkSignal.SessionManager();
              try {
                const preKeyBundle = await sm.init(20);
                console.log('[GhostLink] Signal Protocol initialized, pre-key bundle ready');
                setSessionManager(sm);
                const gk = new GhostLinkSignal.GroupKeyAgreement(sm);
                setGroupKeyManager(gk);
              } catch (e) {
                console.warn('[GhostLink] Signal Protocol init failed, falling back to AES encryption:', e);
                // Still set the session manager (un-initialized) so the app knows it exists
                // but encryption will fall back to base CryptoEngine AES
                setSessionManager(null);
                setGroupKeyManager(null);
                addToast('Signal Protocol unavailable — using AES-256 encryption', 'info');
              }
            }
          };

          const setupEvents = async (conn) => {

            // signaling events (now bridge events)
            conn.on('signaling-connected', () => {
              setSignalingConnected(true);
              setSignalingAvailable(true);
              if (conn && conn.constructor.name === 'GMPBridgeConnector') {
                addToast('Connected to Ghost Mesh bridge', 'success');
              }
            });
            conn.on('signaling-disconnected', () => {
              setSignalingConnected(false);
              if (conn && conn.constructor.name === 'GMPBridgeConnector') {
                addToast('Ghost Mesh disconnected', 'error');
              }
            });
            conn.on('signaling-error', (err) => {
              console.warn('Bridge/Signaling error:', err);
              setSignalingAvailable(false);
            });

            // peer events
            const peerColor = (id) => {
              const colors = ['#1a3a2a','#2a1a3a','#1a2a3a','#3a2a1a','#2a3a1a','#1a3a3a','#3a1a2a','#2a2a3a'];
              let hash = 0;
              for (let i = 0; i < (id || '').length; i++) hash = ((hash << 5) - hash) + id.charCodeAt(i);
              return colors[Math.abs(hash) % colors.length];
            };

conn.on('peer-connected', async (peerId, peerInfo) => {
              // Block if free plan limit reached (max 5 peers)
              const runtime = window.GLLicenseRuntime;
              if (runtime && runtime.featureGate) {
                const limits = await runtime.featureGate.getLimits();
                const activeCount = peersRef.current.filter(p => p.status === 'online').length;
                if (activeCount >= limits.maxPeers) {
                  conn.removePeer(peerId);
                  await runtime.featureGate.triggerUpgradeFlow('peers');
                  addToast(`Connection blocked: Free plan is limited to ${limits.maxPeers} active peers.`, 'error');
                  return;
                }
              }

              setConnectionStates(prev => ({ ...prev, [peerId]: 'connected' }));
              setConnectionMode(peerInfo && peerInfo.mode ? (peerInfo.mode === 'manual' ? 'Manual Signal' : 'P2P Direct') : 'P2P Direct');
              setPeers(prev => {
                const existing = prev.find(p => p.fingerprint === peerId || p.id === peerId);
                if (existing) {
                  return prev.map(p =>
                    (p.fingerprint === peerId || p.id === peerId)
                      ? { ...p, status: 'online', lastSeen: 'now', name: peerInfo?.name || p.name }
                      : p
                  );
                }
                const name = peerInfo?.name || `Peer-${peerId.slice(0, 6)}`;
                return [...prev, {
                  id: peerId, name, status: 'online',
                  pubKey: peerInfo?.publicKey || '', lastSeen: 'now',
                  avatar: name.split(' ').map(w => w[0]).join('').slice(0, 2).toUpperCase() || 'P',
                  color: peerColor(peerId),
                  unread: 0, fingerprint: peerId, isReal: true
                }];
              });
              PeerCache.addPeer(peerId, { fingerprint: peerId, name: peerInfo?.name || '', publicKeyHex: peerInfo?.publicKey || '' });
              setAutoReconnectStatus('connected');
              addToast(`${peerInfo?.name || 'Peer'} connected`, 'success');

              // FLUSH OFFLINE QUEUES
              if (offlineQueue) {
                const dc = conn.dcs?.[peerId]?.messages;
                if (dc) await offlineQueue.flushQueue(peerId, dc);
              }

              // TRIGGER PENDING FILE TRANSFERS
              setPendingFileTransfers(prev => {
                const pending = prev[peerId] || [];
                if (pending.length > 0) {
                  addToast(`Initiating ${pending.length} pending file transfers...`, 'info');
                  pending.forEach(f => sendFile(f.name, f.size, f.fileObj, peerId));
                }
                return { ...prev, [peerId]: [] };
              });
            });

            conn.on('peer-joined', (peerId, peerInfo) => {
              // When a peer joins the signaling room, we auto-initiate WebRTC connection to them
              addToast(`${peerInfo?.name || 'Peer'} joined room — connecting...`, 'info');
            });

            conn.on('peer-disconnected', (peerId, info) => {
              const peerIdStr = typeof peerId === 'string' ? peerId : (info && typeof info === 'string' ? info : String(peerId));
              setConnectionStates(prev => ({ ...prev, [peerIdStr]: 'disconnected' }));
              setPeers(prev => prev.map(p =>
                (p.fingerprint === peerIdStr || p.id === peerIdStr)
                  ? { ...p, status: 'offline', lastSeen: new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' }) }
                  : p
              ));
            });

            // Unified message handler for chat, voice, file metadata
            conn.on('message', async (peerId, msg) => {
              if (peerId === identity?.fingerprint || msg?.fromNodeId === identity?.fingerprint || msg?.from === identity?.fingerprint || msg?.senderId === identity?.fingerprint) {
                return;
              }
              try {
                const getConvoKey = (pid) => {
                  const p = peersRef.current.find(x => x.fingerprint === pid || x.id === pid);
                  return p ? p.id : pid;
                };

                if (msg.type === 'voice') {
                  const convoKey = getConvoKey(peerId);
                  let url = msg.url || '';
                  if (!url && msg.audioData) {
                    try {
                      const binaryString = atob(msg.audioData);
                      const bytes = new Uint8Array(binaryString.length);
                      for (let i = 0; i < binaryString.length; i++) bytes[i] = binaryString.charCodeAt(i);
                      url = URL.createObjectURL(new Blob([bytes], { type: msg.mimeType || 'audio/webm' }));
                    } catch (e) { console.error('Voice decode failed:', e); return; }
                  }
                  if (!url) return;
                  setVoiceMessages(prev => ({
                    ...prev,
                    [convoKey]: [...(prev[convoKey] || []), {
                      id: 'voice-' + Date.now() + '-in',
                      url, duration: msg.duration || 0,
                      waveform: msg.waveform || [],
                      ts: msg.ts || Date.now(),
                      sender: msg.sender || 'Peer'
                    }]
                  }));
                  setPeers(prev => prev.map(p =>
                    (p.fingerprint === peerId || p.id === peerId) && getConvoKey(peerId) !== activeConvoRef.current
                      ? { ...p, unread: (p.unread || 0) + 1 } : p
                  ));
                  addToast('Voice message received', 'info');
                  return;
                }

                if (msg.type === 'chat' || msg.type === 'queued-message') {
                  const convoKey = getConvoKey(peerId);
                  const convoMsgs = messages[convoKey] || [];
                  if (msg.blockHash && convoMsgs.some(m => m.hash === msg.blockHash)) {
                    return; // discard duplicate silently
                  }

                  const msgType = msg.msgType || 'text';
                  const content = msg.content;
                  const block = await chain.add(msg.sender || 'Peer', content, msgType, msg.meta || {});
                  if (msg.blockHash) {
                    block.hash = msg.blockHash;
                    block.isReceived = true;
                  }
                  block.encrypted = msg.encrypted || (await CryptoEngine.encrypt(content, identity.fingerprint));
                  
                  const isDuplicate = (msgs, newBlock) =>
                    msgs.some(m => m.hash === newBlock.hash);

                  setMessages(prev => {
                    const convo = prev[convoKey] || [];
                    if (isDuplicate(convo, block)) return prev;
                    return { ...prev, [convoKey]: [...convo, block] };
                  });
                  setPeers(prev => prev.map(p =>
                    (p.fingerprint === peerId || p.id === peerId) && convoKey !== activeConvoRef.current
                      ? { ...p, unread: (p.unread || 0) + 1 } : p
                  ));
                  if (msg.type === 'queued-message') addToast('Offline message delivered', 'info');
                  return;
                }

                if (msg.type === 'typing') {
                  setTyping(true);
                  setTimeout(() => setTyping(false), 3000);
                } else if (msg.type === 'reaction') {
                  setMessageReactions(prev => {
                    const existing = prev[msg.messageHash] || {};
                    const reactors = existing[msg.emoji] || [];
                    if (!reactors.includes(peerId)) {
                      return { ...prev, [msg.messageHash]: { ...existing, [msg.emoji]: [...reactors, peerId] } };
                    }
                    return prev;
                  });
                } else if (msg.type === 'call-offer') {
                  if (callActive && callConnectionRef.current && callConnectionRef.current.__peerId === msg.from) {
                    // This is a renegotiation offer (e.g., adding screen share track)
                    const pc = callConnectionRef.current;
                    pc.setRemoteDescription(new RTCSessionDescription({ type: 'offer', sdp: msg.sdp }))
                      .then(() => pc.createAnswer())
                      .then(answer => pc.setLocalDescription(answer))
                      .then(() => {
                        const conn = p2pConnectorRef.current;
                        if (conn && conn.isConnected(msg.from)) {
                          conn.sendMessage(msg.from, {
                            type: 'call-answer',
                            sdp: pc.localDescription.sdp,
                            from: identity.fingerprint,
                            name: identity.name
                          });
                        }
                      })
                      .catch(e => console.error('Renegotiation error:', e));

                    if (msg.callType) {
                      setCallType(msg.callType);
                    }
                  } else {
                    // Incoming call — show incoming call UI
                    pendingCallOfferRef.current = { sdp: msg.sdp, callType: msg.callType || 'voice', from: msg.from, fromName: msg.name };
                    setIncomingCall({ peerId: msg.from, callType: msg.callType || 'voice' });
                    setCallType(msg.callType || 'voice');
                    addToast(`Incoming ${msg.callType || 'voice'} call from ${msg.name || msg.from}`, 'info');
                  }
                } else if (msg.type === 'call-answer') {
                  // Answer to our call offer
                  const pc = callConnectionRef.current;
                  if (pc && pc.signalingState !== 'stable') {
                    pc.setRemoteDescription({ type: 'answer', sdp: msg.sdp }).catch(e => console.error('call answer error:', e));
                  }
                } else if (msg.type === 'call-ice') {
                  const pc = callConnectionRef.current;
                  if (pc && msg.candidate) {
                    // msg.candidate is a deserialized plain object - wrap it in RTCIceCandidate
                    try {
                      const cand = new RTCIceCandidate(msg.candidate);
                      pc.addIceCandidate(cand).catch(e => console.error('call ICE error:', e));
                    } catch (e) {
                      console.error('call ICE error (bad candidate):', e);
                    }
                  }
                } else if (msg.type === 'call-end') {
                  // Peer ended the call
                  if (callConnectionRef.current) { try { callConnectionRef.current.close(); } catch {} callConnectionRef.current = null; }
                  if (callLocalStreamRef.current) { callLocalStreamRef.current.getTracks().forEach(t => t.stop()); callLocalStreamRef.current = null; }
                  setCallActive(false);
                  setCallType(null);
                  setLocalStream(null);
                  setRemoteStreams({});
                  setCallTimer(0);
                  clearInterval(timerRef.current);
                  addToast('Call ended by peer', 'info');
                } else if (msg.type === 'workspace-chat') {
                  const wsId = msg.workspaceId;
                  const ns = window.GLLicenseRuntime;
                  if (ns && ns.workspaceManager) {
                    const ws = ns.workspaceManager.getWorkspace(wsId);
                    if (ws) {
                      const newMsg = {
                        sender: msg.sender,
                        senderId: msg.senderId,
                        encrypted: msg.encrypted,
                        type: msg.msgType || 'text',
                        meta: msg.meta || {},
                        ts: Date.now()
                      };
                      await ns.workspaceManager.addToChain(wsId, newMsg);
                      setWorkspaces(ns.workspaceManager.getWorkspaces());
                      if (activeConvoRef.current !== wsId) {
                        setWorkspaces(prev => prev.map(w => w.id === wsId ? { ...w, unread: (w.unread || 0) + 1 } : w));
                        addToast(`New message in workspace ${ws.name}`, 'info');
                      }
                    }
                  }
                } else if (msg.type === 'workspace-sync') {
                  const wsId = msg.workspaceId;
                  const ns = window.GLLicenseRuntime;
                  if (ns && ns.workspaceManager) {
                    const ws = ns.workspaceManager.getWorkspace(wsId);
                    if (ws) {
                      if (msg.action === 'remove-member') {
                        if (msg.targetId === identity.fingerprint) {
                          ns.workspaceManager.deleteWorkspace(wsId);
                          setWorkspaces(ns.workspaceManager.getWorkspaces());
                          if (activeConvoRef.current === wsId) setActiveConvo(null);
                          addToast(`You have been removed from workspace ${ws.name}`, 'warning');
                        } else {
                          ws.members = msg.members;
                          if (msg.newKey) ws.workspaceKey = msg.newKey;
                          ws.updatedAt = Date.now();
                          await ns.workspaceManager._saveWorkspaces();
                          setWorkspaces(ns.workspaceManager.getWorkspaces());
                          addToast(`Workspace ${ws.name} members roster rotated`, 'info');
                        }
                      } else if (msg.action === 'new-member') {
                        if (!ws.members.some(m => m.id === msg.member.id)) {
                          ws.members.push(msg.member);
                          ws.updatedAt = Date.now();
                          await ns.workspaceManager._saveWorkspaces();
                          setWorkspaces(ns.workspaceManager.getWorkspaces());
                          addToast(`New member joined workspace ${ws.name}`, 'info');
                        }
                      }
                    }
                  }
                }
              } catch (e) { console.error('Message parse error:', e); }
            });

            // Connect
            try {
              await conn.connect();

              // Initialize production managers (PHASE 1)
              if (window.GhostLink && window.GhostLink.globalBus) {
                const GLBus = window.GhostLink.globalBus;

                // Wire GhostLinkDebug
                if (window.GhostLinkDebug) {
                  window.GhostLinkDebug.setConnectionManager(conn);
                  window.GhostLinkDebug.setSignalManager(conn._ws ? {
                    isConnected: () => conn.ws && conn.ws.readyState === WebSocket.OPEN,
                    _wsUrl: conn.wsUrl,
                    peers: () => Object.keys(conn.knownPeers || {}),
                    _myRoom: conn.roomId,
                  } : null);
                }

                // Wire bus events for debug timeline
                GLBus.on('pm:peer-connected', ({ peerId }) => {
                  setConnectionMode('P2P Direct');
                });
                GLBus.on('pm:signaling-ready', () => {
                  setSignalingConnected(true);
                  setSignalingAvailable(true);
                });

                // Production relay mode detection
                GLBus.on('conn:peer-degraded', ({ peerId }) => {
                  setConnectionMode('Via Relay');
                });
                GLBus.on('conn:ice-failed', ({ peerId }) => {
                  setConnectionMode('Reconnecting');
                });
              }

              // Initialize encrypted file transfer over WebRTC files channel
              if (typeof FileTransfer !== 'undefined' || (typeof GhostLinkP2P !== 'undefined' && GhostLinkP2P.FileTransfer)) {
                const FT = FileTransfer || GhostLinkP2P.FileTransfer;
                const ft = new FT(conn, CryptoEngine);
                ft.on('complete', ({ peerId, file }) => {
                  const peerName = peersRef.current.find(p => p.fingerprint === peerId || p.id === peerId)?.name || 'Peer';
                  setTransferredFiles(prev => [...prev, {
                    name: file.name,
                    size: file.size,
                    from: peerName,
                    ts: Date.now(),
                    url: file.url,
                    mimeType: file.type,
                    encrypted: true,
                    peerId,
                  }]);
                  addToast(`File received: ${file.name}`, 'success');
                });
                ft.on('error', ({ error }) => {
                  console.error('[FileTransfer]', error);
                  addToast('File receive failed: ' + error, 'error');
                });
                setFileTransferManager(ft);
              }

              // Restore cached peers as offline initially
              const cached = PeerCache.getAllPeers();
              const cachedIds = Object.keys(cached);
              const meshPeersCache = loadPersisted('gl_mesh_peers', {});
              if (cachedIds.length > 0) {
                setAutoReconnectStatus('trying-relay');
                for (const pid of cachedIds) {
                  const c = cached[pid];
                  setPeers(prev => {
                    if (prev.find(p => p.fingerprint === pid || p.id === pid)) return prev;
                    return [...prev, {
                      id: pid, name: c.name || `Peer-${pid.slice(0,6)}`, status: 'offline',
                      pubKey: c.publicKeyHex || '', lastSeen: 'cached',
                      avatar: (c.name || 'P').split(' ').map(w=>w[0]).join('').slice(0,2).toUpperCase(),
                      color: '#1a3a2a', unread: 0, fingerprint: pid, isReal: true, isCached: true
                    }];
                  });
                  // Auto-dial Yggdrasil peers on start in Electron
                  if (localStorage.getItem('gl_yggdrasil_enabled') === 'true' && window.ghostlink?.isElectron) {
                    const mp = meshPeersCache[pid];
                    if (mp && mp.yggdrasilAddress) {
                      console.log(`[GhostMesh] Auto-dialing cached mesh peer ${pid} at ${mp.yggdrasilAddress}`);
                      conn.connectToMeshPeer(pid, mp.yggdrasilAddress).catch(err => {
                        console.warn('[GhostMesh] Auto-dial failed:', err.message);
                      });
                    }
                  }
                }
              }
            } catch (e) {
              console.warn('[GhostLink] Signaling connect failed (will auto-reconnect):', e.message);
              setSignalingAvailable(false);
              const cached = PeerCache.getAllPeers();
              const meshPeersCache = loadPersisted('gl_mesh_peers', {});
              for (const pid of Object.keys(cached)) {
                const c = cached[pid];
                setPeers(prev => {
                  if (prev.find(p => p.fingerprint === pid || p.id === pid)) return prev;
                  return [...prev, {
                    id: pid, name: c.name || `Peer-${pid.slice(0,6)}`, status: 'offline',
                    pubKey: c.publicKeyHex || '', lastSeen: 'cached',
                    avatar: (c.name || 'P').split(' ').map(w=>w[0]).join('').slice(0,2).toUpperCase(),

                  }];
                });
                // Auto-dial Yggdrasil peers on start in Electron even if signaling is down
                if (localStorage.getItem('gl_yggdrasil_enabled') === 'true' && window.ghostlink?.isElectron) {
                  const mp = meshPeersCache[pid];

                      console.warn('[GhostMesh] Auto-dial failed:', err.message);
                    });
                  }
                }
              }
              setTimeout(() => setAutoReconnectStatus('waiting'), 5000);
            }
            return;
          };

          // Initialize P2P peer manager (supports GMP bridge and WebRTC fallback)
          const initP2P = async () => {
            if (typeof GhostLinkP2P === 'undefined' || !GhostLinkP2P.P2PConnector) {

            }

            const gmpMode = localStorage.getItem('gl_gmp_mode');
            if (gmpMode === 'degraded') {
              console.log('[GMP] Degraded mode active, starting WebRTC');
              const conn = new GhostLinkP2P.P2PConnector(identity);
              
              // Disable signaling server websocket connection
              conn.connect = async () => {
                console.log('[P2PConnector] Serverless mode: WebRTC manual signaling only.');
                setSignalingConnected(false);
                setSignalingAvailable(false);
              };

              setPeerManager(conn);
              setConnectionMode('WebRTC Mode');

                  new Promise((_, reject) => setTimeout(() => reject(new Error('Timeout')), 2000))

                p2pConnectorRef.current = bridgeConn;
                setPeerManager(bridgeConn);
                setConnectionMode('Ghost Mesh Active');
                setupEvents(bridgeConn);

                  setSignalingAvailable(false);

                    const msg = JSON.parse(decrypted);

          initQR();

        }, [identity]);

        // Initialize Notification, Alert, and Markdown managers when identity is ready
        useEffect(() => {

        // ==================== ACTIONS ====================
        const initSetup = async () => {

        const attemptGmpSetup = async (seed) => {
          setGmpSetupStatus("connecting");

        const getConvoMsgs = () => {

        const sendMessage = async (content, type = "text", meta = {}) => {
          if (sending) return;
          if (!content?.trim() && type === "text") return;
          setSending(true);
          try {
          if (replyTo) meta.replyTo = { index: replyTo.index, sender: replyTo.sender, preview: replyTo.content?.slice(0, 60) };
          if (selfDestruct > 0) meta.selfDestruct = selfDestruct;
          
          if (isWorkspace) {
            const ns = window.GLLicenseRuntime;
            if (!ns || !ns.workspaceManager || !activeWorkspace) return;
            const enc = await CryptoEngine.encrypt(content.trim(), activeWorkspace.workspaceKey);
            const block = {
              sender: identity.name,
              senderId: identity.fingerprint,
              encrypted: enc,
              type: type,
              meta: meta,
              ts: Date.now()
            };
            await ns.workspaceManager.addToChain(activeWorkspace.id, block);
            setWorkspaces(ns.workspaceManager.getWorkspaces());
            setMsgInput("");
            setReplyTo(null);
            
            // Broadcast to other workspace members
            const conn = p2pConnectorRef.current;
            activeWorkspace.members.forEach(member => {
              if (member.id !== identity.fingerprint) {
                if (conn && (conn.isConnected(member.id) || connectionStates[member.id] === 'connected')) {
                  try {
                    conn.sendMessage(member.id, {
                      type: 'workspace-chat',
                      workspaceId: activeWorkspace.id,
                      sender: identity.name,
                      senderId: identity.fingerprint,
                      encrypted: enc,
                      msgType: type,
                      meta: meta
                    });

                    console.error('Failed to send workspace message to peer:', member.id, e);
                  }
                }
              }
            });
            return;
          }

          const block = await chain.add(identity.name, content.trim(), type, meta);
          block.encrypted = await CryptoEngine.encrypt(content.trim(), identity.fingerprint);
          setMessages(prev => ({ ...prev, [activeConvo]: [...(prev[activeConvo] || []), block] }));
          setMsgInput("");
          setReplyTo(null);
          setChainValid(await chain.verify());

          if (meta.selfDestruct) {
            setTimeout(() => {
              setMessages(prev => {
                const convo = (prev[activeConvo] || []).map(m => m.index === block.index ? { ...m, destroyed: true } : m);
                return { ...prev, [activeConvo]: convo };

          const peerId = peers.find(p => p.id === activeConvo)?.fingerprint || String(activeConvo);

              }));
            } catch (e) { console.error('Offline queue failed:', e); }

        const sendFile = async (fileName, fileSize, fileObj, targetPeerId = null) => {
          const runtime = window.GLLicenseRuntime;
